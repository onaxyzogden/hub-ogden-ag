  if(sec.t==="rep") return [""];
  if(sec.t==="chk") return {};
  if(sec.t==="scale") return 3;
  if(sec.t==="ctable") return [{name:"",price:"",weakness:""}];

  if(sec.t==="range") return {min:"",max:""};
  if(sec.t==="glabel") return {text:"",g:""};
  return "";
}

        "Binary ICP disqualifiers honoured — no exceptions": true
      }
    }
  };

  const DEMO_NOTES = {
    pain: "All 5 pain statements sourced from verbatim research — not operator assumption. Urgency rated 5: these are not background frustrations, they are active operating constraints.",
    icp: "ICP deliberately excludes 'aspiring' operators — must have demonstrated revenue and team. The disqualifiers are binary and held: no exceptions in discovery calls.",
    competitor: "The Enemy is named as a structural condition, not a competitor's failure. Nobody is blamed. The gap (authority transfer vs process documentation) is the positioning anchor.",
    avatar: "Mark Chambers is a composite of 4 real interviews. Every verbatim phrase in the VoC Bank traces to a real person who said it when they thought they were just describing their week.",
    "offer-creation": "Promise at G2 — 2 case studies completed, methodology validated. The '90 days' framing is tested: both Darren and Jenna completed phases 1–4 within this window. Revenue outcomes remain PROOF PENDING — not used in any client-facing asset.",
    pricing: "£4,800 is at the lower third of the market range. Justification: program is new (Cycle 1), G2 ceiling requires humility on outcomes, and the 50/50 split de-risks the client's exposure. Price will move to £6,500 in Cycle 2 after 4 completed engagements.",
    builder: "PROOF PENDING: revenue increase at 6 months. Restriction active — this claim appears nowhere in any live asset. Will be resolved at month 4 of current client tracking.",
    genads: "Hook sourced directly from Truth-Gate cleared VoC phrase. The body copy stays within Scope Map — no outcome claims, no implied guarantees. Scarcity Checkpoint passed: no urgency language.",
    salespres: "Deck follows Enemy Narrative → Mechanism → Offer sequence. Price is introduced only after the problem is fully named and the mechanism is understood. VIC passed: no verbal claims beyond what the Scope Map supports.",
    salesscript: "Objection responses at G2 — no inflation under pressure. The 'I've tried coaching before' objection is the highest-frequency — the response acknowledges the objection rather than dismissing it. Binary disqualifiers are non-negotiable."
  };

  const [role, setRole] = useState("owner");
  const [activeStage, setActiveStage] = useState("str");
  const [openModule, setOpenModule] = useState(null);
  const [completed, setCompleted] = useState(DEMO_COMPLETED);
  const [wsData, setWsData] = useState(DEMO_WSDATA);
  const [notes, setNotes] = useState(DEMO_NOTES);
  const [covenantOpen, setCovenantOpen] = useState(false);
  const [stageTab, setStageTab] = useState("tm");

  // Foundation state — the governance layer
  const [foundation, setFoundation] = useState(DEMO_FOUNDATION);

  const updF = (key, val) => setFoundation(p => ({...p, [key]: val}));

  const stage = STAGES.find(s => s.id === activeStage);
  const openMod = stage?.tmModules?.find(m => m.id === openModule);
  const accent = stage.color;

  const totalTM = STAGES.reduce((a,s) => a + s.tmModules.length, 0);
  const doneTM = Object.values(completed).filter(Boolean).length;
  const activePP = foundation.proofPending.filter(p => p.status === "pending").length;
  const clearedVoC = foundation.vocBank.filter(v => v.cleared).length;
  const signedCount = Object.values(foundation.briefs).filter(Boolean).length;

  const setField = (mid, key, val) => setWsData(p => ({...p, [mid]:{...(p[mid]||{}),[key]:val}}));
  const getField = (mid, sec) => wsData[mid]?.[sec.k] ?? defVal(sec);

  return (
    <div style={S.root}>
      <div style={S.grain}/>

      {/* HEADER */}
      <header style={S.hdr}>
        <div style={S.hdrL}>
          <div style={S.wm}>
            <span style={S.wmTM}>TRUTH<span style={{color:"#C9A84C"}}>MARKET</span></span>
            <span style={S.wmX}>×</span>
            <span style={S.wmBB}>BBOS</span>
          </div>
          <div style={S.wmTag}>Covenant Growth Engine · Demo · Sarah Khan Consulting · Owner Extraction Method</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={S.roleSwitcher}>
            {Object.values(ROLES).map(r => (
              <button key={r.id}
                style={{...S.roleBtn, borderColor:role===r.id?r.color:"transparent", color:role===r.id?r.color:"#444", background:role===r.id?"#161616":"transparent"}}
                onClick={()=>{ setRole(r.id); setOpenModule(null); if(r.visibleStages.length>0){setActiveStage(r.visibleStages[0]);} }}>
                <span style={{marginRight:5}}>{r.icon}</span>{r.label}
              </button>
            ))}
          </div>
          {ROLES[role].canOpenCovenant && (
            <button style={S.covenantBtn} onClick={() => setCovenantOpen(true)}>
              <span style={S.covenantIcon}>⧁</span> Covenant Engine
              {(activePP > 0 || !foundation.gCeiling) && <span style={S.covenantAlert}>{activePP > 0 ? activePP : "!"}</span>}
            </button>
          )}
        </div>
      </header>

      {/* FOUNDATION STRIP — role filtered */}
      {ROLES[role].stripItems.length > 0 && (
        <div style={S.strip}>
          {ROLES[role].stripItems.includes("ceiling") && <>
            <StripItem label="G-Ceiling" value={foundation.gCeiling || "Not set"} color={foundation.gCeiling ? G_COLORS[foundation.gCeiling] : "#444"} alert={!foundation.gCeiling && role==="owner"} />
            <div style={S.stripDiv}/>
          </>}
          {ROLES[role].stripItems.includes("voc") && <>
            <StripItem label="VoC Phrases" value={`${foundation.vocBank.length} total · ${clearedVoC} Truth-Gate cleared`} color={foundation.vocBank.length > 0 ? "#C9A84C" : "#444"} />
            <div style={S.stripDiv}/>
          </>}
          {ROLES[role].stripItems.includes("pp") && <>
            <StripItem label="Proof Pending" value={activePP > 0 ? `${activePP} active restriction${activePP>1?"s":""}` : "None active"} color={activePP > 0 ? "#B07060" : "#555"} alert={activePP > 0} />
            <div style={S.stripDiv}/>
          </>}
          {ROLES[role].stripItems.includes("briefs") && <>
            <StripItem label="Approval Briefs" value={`${signedCount}/4 signed`} color={signedCount === 4 ? "#7EB8A4" : signedCount > 0 ? "#C9A84C" : "#444"} />
            <div style={S.stripDiv}/>
          </>}
          {ROLES[role].stripItems.includes("progress") && (
            <StripItem label="Progress" value={`${doneTM}/${totalTM} TM modules`} color="#888" />
          )}
        </div>
      )}

      {/* ROLE CONTEXT BAR */}
      <div style={{...S.roleBar, borderColor:ROLES[role].color+"33", background:ROLES[role].color+"08"}}>
        <span style={{...S.roleBarIcon, color:ROLES[role].color}}>{ROLES[role].icon}</span>
        <span style={{...S.roleBarName, color:ROLES[role].color}}>{ROLES[role].label}</span>
        <span style={S.roleBarDesc}>{ROLES[role].desc}</span>
      </div>
      <div style={S.body}>
        {/* SIDEBAR — role filtered */}
        {ROLES[role].specialView !== "deliveryBrief" && (
          <nav style={S.nav}>
            {STAGES.filter(s => ROLES[role].visibleStages.includes(s.id)).map(s => {
              const roleMods = ROLES[role].visibleModules ? s.tmModules.filter(m => ROLES[role].visibleModules.includes(m.id)) : s.tmModules;
              const done = roleMods.filter(m => completed[m.id]).length;
              const total = roleMods.length;
              const active = activeStage === s.id;
              const allLocked = total > 0 && roleMods.every(m => isLocked(m.id, foundation.briefs));
              return (
                <button key={s.id} style={{...S.navBtn, borderLeft:`3px solid ${active ? s.color : "transparent"}`, background: active ? "#161616":"transparent"}}

                  <div style={{...S.navCode, color: active ? s.color : "#444"}}>{s.code}</div>
                  <div style={{...S.navLabel, color: active ? "#ddd" : "#555"}}>{s.label}</div>
                  {total > 0 ? (
                    <div style={S.navProg}>
                      <div style={S.navBar}><div style={{...S.navFill, width:`${Math.round((done/total)*100)}%`, background:s.color}}/></div>
                      <span style={{...S.navN, color: allLocked ? "#B07060" : "#333"}}>{allLocked ? "🔒" : `${done}/${total}`}</span>
                    </div>
                  ) : <div style={S.navBonly}>BBOS native</div>}
                </button>
              );
            })}
          </nav>
        )}

        {/* DELIVERY BRIEF — special view for delivery role */}
        {ROLES[role].specialView === "deliveryBrief" && (
          <div style={{flex:1, overflowY:"auto"}}>
            <DeliveryBrief wsData={wsData} foundation={foundation} />
          </div>
        )}

        {/* MAIN PIPELINE VIEW */}
        {ROLES[role].specialView !== "deliveryBrief" && (
        <main style={{...S.main, width: openModule ? 280 : "100%", flexShrink: openModule ? 0 : 1}}>
          <div style={S.phHead}>
            <div>
              <div style={{...S.phCode, color: accent}}>{stage.code} — {stage.label}</div>
              <div style={{...S.phAttr, color: accent}}>⧁ {stage.attr}</div>
            </div>
            {stage.tmModules.length > 0 && (
              <div style={S.phStat}>{stage.tmModules.filter(m=>completed[m.id]).length}/{stage.tmModules.length} complete</div>
            )}
          </div>
          <div style={S.phPurpose}>{stage.purpose}</div>

          {/* Tabs */}
          <div style={S.tabs}>
            {stage.tmModules.length > 0 && (
              <button style={{...S.tab, borderBottom:`2px solid ${stageTab==="tm" ? accent : "transparent"}`, color: stageTab==="tm" ? accent : "#444"}} onClick={()=>setStageTab("tm")}>TruthMarket Modules</button>
            )}
            <button style={{...S.tab, borderBottom:`2px solid ${stageTab==="bbos" ? accent : "transparent"}`, color: stageTab==="bbos" ? accent : "#444"}} onClick={()=>setStageTab("bbos")}>BBOS Assets</button>
          </div>

          {stageTab === "tm" && stage.tmModules.length > 0 && (
            <div style={{...S.grid, gridTemplateColumns: openModule ? "1fr" : "repeat(auto-fill,minmax(188px,1fr))"}}>
              {(ROLES[role].visibleModules ? stage.tmModules.filter(m => ROLES[role].visibleModules.includes(m.id)) : stage.tmModules).map(mod => {
                const locked = isLocked(mod.id, foundation.briefs);
                const done = !!completed[mod.id];
                const isOpen = openModule === mod.id;
                return (
                  <div key={mod.id}
                    style={{...S.card, ...(done && !locked ? S.cDone : {}), ...(locked ? S.cLocked : {}), ...(isOpen ? {borderColor:accent, background:"#1c1c1c"} : {})}}
                    onClick={() => !locked && setOpenModule(isOpen ? null : mod.id)}>
                    <div style={S.cTop}>
                      <span style={{...S.cIcon, opacity: locked ? 0.3 : 1}}>{mod.icon}</span>
                      {locked ? (
                        <span style={S.lockIcon}>🔒</span>
                      ) : (
                        <button style={{...S.chkBtn, background:done?accent:"transparent", borderColor:done?accent:"#2e2e2e"}}
                          onClick={e=>{e.stopPropagation(); setCompleted(p=>({...p,[mod.id]:!p[mod.id]}));}}>
                          {done && <span style={S.chkMk}>✓</span>}
                        </button>
                      )}
                    </div>
                    <div style={{...S.cTitle, color: locked ? "#333" : isOpen ? "#fff" : "#bbb"}}>{mod.title}</div>
                    <div style={{...S.cAnchor, color: locked ? "#2a2a2a" : accent}}>{mod.anchor}</div>
                    {locked && <div style={S.cLockReason}>{GATE_LABELS[MODULE_GATE[mod.id]]}</div>}
                    {!locked && mod.claims && foundation.gCeiling && <div style={{...S.cBadge, background:G_COLORS[foundation.gCeiling]+"22", color:G_COLORS[foundation.gCeiling], border:`1px solid ${G_COLORS[foundation.gCeiling]}44`}}>Ceiling: {foundation.gCeiling}</div>}
                    {!locked && mod.usesVoC && clearedVoC > 0 && <div style={{...S.cBadge, background:"#C9A84C22", color:"#C9A84C", border:"1px solid #C9A84C44"}}>{clearedVoC} VoC phrase{clearedVoC>1?"s":""}</div>}
                  </div>
                );
              })}
            </div>
          )}

          {stageTab === "bbos" || stage.tmModules.length === 0 ? (
            <div style={S.bbosSection}>
              {stage.tmModules.length === 0 && stageTab !== "bbos" && (
                <div style={S.emptyState}>
                  <div style={{fontSize:28, color:accent, marginBottom:12}}>⧁</div>
                  <div style={{fontSize:13, color:"#666", fontWeight:600, marginBottom:8}}>BBOS-native stage</div>
                  <div style={{fontSize:11, color:"#444", lineHeight:1.75, fontStyle:"italic", maxWidth:400, textAlign:"center"}}>{stage.purpose}</div>
                  <button style={{...S.emptyBtn, marginTop:16}} onClick={()=>setStageTab("bbos")}>View BBOS Assets →</button>
                </div>
              )}
              {stageTab === "bbos" && (
                <>
                  {stage.bbosAssets.map((a,i) => (
                    <div key={i} style={S.bbosRow}>
                      <div style={{...S.bbosDot, background:accent}}/>
                      <div style={{fontSize:12, color:"#bbb"}}>{a}</div>
                    </div>
                  ))}
                  {stage.hasGate && (
                    <div style={{...S.gateBox, borderColor:accent+"44", marginTop:20}}>
                      <div style={{...S.gateLbl, color:accent}}>Stage Gate · {stage.gateLabel2 || stage.gateLabel}</div>
                      <div style={S.gateTxt}>This stage's Approval Brief must be signed in the Covenant Engine before downstream modules unlock.</div>
                      <button style={{...S.gateBtn, borderColor:accent, color:accent}} onClick={()=>setCovenantOpen(true)}>Open Covenant Engine →</button>
                    </div>
                  )}
                </>
              )}
            </div>
          ) : null}
        </main>

        )} {/* end role pipeline view */}

        {/* WORKSPACE PANEL */}
        {openModule && openMod && WS[openModule] && (
          <aside style={S.panel} key={openModule}>
            <div style={S.panelInner}>
              <div style={S.pHead}>
                <div>
                  <div style={{...S.pCode, color:accent}}>{stage.code} · {openMod.anchor}</div>
                  <div style={S.pTitle}><span>{openMod.icon}</span> {openMod.title}</div>
                </div>
                <button style={S.closeBtn} onClick={()=>setOpenModule(null)}>✕</button>
              </div>

              {/* Constraint banners */}
              {openMod.claims && foundation.gCeiling && (
                <div style={{...S.banner, borderColor:G_COLORS[foundation.gCeiling], background:G_COLORS[foundation.gCeiling]+"11"}}>
                  <span style={{...S.bannerLbl, color:G_COLORS[foundation.gCeiling]}}>G-Label Ceiling: {foundation.gCeiling}</span>
                  <span style={S.bannerTxt}>{G_MEANINGS[foundation.gCeiling]}. No claim in this asset may exceed this level.</span>
                </div>
              )}
              {openMod.claims && !foundation.gCeiling && (
                <div style={{...S.banner, borderColor:"#B07060", background:"#B0706011"}}>
                  <span style={{...S.bannerLbl, color:"#B07060"}}>G-Ceiling not set</span>
                  <span style={S.bannerTxt}>Set the G-label ceiling in Covenant Engine → Foundation before making claims.</span>
                </div>
              )}
              {activePP > 0 && openMod.claims && (
                <div style={{...S.banner, borderColor:"#B07060", background:"#B0706011"}}>
                  <span style={{...S.bannerLbl, color:"#B07060"}}>⚠ {activePP} PROOF PENDING restriction{activePP>1?"s":""} active</span>
                  <div style={{marginTop:5}}>
                    {foundation.proofPending.filter(p=>p.status==="pending").map(p => (
                      <div key={p.id} style={S.ppItem}>✕ {p.claim}</div>
                    ))}
                  </div>
                </div>
              )}
              {openMod.usesVoC && clearedVoC > 0 && (
                <div style={{...S.banner, borderColor:"#C9A84C55", background:"#C9A84C08"}}>
                  <span style={{...S.bannerLbl, color:"#C9A84C"}}>Truth-Gate Cleared Phrases ({clearedVoC})</span>
                  {foundation.vocBank.filter(v=>v.cleared).map(v => (
                    <div key={v.id} style={S.vocPhrase}>"{v.phrase}"</div>
                  ))}
                </div>
              )}

              <div style={{...S.accentLine, background:accent}}/>

              <div style={S.fieldStack}>
                {WS[openModule].secs.map(sec => (
                  <Field key={sec.k} sec={sec} value={getField(openModule, sec)} onChange={val=>setField(openModule, sec.k, val)} accent={accent}/>
                ))}
                <div style={S.fld}>
                  <div style={S.fLbl}>Notes</div>
                  <textarea style={S.ta} rows={3} placeholder="Private working notes…" value={notes[openModule]||""} onChange={e=>setNotes(p=>({...p,[openModule]:e.target.value}))}/>
                </div>
              </div>

              <div style={S.actBar}>
                {WS[openModule].act.map((a,i) => (
                  <button key={i} style={i===0 ? {...S.actP, background:accent} : S.actS}>{a}</button>
                ))}
                <button style={S.actC} onClick={()=>setCompleted(p=>({...p,[openModule]:!p[openModule]}))}>
                  {completed[openModule] ? "✓ Complete" : "Mark Complete"}
                </button>
              </div>
            </div>
          </aside>
        )}
      </div>

      {/* COVENANT ENGINE */}
      {covenantOpen && (
        <CovenantEngine foundation={foundation} updF={updF} onClose={()=>setCovenantOpen(false)}/>
      )}
    </div>
  );
}

function StripItem({ label, value, color, alert }) {
  return (
    <div style={S.si}>
      <div style={S.siLabel}>{label}</div>
      <div style={{...S.siVal, color: alert ? "#B07060" : color}}>{alert && "⚠ "}{value}</div>
    </div>
  );
}

// ── COVENANT ENGINE ───────────────────────────────────────────────────────
function CovenantEngine({ foundation, updF, onClose }) {
  const [tab, setTab] = useState("foundation");
  const [newPhrase, setNewPhrase] = useState("");
  const [newClaim, setNewClaim] = useState("");

  const tabs = [
    { id:"foundation", label:"Foundation" },
    { id:"voc", label:`VoC Bank (${foundation.vocBank.length})` },
    { id:"ledger", label:`Ledger (${foundation.proofPending.filter(p=>p.status==="pending").length} active)` },
    { id:"briefs", label:`Briefs (${Object.values(foundation.briefs).filter(Boolean).length}/4)` },
  ];

  const addPhrase = () => {
    if(!newPhrase.trim()) return;
    updF("vocBank", [...foundation.vocBank, { id:Date.now(), phrase:newPhrase.trim(), cleared:false }]);
    setNewPhrase("");
  };
  const toggleCleared = id => updF("vocBank", foundation.vocBank.map(v => v.id===id ? {...v, cleared:!v.cleared} : v));
  const removePhrase = id => updF("vocBank", foundation.vocBank.filter(v => v.id !== id));

  const addPP = () => {
    if(!newClaim.trim()) return;
    updF("proofPending", [...foundation.proofPending, { id:Date.now(), claim:newClaim.trim(), status:"pending" }]);
    setNewClaim("");
  };
  const togglePP = id => updF("proofPending", foundation.proofPending.map(p => p.id===id ? {...p, status:p.status==="pending"?"resolved":"pending"} : p));
  const removePP = id => updF("proofPending", foundation.proofPending.filter(p => p.id!==id));

  const signBrief = key => updF("briefs", {...foundation.briefs, [key]:true});
  const unsignBrief = key => updF("briefs", {...foundation.briefs, [key]:false});

  const briefDefs = [
    { key:"qal", label:"Amanah Gate", stage:"02 QAL", desc:"Confirms G-label ceiling is set, financial runway is documented, and the operator passes the ethical inventory.", unlocks:"All STR (02) modules" },
    { key:"str", label:"STR Approval Brief", stage:"03 STR", desc:"Confirms VoC Bank is complete with 15+ verbatim phrases, Truth-Gate Advisory is signed, and Enemy Narrative is produced.", unlocks:"All OFR (03) modules" },
    { key:"ofr", label:"OFR Approval Brief", stage:"04 OFR", desc:"Confirms the Offer Asset Pack is complete: Promise G-labelled, Scope Map explicit, Guarantee has 4 elements, PROOF PENDING items entered.", unlocks:"All OUT (04) + SAL (05) modules" },
    { key:"out", label:"OUT Approval Brief", stage:"05 OUT", desc:"Confirms Scarcity Checkpoint passed, all PROOF PENDING restrictions honoured in live creative, channel infrastructure deployed and tested.", unlocks:"SAL (05) modules" },
  ];

  return (
    <div style={S.ceOverlay} onClick={onClose}>
      <div style={S.cePan} onClick={e=>e.stopPropagation()}>
        <div style={S.ceHead}>
          <div>
            <div style={S.ceTitle}><span style={{color:"#C9A84C"}}>⧁</span> Covenant Engine</div>
            <div style={S.ceSub}>Governance layer · BBOS foundation for the entire pipeline</div>
          </div>
          <button style={S.closeBtn} onClick={onClose}>✕</button>
        </div>

        <div style={S.ceTabs}>
          {tabs.map(t => (
            <button key={t.id} style={{...S.ceTab, borderBottom:`2px solid ${tab===t.id ? "#C9A84C":"transparent"}`, color:tab===t.id?"#C9A84C":"#555"}}
              onClick={()=>setTab(t.id)}>{t.label}</button>
          ))}
        </div>

        <div style={S.ceBody}>
          {tab === "foundation" && (
            <div style={S.ceSection}>
              <div style={S.ceGroupLabel}>G-Label Ceiling (from QAL Proof Audit)</div>
              <div style={S.ceTxt}>The maximum proof level any claim in the entire pipeline can carry. Set by the QAL stage based on the operator's current evidence. Every TruthMarket module that produces claims will enforce this ceiling.</div>
              <div style={S.glabelRow}>
                {["G1","G2","G3","G4"].map(g => (
                  <button key={g} style={{...S.glBtn, background:foundation.gCeiling===g?G_COLORS[g]:"transparent", color:foundation.gCeiling===g?"#111":G_COLORS[g]||"#555", borderColor:G_COLORS[g]||"#333"}}
                    onClick={()=>updF("gCeiling", g)}>
                    <span style={{fontWeight:700}}>{g}</span>
                    <span style={{fontSize:9, display:"block", marginTop:2}}>{["Proven","Reasonable","Plausible","Aspirational"][["G1","G2","G3","G4"].indexOf(g)]}</span>
                  </button>
                ))}
              </div>
              {foundation.gCeiling && <div style={{...S.ceTxt, color:G_COLORS[foundation.gCeiling], marginTop:8}}>Current ceiling: {foundation.gCeiling} — {G_MEANINGS[foundation.gCeiling]}</div>}

              <div style={{...S.ceDivider, marginTop:20}}/>
              <div style={S.ceGroupLabel}>Financial Runway (from INT)</div>
              <input style={S.ceInp} placeholder="e.g. £40,000 confirmed · 8 months runway" value={foundation.runway} onChange={e=>updF("runway",e.target.value)}/>
              <div style={S.ceTxt}>This number travels intact through every stage. It cannot be softened to "financial pressure" downstream — it must remain the specific figure.</div>

              <div style={{...S.ceDivider, marginTop:20}}/>
              <div style={S.ceGroupLabel}>Work Aversions (from INT — Non-Negotiable)</div>
              {foundation.workAversions.map((wa,i) => (
                <div key={i} style={{display:"flex",gap:6,marginBottom:4}}>
                  <input style={{...S.ceInp, flex:1}} placeholder="e.g. No live calls after 6pm…" value={wa} onChange={e=>{const n=[...foundation.workAversions];n[i]=e.target.value;updF("workAversions",n);}}/>
                  {foundation.workAversions.length > 1 && <button style={S.remBtn} onClick={()=>updF("workAversions",foundation.workAversions.filter((_,j)=>j!==i))}>✕</button>}
                </div>
              ))}
              <button style={{...S.addBtn, color:"#C9A84C", borderColor:"#C9A84C"}} onClick={()=>updF("workAversions",[...foundation.workAversions,""])}>+ Add aversion</button>
            </div>
          )}

          {tab === "voc" && (
            <div style={S.ceSection}>
              <div style={S.ceGroupLabel}>VoC Buying Language Bank</div>
              <div style={S.ceTxt}>Add verbatim phrases from forums, reviews, interviews, or DMs. Mark phrases as Truth-Gate cleared to make them available as source material in creative workspaces. No paraphrasing — the exact phrase is the data.</div>
              <div style={{display:"flex",gap:6,marginTop:12}}>
                <input style={{...S.ceInp,flex:1}} placeholder="Paste exact verbatim phrase from source…" value={newPhrase} onChange={e=>setNewPhrase(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPhrase()}/>
                <button style={{...S.addBtn, color:"#C9A84C", borderColor:"#C9A84C", padding:"8px 14px"}} onClick={addPhrase}>+ Add</button>
              </div>
              <div style={{marginTop:14, display:"flex", flexDirection:"column", gap:8}}>
                {foundation.vocBank.length === 0 && <div style={{fontSize:11,color:"#333",fontStyle:"italic"}}>No phrases yet. Add verbatim VoC from your research sources.</div>}
                {foundation.vocBank.map(v => (
                  <div key={v.id} style={{...S.vocRow, borderColor: v.cleared ? "#C9A84C44" : "#1e1e1e", background: v.cleared ? "#C9A84C08" : "#141414"}}>
                    <div style={{flex:1, fontSize:11, color: v.cleared ? "#e0d8cc" : "#888", lineHeight:1.5}}>"{v.phrase}"</div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <button style={{...S.tgBtn, background:v.cleared?"#C9A84C":"transparent", color:v.cleared?"#111":"#555", borderColor:v.cleared?"#C9A84C":"#2e2e2e"}}
                        onClick={()=>toggleCleared(v.id)}>{v.cleared?"✓ Truth-Gate":"Clear"}</button>
                      <button style={S.remBtn} onClick={()=>removePhrase(v.id)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
              {foundation.vocBank.length > 0 && (
                <div style={{fontSize:10, color:"#444", marginTop:12}}>
                  {foundation.vocBank.filter(v=>v.cleared).length} of {foundation.vocBank.length} phrases cleared for headline use
                </div>
              )}
            </div>
          )}

          {tab === "ledger" && (
            <div style={S.ceSection}>
              <div style={S.ceGroupLabel}>Pipeline Integrity Ledger — PROOF PENDING</div>
              <div style={S.ceTxt}>Claims that lack substantiating evidence. Each item carries a restriction: it cannot be presented at G1 or G2 level in any client-facing asset until proof is captured. These restrictions travel through OUT, SAL, and FUL — they never silently disappear.</div>
              <div style={{display:"flex",gap:6,marginTop:12}}>
                <input style={{...S.ceInp,flex:1}} placeholder="Claim that cannot yet be substantiated…" value={newClaim} onChange={e=>setNewClaim(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPP()}/>
                <button style={{...S.addBtn, color:"#B07060", borderColor:"#B07060", padding:"8px 14px"}} onClick={addPP}>+ Add PP</button>
              </div>
              <div style={{marginTop:14, display:"flex", flexDirection:"column", gap:8}}>
                {foundation.proofPending.length === 0 && <div style={{fontSize:11,color:"#333",fontStyle:"italic"}}>No PROOF PENDING items. Enter claims from OFR Asset 8 that lack current evidence.</div>}
                {foundation.proofPending.map(p => (
                  <div key={p.id} style={{...S.ppRow, borderColor:p.status==="resolved"?"#7EB8A444":"#B0706033", background:p.status==="resolved"?"#7EB8A408":"#B0706008"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11, color:p.status==="resolved"?"#7EB8A4":"#ddd", textDecoration:p.status==="resolved"?"line-through":"none", lineHeight:1.5}}>{p.claim}</div>
                      <div style={{fontSize:9, color:p.status==="resolved"?"#7EB8A4":"#B07060", marginTop:3, letterSpacing:"0.1em"}}>
                        {p.status==="resolved" ? "✓ RESOLVED — proof captured" : "⚠ PENDING — restricted from G1/G2 use"}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <button style={{...S.tgBtn, background:p.status==="resolved"?"#7EB8A4":"transparent", color:p.status==="resolved"?"#111":"#555", borderColor:p.status==="resolved"?"#7EB8A4":"#2e2e2e"}}
                        onClick={()=>togglePP(p.id)}>{p.status==="resolved"?"✓ Resolved":"Resolve"}</button>
                      <button style={S.remBtn} onClick={()=>removePP(p.id)}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === "briefs" && (
            <div style={S.ceSection}>
              <div style={S.ceGroupLabel}>Approval Briefs — Stage Gates</div>
              <div style={S.ceTxt}>Each brief must be signed before the downstream stage's modules unlock. Signing is a covenant declaration — it confirms the stage's work meets the BBOS standard and the operator accepts the constraints it carries forward.</div>
              <div style={{marginTop:16, display:"flex", flexDirection:"column", gap:14}}>
                {briefDefs.map(b => {
                  const signed = foundation.briefs[b.key];
                  return (
                    <div key={b.key} style={{...S.briefCard, borderColor:signed?"#7EB8A444":"#1e1e1e", background:signed?"#7EB8A408":"#111"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div>
                          <div style={{fontSize:11, color: signed?"#7EB8A4":"#888", fontWeight:700, letterSpacing:"0.1em"}}>{b.stage} · {b.label}</div>
                          <div style={{fontSize:9, color:"#3a3a3a", marginTop:2, letterSpacing:"0.12em", textTransform:"uppercase"}}>Unlocks: {b.unlocks}</div>
                        </div>
                        <button style={{...S.signBtn, background:signed?"#7EB8A4":"transparent", color:signed?"#111":"#555", borderColor:signed?"#7EB8A4":"#2e2e2e"}}
                          onClick={()=>signed ? unsignBrief(b.key) : signBrief(b.key)}>
                          {signed ? "✓ Signed" : "Sign Brief"}
                        </button>
                      </div>
                      <div style={{fontSize:10, color:"#555", lineHeight:1.6}}>{b.desc}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── FIELD ─────────────────────────────────────────────────────────────────
function Field({sec,value,onChange,accent}) {
  if(sec.t==="ta") return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><textarea style={S.ta} rows={4} placeholder={sec.ph} value={value} onChange={e=>onChange(e.target.value)}/></div>;
  if(sec.t==="inp") return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><input style={S.inp} placeholder={sec.ph} value={value} onChange={e=>onChange(e.target.value)}/></div>;
  if(sec.t==="sel") return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><select style={S.inp} value={value} onChange={e=>onChange(e.target.value)}>{sec.opts.map(o=><option key={o}>{o}</option>)}</select></div>;
  if(sec.t==="rep"){const items=Array.isArray(value)?value:[""];return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div>{items.map((it,i)=><div key={i} style={S.repRow}><input style={{...S.inp,flex:1}} placeholder={sec.ph} value={it} onChange={e=>{const n=[...items];n[i]=e.target.value;onChange(n);}}/>{items.length>1&&<button style={S.remBtn} onClick={()=>onChange(items.filter((_,j)=>j!==i))}>✕</button>}</div>)}<button style={{...S.addBtn,color:accent,borderColor:accent}} onClick={()=>onChange([...items,""])}>{sec.al}</button></div>;}
  if(sec.t==="chk"){const ch=(typeof value==="object"&&!Array.isArray(value))?value:{};return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div>{sec.items.map(it=><div key={it} style={S.chkRow} onClick={()=>onChange({...ch,[it]:!ch[it]})}><div style={{...S.chkBox,background:ch[it]?accent:"transparent",borderColor:ch[it]?accent:"#2e2e2e"}}>{ch[it]&&<span style={{fontSize:8,color:"#111",fontWeight:700}}>✓</span>}</div><span style={{fontSize:11,lineHeight:1.5,color:ch[it]?"#bbb":"#555",textDecoration:ch[it]?"line-through":"none"}}>{it}</span></div>)}</div>;}
  if(sec.t==="scale"){const v=typeof value==="number"?value:3;const lbs=["","Background noise","Tolerable","Significant pain","High urgency","Bleeding neck"];return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><div style={{fontSize:10,color:"#555",fontStyle:"italic",marginBottom:6}}>{sec.hint}</div><div style={{display:"flex",alignItems:"center",gap:6}}>{[1,2,3,4,5].map(n=><button key={n} style={{...S.scalePip,background:n<=v?accent:"#1a1a1a",color:n<=v?"#111":"#444"}} onClick={()=>onChange(n)}>{n}</button>)}<span style={{color:accent,fontSize:10,fontStyle:"italic",marginLeft:4}}>{lbs[v]}</span></div></div>;}
  if(sec.t==="glabel"){const v=typeof value==="object"?value:{text:"",g:""};return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><textarea style={S.ta} rows={3} placeholder={sec.ph} value={v.text||""} onChange={e=>onChange({...v,text:e.target.value})}/><div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}><span style={{fontSize:9,color:"#555",letterSpacing:"0.1em"}}>G-Label:</span>{["G1","G2","G3","G4"].map(g=><button key={g} style={{...S.glBtn2,background:v.g===g?G_COLORS[g]:"transparent",color:v.g===g?"#111":G_COLORS[g]||"#555",borderColor:G_COLORS[g]||"#333"}} onClick={()=>onChange({...v,g})}>{g}</button>)}</div></div>;}
  if(sec.t==="ctable"){const rows=Array.isArray(value)&&value.length?value:[{name:"",price:"",weakness:""}];return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div>{rows.map((r,i)=><div key={i} style={{display:"flex",gap:4,marginBottom:4}}><input style={{...S.inp,flex:2}} placeholder="Competitor…" value={r.name} onChange={e=>{const n=[...rows];n[i]={...r,name:e.target.value};onChange(n);}}/><input style={{...S.inp,flex:1}} placeholder="Price…" value={r.price} onChange={e=>{const n=[...rows];n[i]={...r,price:e.target.value};onChange(n);}}/><input style={{...S.inp,flex:2}} placeholder="Weakness…" value={r.weakness} onChange={e=>{const n=[...rows];n[i]={...r,weakness:e.target.value};onChange(n);}}/></div>)}<button style={{...S.addBtn,color:accent,borderColor:accent}} onClick={()=>onChange([...rows,{name:"",price:"",weakness:""}])}>+ Add competitor</button></div>;}
  if(sec.t==="vstack"){const rows=Array.isArray(value)&&value.length?value:[{item:"",value:""}];const tot=rows.reduce((a,r)=>a+(parseFloat(r.value)||0),0);return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div>{rows.map((r,i)=><div key={i} style={{display:"flex",gap:4,marginBottom:4}}><input style={{...S.inp,flex:3}} placeholder="Item…" value={r.item} onChange={e=>{const n=[...rows];n[i]={...r,item:e.target.value};onChange(n);}}/><input style={{...S.inp,flex:1}} placeholder="£…" value={r.value} onChange={e=>{const n=[...rows];n[i]={...r,value:e.target.value};onChange(n);}}/></div>)}<button style={{...S.addBtn,color:accent,borderColor:accent}} onClick={()=>onChange([...rows,{item:"",value:""}])}>+ Add item</button><div style={{fontSize:10,color:"#555",marginTop:6,paddingTop:6,borderTop:"1px solid #1a1a1a"}}>Stack total: <strong style={{color:accent}}>£{tot.toLocaleString()}</strong></div></div>;}
  if(sec.t==="range"){const v=(typeof value==="object"&&!Array.isArray(value))?value:{min:"",max:""};return <div style={S.fld}><div style={S.fLbl}>{sec.l}</div><div style={{display:"flex",gap:8,alignItems:"center"}}><input style={{...S.inp,flex:1}} placeholder="Low (£)…" value={v.min} onChange={e=>onChange({...v,min:e.target.value})}/><span style={{color:"#444"}}>–</span><input style={{...S.inp,flex:1}} placeholder="High (£)…" value={v.max} onChange={e=>onChange({...v,max:e.target.value})}/></div></div>;}
  return null;
}

  ceInp:{background:"#141414",border:"1px solid #1e1e1e",borderRadius:3,color:"#bbb",fontSize:11,fontFamily:"inherit",padding:"8px 10px"},
  glabelRow:{display:"flex",gap:8,marginTop:8},
  glBtn:{border:"1px solid",borderRadius:4,padding:"8px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",minWidth:68},
  vocRow:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",border:"1px solid",borderRadius:3},
  tgBtn:{border:"1px solid",borderRadius:3,fontSize:9,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,letterSpacing:"0.06em",flexShrink:0},
  ppRow:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",border:"1px solid",borderRadius:3},
  briefCard:{border:"1px solid",borderRadius:4,padding:"14px 16px"},
  signBtn:{border:"1px solid",borderRadius:3,fontSize:10,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,letterSpacing:"0.04em"},
};


// ── DELIVERY BRIEF ────────────────────────────────────────────────────────
function DeliveryBrief({ wsData, foundation }) {
  const ofr = wsData["offer-creation"] || {};
  const bldr = wsData["builder"] || {};
  const activePP = foundation.proofPending.filter(p => p.status === "pending");
  const promise = ofr.promise || {};
  const included = Array.isArray(ofr.included) ? ofr.included.filter(Boolean) : [];
  const excluded = Array.isArray(ofr.excluded) ? ofr.excluded.filter(Boolean) : [];
  const guarantee = bldr.guarantee || "";

  const [milestones, setMilestones] = useState([
    {label:"Day 1 — Dependency Audit complete", done:false, note:""},
    {label:"Day 14 — Architecture Design signed off with client", done:false, note:""},
    {label:"Day 30 — First 2 systems installed and team trained", done:false, note:""},
    {label:"Day 45 — Milestone review · 3 of 5 templates complete", done:false, note:""},
    {label:"Day 60 — Authority Transfer Protocol tested under real conditions", done:false, note:""},
    {label:"Day 90 — Full stress test complete · offboarding initiated", done:false, note:""},
  ]);
  const [proofCaptures, setProofCaptures] = useState([
    {prompt:"Week 2: Ask client — 'What's shifted in how you're spending your time this week?'", captured:""},
    {prompt:"Day 45 review: Request written confirmation of hours recovered", captured:""},
    {prompt:"Day 90: Request video testimonial and written case study permission", captured:""},
  ]);

  const toggleMS = i => setMilestones(ms => ms.map((m,j) => j===i ? {...m, done:!m.done} : m));
  const updateMSNote = (i,v) => setMilestones(ms => ms.map((m,j) => j===i ? {...m, note:v} : m));
  const updatePC = (i,v) => setProofCaptures(ps => ps.map((p,j) => j===i ? {...p, captured:v} : p));

  const completedMS = milestones.filter(m => m.done).length;

  return (
    <div style={DB.root}>
      <div style={DB.header}>
        <div>
          <div style={DB.headerLabel}>◑ Delivery Brief</div>
          <div style={DB.headerTitle}>Your role: Fulfilment</div>
          <div style={DB.headerSub}>This view contains everything you need to deliver what was promised. The marketing strategy, ad creative, and pricing decisions are not your concern. Your job is to honour the commitment below.</div>
        </div>
        <div style={DB.msCounter}>
          <div style={{fontSize:24, fontWeight:700, color:"#7AAA88"}}>{completedMS}/6</div>
          <div style={{fontSize:9, color:"#555", letterSpacing:"0.14em", textTransform:"uppercase"}}>milestones</div>
        </div>
      </div>

      <div style={DB.grid}>
        {/* THE PROMISE */}
        <div style={{...DB.card, borderColor:"#7EB8A444"}}>
          <div style={{...DB.cardLbl, color:"#7EB8A4"}}>The Promise</div>
          <div style={{...DB.cardSub}}>What was committed to the client. This is your acceptance test — if this is not delivered, the guarantee is triggered.</div>
          {promise.text ? (
            <>
              <div style={DB.promiseText}>{promise.text}</div>
              <div style={{...DB.glBadge, background:G_COLORS[promise.g]+"22", color:G_COLORS[promise.g], border:`1px solid ${G_COLORS[promise.g]}44`}}>
                {promise.g} — {G_MEANINGS[promise.g]}
              </div>
            </>
          ) : <div style={DB.empty}>No promise documented yet — complete OFR Offer Creation first.</div>}
        </div>

        {/* SCOPE MAP */}
        <div style={{...DB.card, gridColumn:"span 2"}}>
          <div style={{...DB.cardLbl, color:"#7EB8A4"}}>Scope Map</div>
          <div style={DB.cardSub}>What is included in this engagement and what is explicitly excluded. If a client requests something not on the Included list, that is a change-order conversation — not something you absorb silently.</div>
          <div style={DB.scopeGrid}>
            <div>
              <div style={{...DB.scopeHead, color:"#7EB8A4"}}>✓ Included</div>
              {included.length > 0 ? included.map((item,i) => (
                <div key={i} style={DB.scopeItem}><span style={{color:"#7EB8A4", marginRight:8}}>✓</span>{item}</div>
              )) : <div style={DB.empty}>Not yet documented</div>}
            </div>
            <div>
              <div style={{...DB.scopeHead, color:"#B07060"}}>✕ Excluded</div>
              {excluded.length > 0 ? excluded.map((item,i) => (
                <div key={i} style={DB.scopeItem}><span style={{color:"#B07060", marginRight:8}}>✕</span>{item}</div>
              )) : <div style={DB.empty}>Not yet documented</div>}
            </div>
          </div>
        </div>

        {/* GUARANTEE CONDITIONS */}
        <div style={{...DB.card, borderColor:"#C9A84C33"}}>
          <div style={{...DB.cardLbl, color:"#C9A84C"}}>Guarantee — Know the trigger</div>
          <div style={DB.cardSub}>Read this carefully. Understand what triggers the guarantee so you can ensure it is never triggered by inadequate delivery — and so you can defend against a trigger that originates from the client's non-execution.</div>
          {guarantee ? (
            <div style={DB.guaranteeText}>{guarantee}</div>
          ) : <div style={DB.empty}>No guarantee documented yet.</div>}
        </div>

        {/* PROOF PENDING RESTRICTIONS */}
        {activePP.length > 0 && (
          <div style={{...DB.card, borderColor:"#B0706044", background:"#B0706008"}}>
            <div style={{...DB.cardLbl, color:"#B07060"}}>⚠ Claims you must NOT make verbally</div>
            <div style={DB.cardSub}>These claims are PROOF PENDING — they have not been substantiated. Do not repeat them to the client as confirmed outcomes, regardless of how confident you feel about them.</div>
            {activePP.map(p => (
              <div key={p.id} style={DB.ppRestriction}>✕ "{p.claim}"</div>
            ))}
          </div>
        )}

        {/* CLIENT SUCCESS MILESTONES */}
        <div style={{...DB.card, gridColumn:"span 2", borderColor:"#7AAA8844"}}>
          <div style={{...DB.cardLbl, color:"#7AAA88"}}>Client Success Milestones</div>
          <div style={DB.cardSub}>Track delivery progress against these checkpoints. Each completed milestone is a proof capture opportunity. Your notes here become the case study.</div>
          {milestones.map((ms, i) => (
            <div key={i} style={{...DB.msRow, borderColor: ms.done ? "#7AAA8833" : "#1a1a1a"}}>
              <div style={{...DB.msCheck, background:ms.done?"#7AAA88":"transparent", borderColor:ms.done?"#7AAA88":"#2e2e2e", cursor:"pointer"}}
                onClick={()=>toggleMS(i)}>
                {ms.done && <span style={{fontSize:9,color:"#111",fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{...DB.msLabel, color:ms.done?"#7AAA88":"#888", textDecoration:ms.done?"line-through":"none"}}>{ms.label}</div>
                {ms.done && (
                  <input style={DB.msNote} placeholder="Note what actually happened…"
                    value={ms.note} onChange={e=>updateMSNote(i,e.target.value)} />
                )}
              </div>
            </div>
          ))}
        </div>

        {/* PROOF CAPTURE */}
        <div style={{...DB.card, borderColor:"#C9A84C33"}}>
          <div style={{...DB.cardLbl, color:"#C9A84C"}}>Proof Capture Protocol</div>
          <div style={DB.cardSub}>Proof is captured during delivery, not after. These are the moments to ask. The case studies and testimonials that substantiate future G1/G2 claims are built here.</div>
          {proofCaptures.map((pc, i) => (
            <div key={i} style={DB.pcRow}>
              <div style={DB.pcPrompt}>{pc.prompt}</div>
              <textarea style={DB.pcInput} rows={2} placeholder="What was captured…"
                value={pc.captured} onChange={e=>updatePC(i,e.target.value)} />
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

const DB = {
  root:{padding:"24px 28px", overflowY:"auto", height:"100%"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24,paddingBottom:18,borderBottom:"1px solid #161616"},
  headerLabel:{fontSize:10,color:"#7AAA88",letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:700,marginBottom:6},
  headerTitle:{fontSize:20,fontWeight:400,fontStyle:"italic",color:"#e0d8cc",marginBottom:8},
  headerSub:{fontSize:11,color:"#555",lineHeight:1.7,maxWidth:520},
  msCounter:{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0,paddingLeft:24},
  grid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14},
  card:{background:"#111",border:"1px solid #1a1a1a",borderRadius:5,padding:"16px 14px",display:"flex",flexDirection:"column",gap:10},
  cardLbl:{fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",fontWeight:700},
  cardSub:{fontSize:10,color:"#555",lineHeight:1.6,fontStyle:"italic"},
  promiseText:{fontSize:12,color:"#ddd",lineHeight:1.75,fontStyle:"italic"},
  glBadge:{fontSize:9,padding:"3px 8px",borderRadius:2,letterSpacing:"0.08em",alignSelf:"flex-start"},
  scopeGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:4},
  scopeHead:{fontSize:9,letterSpacing:"0.16em",textTransform:"uppercase",fontWeight:700,marginBottom:8},
  scopeItem:{fontSize:11,color:"#888",lineHeight:1.6,marginBottom:4,display:"flex",alignItems:"flex-start"},
  guaranteeText:{fontSize:11,color:"#999",lineHeight:1.75},
  ppRestriction:{fontSize:11,color:"#B07060",lineHeight:1.5,padding:"6px 0",borderBottom:"1px solid #1a1a1a"},
  msRow:{display:"flex",alignItems:"flex-start",gap:10,padding:"8px 0",borderBottom:"1px solid"},
  msCheck:{width:14,height:14,borderRadius:2,border:"1px solid",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center"},
  msLabel:{fontSize:11,lineHeight:1.4,marginBottom:4},
  msNote:{background:"#141414",border:"1px solid #1e1e1e",borderRadius:2,color:"#bbb",fontSize:10,fontFamily:"Georgia,serif",padding:"5px 7px",width:"100%"},
  pcRow:{display:"flex",flexDirection:"column",gap:5,paddingBottom:10,borderBottom:"1px solid #161616"},
  pcPrompt:{fontSize:10,color:"#888",lineHeight:1.5,fontStyle:"italic"},
  pcInput:{background:"#141414",border:"1px solid #1e1e1e",borderRadius:2,color:"#bbb",fontSize:10,fontFamily:"Georgia,serif",padding:"6px 8px",resize:"none"},
  empty:{fontSize:10,color:"#2e2e2e",fontStyle:"italic"},
};


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
