// ── Field defaults ─────────────────────────────────────────────────────────
function defaultFor(sec) {
  if (sec.type === "repeater") return [""];
  if (sec.type === "checklist") return {};
  if (sec.type === "scale") return 3;
  if (sec.type === "competitor-table") return [{ name: "", price: "", weakness: "" }];
  if (sec.type === "value-stack") return [{ item: "", value: "" }];
  if (sec.type === "range-input") return { min: "", max: "" };
  if (sec.type === "glabel-field") return { text: "", g: "" };
  return "";
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [activeStage, setActiveStage] = useState("str");
  const [openModule, setOpenModule] = useState(null);
  const [completed, setCompleted] = useState({});
  const [wsData, setWsData] = useState({});
  const [notes, setNotes] = useState({});
  const [tab, setTab] = useState("tm"); // "tm" | "bbos"

  const stage = stages.find(s => s.id === activeStage);
  const openMod = stage?.tmModules?.find(m => m.id === openModule);
  const accent = stage.color;

  const totalTM = stages.reduce((a, s) => a + s.tmModules.length, 0);
  const doneTM = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((doneTM / totalTM) * 100);

  const stageDone = (s) => s.tmModules.filter(m => completed[m.id]).length;

  const setField = (mid, key, val) =>
    setWsData(p => ({ ...p, [mid]: { ...(p[mid] || {}), [key]: val } }));
  const getField = (mid, key, sec) => wsData[mid]?.[key] ?? defaultFor(sec);

  return (
    <div style={A.root}>
      <div style={A.grain} />

      {/* Header */}
      <header style={A.hdr}>
        <div style={A.hdrLeft}>
          <div style={A.wm}>
            <span style={A.wmT}>T</span><span style={A.wmR}>RUTH</span>
            <span style={A.wmX}>×</span>
            <span style={A.wmB}>BBOS</span>
          </div>
          <div style={A.wmSub}>TruthMarket mapped to the Barakah Business Operating System</div>
        </div>
        <div style={A.hdrRight}>
          <span style={A.hpLbl}>TM Modules</span>
          <div style={A.hpBar}><div style={{ ...A.hpFill, width: `${pct}%` }} /></div>
          <span style={A.hpLbl}>{doneTM}/{totalTM}</span>
        </div>
      </header>

      <div style={A.body}>
        {/* Sidebar */}
        <nav style={A.nav}>
          {stages.map(s => {
            const done = stageDone(s);
            const active = activeStage === s.id;
            const hasTM = s.tmModules.length > 0;
            return (
              <button key={s.id}
                style={{ ...A.navBtn, borderLeft: `3px solid ${active ? s.color : "transparent"}`, background: active ? "#171717" : "transparent" }}
                onClick={() => { setActiveStage(s.id); setOpenModule(null); setTab("tm"); }}>
                <div>
                  <div style={{ ...A.navCode, color: active ? s.color : "#444" }}>{s.code}</div>
                  <div style={{ ...A.navLabel, color: active ? "#ddd" : "#555" }}>{s.label}</div>
                  {hasTM && (
                    <div style={A.navProg}>
                      <div style={A.navBar}><div style={{ ...A.navFill, width: `${Math.round((done/s.tmModules.length)*100)}%`, background: s.color }} /></div>
                      <span style={{ ...A.navN, color: done === s.tmModules.length && done > 0 ? s.color : "#333" }}>{done}/{s.tmModules.length}</span>
                    </div>
                  )}
                  {!hasTM && <div style={A.navBbosOnly}>BBOS native</div>}
                </div>
              </button>
            );
          })}
        </nav>

        {/* Main */}
        <main style={{ ...A.main, maxWidth: openModule ? 320 : "100%" }}>
          {/* Stage header */}
          <div style={A.stageHead}>
            <div>
              <div style={{ ...A.stageCode, color: accent }}>{stage.code} — {stage.label}</div>
              <div style={{ ...A.stageAttr, color: accent }}>⧁ {stage.attr}</div>
              <div style={A.stageAttrMeaning}>{stage.attrMeaning}</div>
            </div>
            {stage.tmModules.length > 0 && (
              <div style={A.stageStat}>{stageDone(stage)} of {stage.tmModules.length} TM modules</div>
            )}
          </div>

          <div style={A.stagePurpose}>{stage.purpose}</div>

          {/* Tabs */}
          <div style={A.tabs}>
            {stage.tmModules.length > 0 && (
              <button style={{ ...A.tab, borderBottom: tab === "tm" ? `2px solid ${accent}` : "2px solid transparent", color: tab === "tm" ? accent : "#444" }}
                onClick={() => setTab("tm")}>TruthMarket Modules</button>
            )}
            <button style={{ ...A.tab, borderBottom: tab === "bbos" ? `2px solid ${accent}` : "2px solid transparent", color: tab === "bbos" ? accent : "#444" }}
              onClick={() => setTab("bbos")}>BBOS Native Assets</button>
          </div>

          {/* TM Modules */}
          {(tab === "tm" || stage.tmModules.length === 0) && tab !== "bbos" && (
            <>
              {stage.tmModules.length === 0 ? (
                <div style={A.emptyState}>
                  <div style={{ ...A.emptyIcon, color: accent }}>⧁</div>
                  <div style={A.emptyTitle}>BBOS-native stage</div>
                  <div style={A.emptyNote}>{stage.gateNote}</div>
                  <button style={A.emptyBtn} onClick={() => setTab("bbos")}>View BBOS Assets →</button>
                </div>
              ) : (
                <>
                  <div style={{ ...A.grid, gridTemplateColumns: openModule ? "1fr" : "repeat(auto-fill,minmax(200px,1fr))" }}>
                    {stage.tmModules.map(mod => {
                      const done = !!completed[mod.id];
                      const isOpen = openModule === mod.id;
                      return (
                        <div key={mod.id}
                          style={{ ...A.card, ...(done ? A.cDone : {}), ...(isOpen ? { borderColor: accent, background: "#1c1c1c" } : {}) }}
                          onClick={() => setOpenModule(isOpen ? null : mod.id)}>
                          <div style={A.cTop}>
                            <span style={A.cIcon}>{mod.icon}</span>
                            <button style={{ ...A.chk, background: done ? accent : "transparent", borderColor: done ? accent : "#2e2e2e" }}
                              onClick={e => { e.stopPropagation(); setCompleted(p => ({ ...p, [mod.id]: !p[mod.id] })); }}>
                              {done && <span style={A.chkMk}>✓</span>}
                            </button>
                          </div>
                          <div style={{ ...A.cTitle, color: isOpen ? "#fff" : "#bbb" }}>{mod.title}</div>
                          <div style={{ ...A.cAnchor, color: accent }}>BBOS: {mod.bbosAnchor}</div>
                          {isOpen && <div style={A.cNote}>{mod.note}</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ ...A.gateBox, borderColor: accent + "33" }}>
                    <span style={{ ...A.gateLbl, color: accent }}>Stage Gate</span>
                    <p style={A.gateTxt}>{stage.gateNote}</p>
                  </div>
                </>
              )}
            </>
          )}

          {/* BBOS Assets */}
          {tab === "bbos" && (
            <div style={A.bbosSection}>
              {stage.bbosAssets.map((asset, i) => (
                <div key={i} style={A.bbosRow}>
                  <div style={{ ...A.bbosDot, background: accent }} />
                  <div>
                    <div style={{ ...A.bbosAssetName, color: "#ccc" }}>{asset.label}</div>
                    <div style={A.bbosAssetNote}>{asset.note}</div>
                  </div>
                </div>
              ))}
              {stage.gateNote && (
                <div style={{ ...A.gateBox, marginTop: 24, borderColor: accent + "33" }}>
                  <span style={{ ...A.gateLbl, color: accent }}>Stage Gate</span>
                  <p style={A.gateTxt}>{stage.gateNote}</p>
                </div>
              )}
            </div>
          )}
        </main>

        {/* Detail Panel */}
        {openModule && openMod && workspaces[openModule] && (
          <aside style={A.panel}>
            <div style={A.panelInner}>
              <div style={A.pHead}>
                <div>
                  <div style={{ ...A.pCode, color: accent }}>{stage.code} · {openMod.bbosAnchor}</div>

                </div>
                <button style={A.closeBtn} onClick={() => setOpenModule(null)}>✕</button>
              </div>
              <div style={A.objBox}>
                <span style={{ ...A.objLbl, color: accent }}>BBOS Objective</span>
                <p style={A.objTxt}>{workspaces[openModule].objective}</p>
              </div>
              <div style={{ ...A.accentLine, background: accent }} />
              <div style={A.fieldStack}>
                {workspaces[openModule].sections.map(sec => (
                  <Field key={sec.key} sec={sec} value={getField(openModule, sec.key, sec)}
                    onChange={val => setField(openModule, sec.key, val)} accent={accent} />
                ))}
                <div style={A.fld}>
                  <div style={A.fLbl}>Notes</div>
                  <textarea style={A.ta} rows={3} placeholder="Private working notes…"
                    value={notes[openModule] || ""} onChange={e => setNotes(p => ({ ...p, [openModule]: e.target.value }))} />
                </div>
              </div>
              <div style={A.actBar}>
                {workspaces[openModule].actions.map((a, i) => (
                  <button key={i} style={i === 0 ? { ...A.actP, background: accent } : A.actS}>{a}</button>
                ))}
                <button style={A.actC} onClick={() => setCompleted(p => ({ ...p, [openModule]: !p[openModule] }))}>
                  {completed[openModule] ? "✓ Complete" : "Mark Complete"}
                </button>
              </div>
            </div>
          </aside>
        )}
      </div>
    </div>
  );
}

// ── Field Component ────────────────────────────────────────────────────────
function Field({ sec, value, onChange, accent }) {
  if (sec.type === "textarea") return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><textarea style={A.ta} rows={4} placeholder={sec.placeholder} value={value} onChange={e => onChange(e.target.value)} /></div>;
  if (sec.type === "input") return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><input style={A.inp} placeholder={sec.placeholder} value={value} onChange={e => onChange(e.target.value)} /></div>;
  if (sec.type === "select") return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><select style={A.sel} value={value} onChange={e => onChange(e.target.value)}>{sec.options.map(o => <option key={o}>{o}</option>)}</select></div>;
  if (sec.type === "repeater") {
    const items = Array.isArray(value) ? value : [""];
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div>{items.map((it, i) => <div key={i} style={A.repRow}><input style={{ ...A.inp, flex: 1 }} placeholder={sec.placeholder} value={it} onChange={e => { const n=[...items]; n[i]=e.target.value; onChange(n); }} />{items.length>1&&<button style={A.remBtn} onClick={()=>onChange(items.filter((_,j)=>j!==i))}>✕</button>}</div>)}<button style={{ ...A.addBtn, color: accent, borderColor: accent }} onClick={() => onChange([...items, ""])}>{sec.addLabel}</button></div>;
  }
  if (sec.type === "checklist") {
    const ch = (typeof value==="object"&&!Array.isArray(value)) ? value : {};
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div>{sec.items.map(it => <div key={it} style={A.chkRow} onClick={() => onChange({ ...ch, [it]: !ch[it] })}><div style={{ ...A.chkBox, background: ch[it] ? accent : "transparent", borderColor: ch[it] ? accent : "#2e2e2e" }}>{ch[it]&&<span style={A.chkMk2}>✓</span>}</div><span style={{ ...A.chkLbl, color: ch[it] ? "#bbb" : "#555", textDecoration: ch[it] ? "line-through" : "none" }}>{it}</span></div>)}</div>;
  }
  if (sec.type === "scale") {
    const v = typeof value==="number" ? value : 3;
    const lbs = ["","Background noise","Present but tolerable","Significant pain","High urgency","Bleeding neck"];
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><div style={A.scaleHint}>{sec.hint}</div><div style={A.scaleRow}>{[1,2,3,4,5].map(n=><button key={n} style={{ ...A.scalePip, background: n<=v ? accent : "#1a1a1a", color: n<=v ? "#111" : "#444" }} onClick={()=>onChange(n)}>{n}</button>)}<span style={{ color: accent, fontSize: 10, fontStyle: "italic", marginLeft: 4 }}>{lbs[v]}</span></div></div>;
  }
  if (sec.type === "glabel-field") {
    const v = typeof value==="object" ? value : { text: "", g: "" };
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><textarea style={A.ta} rows={3} placeholder={sec.placeholder} value={v.text||""} onChange={e=>onChange({...v,text:e.target.value})} /><div style={A.glRow}><span style={A.glLbl}>G-Label:</span>{["G1","G2","G3","G4"].map(g=><button key={g} style={{ ...A.glBtn, background: v.g===g ? accent : "#1a1a1a", color: v.g===g ? "#111" : "#444", borderColor: v.g===g ? accent : "#2e2e2e" }} onClick={()=>onChange({...v,g})}>{g}</button>)}</div></div>;
  }
  if (sec.type === "competitor-table") {
    const rows = Array.isArray(value)&&value.length ? value : [{ name:"",price:"",weakness:"" }];
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div>{rows.map((r,i)=><div key={i} style={{ ...A.repRow, gap: 4, marginBottom: 4 }}><input style={{ ...A.inp, flex:2 }} placeholder="Competitor…" value={r.name} onChange={e=>{ const n=[...rows]; n[i]={...r,name:e.target.value}; onChange(n); }} /><input style={{ ...A.inp, flex:1 }} placeholder="Price…" value={r.price} onChange={e=>{ const n=[...rows]; n[i]={...r,price:e.target.value}; onChange(n); }} /><input style={{ ...A.inp, flex:2 }} placeholder="Weakness…" value={r.weakness} onChange={e=>{ const n=[...rows]; n[i]={...r,weakness:e.target.value}; onChange(n); }} /></div>)}<button style={{ ...A.addBtn, color: accent, borderColor: accent }} onClick={()=>onChange([...rows,{name:"",price:"",weakness:""}])}>+ Add competitor</button></div>;
  }
  if (sec.type === "value-stack") {
    const rows = Array.isArray(value)&&value.length ? value : [{ item:"",value:"" }];
    const total = rows.reduce((a,r)=>a+(parseFloat(r.value)||0),0);
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div>{rows.map((r,i)=><div key={i} style={{ ...A.repRow, gap:4, marginBottom:4 }}><input style={{ ...A.inp, flex:3 }} placeholder="Item…" value={r.item} onChange={e=>{ const n=[...rows]; n[i]={...r,item:e.target.value}; onChange(n); }} /><input style={{ ...A.inp, flex:1 }} placeholder="£…" value={r.value} onChange={e=>{ const n=[...rows]; n[i]={...r,value:e.target.value}; onChange(n); }} /></div>)}<button style={{ ...A.addBtn, color: accent, borderColor: accent }} onClick={()=>onChange([...rows,{item:"",value:""}])}>+ Add item</button><div style={{ fontSize:10, color:"#555", marginTop:6, paddingTop:6, borderTop:"1px solid #1a1a1a" }}>Stack total: <strong style={{ color:accent }}>£{total.toLocaleString()}</strong></div></div>;
  }
  if (sec.type === "range-input") {
    const v = (typeof value==="object"&&!Array.isArray(value)) ? value : { min:"",max:"" };
    return <div style={A.fld}><div style={A.fLbl}>{sec.label}</div><div style={{ display:"flex", gap:8, alignItems:"center" }}><input style={{ ...A.inp, flex:1 }} placeholder="Low (£)…" value={v.min} onChange={e=>onChange({...v,min:e.target.value})} /><span style={{ color:"#444" }}>–</span><input style={{ ...A.inp, flex:1 }} placeholder="High (£)…" value={v.max} onChange={e=>onChange({...v,max:e.target.value})} /></div></div>;
  }
  return null;
}
