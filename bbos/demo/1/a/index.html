function TruthMarket() {
  const [activePhase, setActivePhase] = useState("research");
  const [completed, setCompleted] = useState({});
  const [openModule, setOpenModule] = useState(null);
  const [wsData, setWsData] = useState({});
  const [notes, setNotes] = useState({});

  const currentPhase = phases.find(p => p.id === activePhase);
  const openPhase = phases.find(p => p.modules.some(m => m.id === openModule));
  const openMod = openPhase?.modules.find(m => m.id === openModule);
  const accent = openPhase?.color || currentPhase.color;

  const totalModules = phases.reduce((a, p) => a + p.modules.length, 0);
  const totalDone = Object.values(completed).filter(Boolean).length;
  const totalPct = Math.round((totalDone / totalModules) * 100);

  const phasePct = (phase) => {
    const done = phase.modules.filter(m => completed[m.id]).length;
    return { done, total: phase.modules.length, pct: Math.round((done / phase.modules.length) * 100) };
  };

  const setField = (mid, key, val) =>
    setWsData(p => ({ ...p, [mid]: { ...(p[mid] || {}), [key]: val } }));
  const getField = (mid, key, fb = "") => wsData[mid]?.[key] ?? fb;

  return (
    <div style={S.root}>
      <div style={S.grain} />
      <header style={S.header}>
        <div style={S.wordmark}>
          <span style={S.wT}>T</span><span style={S.wR}>RUTH</span>
          <span style={S.wDot}>·</span>
          <span style={S.wR}>MARKET</span>
          <span style={S.wSub}>Research Intelligence Platform</span>
        </div>
        <div style={S.hpWrap}>
          <span style={S.hpTxt}>Overall</span>
          <div style={S.hpBar}><div style={{ ...S.hpFill, width: `${totalPct}%` }} /></div>
          <span style={S.hpTxt}>{totalDone}/{totalModules}</span>
        </div>
      </header>

      <div style={S.body}>
        {/* Sidebar */}
        <nav style={S.sidebar}>
          {phases.map(ph => {
            const { done, total, pct } = phasePct(ph);
            const active = activePhase === ph.id;
            return (
              <button key={ph.id} style={{ ...S.navBtn, borderLeft: `3px solid ${active ? ph.color : "transparent"}`, background: active ? "#161616" : "transparent" }}
                onClick={() => { setActivePhase(ph.id); setOpenModule(null); }}>
                <div style={{ ...S.navDot, background: active ? ph.color : "#272727" }} />
                <div style={S.navTxt}>
                  <div style={{ ...S.navLbl, color: active ? ph.color : "#666" }}>{ph.label}</div>
                  <div style={S.navTag}>{ph.tagline}</div>
                  <div style={S.navPr}>
                    <div style={S.navPrBar}><div style={{ ...S.navPrFill, width: `${pct}%`, background: ph.color }} /></div>
                    <span style={S.navPrN}>{done}/{total}</span>
                  </div>
                </div>
              </button>
            );
          })}
          <div style={S.divider} />
          <div style={S.lgnd}>
            <div style={S.lgRow}><span style={{ ...S.lgDot, border: "1px solid #2e2e2e" }} />Not started</div>
            <div style={S.lgRow}><span style={{ ...S.lgDot, background: "#C9A84C", border: "none" }} />Complete</div>
          </div>
        </nav>

        {/* Grid */}
        <main style={{ ...S.main, maxWidth: openModule ? 300 : "100%", minWidth: openModule ? 200 : 0 }}>
          <div style={S.phHead}>
            <div>
              <div style={{ ...S.phLbl, color: currentPhase.color }}>{currentPhase.label}</div>
              <div style={S.phTag}>{currentPhase.tagline}</div>
            </div>
            <div style={S.phStat}>{(() => { const { done, total } = phasePct(currentPhase); return `${done} of ${total}`; })()}</div>
          </div>
          <div style={{ ...S.grid, gridTemplateColumns: openModule ? "1fr" : "repeat(auto-fill,minmax(190px,1fr))" }}>
            {currentPhase.modules.map(mod => {
              const done = !!completed[mod.id];
              const isOpen = openModule === mod.id;
              return (
                <div key={mod.id} style={{ ...S.card, ...(done ? S.cDone : {}), ...(isOpen ? { borderColor: currentPhase.color, background: "#1c1c1c" } : {}) }}
                  onClick={() => setOpenModule(isOpen ? null : mod.id)}>
                  <div style={S.cTop}>
                    <span style={S.cIcon}>{mod.icon}</span>
                    <button style={{ ...S.chkBtn, background: done ? currentPhase.color : "transparent", borderColor: done ? currentPhase.color : "#333" }}
                      onClick={e => { e.stopPropagation(); setCompleted(p => ({ ...p, [mod.id]: !p[mod.id] })); }}>
                      {done && <span style={S.chkMk}>✓</span>}
                    </button>
                  </div>
                  <div style={{ ...S.cTitle, color: isOpen ? "#fff" : "#bbb" }}>{mod.title}</div>
                  {isOpen && <div style={{ ...S.cHint, color: currentPhase.color }}>workspace open →</div>}
                </div>
              );
            })}
          </div>
        </main>

        {/* Detail Panel */}
        {openModule && openMod && (
          <aside style={S.panel}>
            <div style={S.panelScroll}>
              <div style={S.pHead}>
                <div>
                  <div style={{ ...S.pPhLbl, color: accent }}>{openPhase?.label}</div>
                  <div style={S.pTitle}><span style={S.pIcon}>{openMod.icon}</span>{openMod.title}</div>
                </div>
                <button style={S.closeBtn} onClick={() => setOpenModule(null)}>✕</button>
              </div>
              <div style={S.objBox}>
                <span style={{ ...S.objLbl, color: accent }}>Objective</span>
                <p style={S.objTxt}>{workspaces[openModule]?.objective}</p>
              </div>
              <div style={{ ...S.accentBar, background: accent }} />
              <div style={S.fieldStack}>
                {workspaces[openModule]?.sections.map(sec => (
                  <Section key={sec.key} sec={sec} modId={openModule}
                    value={getField(openModule, sec.key, sec.type === "repeater" ? [""] : sec.type === "checklist" ? {} : sec.type === "scale" ? 3 : sec.type === "competitor-table" ? [{ name: "", price: "", weakness: "" }] : sec.type === "value-stack" ? [{ item: "", value: "" }] : sec.type === "range-input" ? { min: "", max: "" } : sec.type === "glabel-field" ? { text: "", g: "" } : "")}
                    onChange={val => setField(openModule, sec.key, val)}
                    accent={accent} />
                ))}
                <div style={S.fld}>
                  <div style={S.fLbl}>Notes</div>
                  <textarea style={S.ta} rows={3} placeholder="Private working notes…"
                    value={notes[openModule] || ""} onChange={e => setNotes(p => ({ ...p, [openModule]: e.target.value }))} />
                </div>
              </div>
              <div style={S.actBar}>
                {workspaces[openModule]?.actions.map((a, i) => (
                  <button key={i} style={i === 0 ? { ...S.actP, background: accent } : S.actS}>{a}</button>
                ))}
                <button style={S.actC} onClick={() => setCompleted(p => ({ ...p, [openModule]: !p[openModule] }))}>
                  {completed[openModule] ? "✓ Completed" : "Mark Complete"}
                </button>
              </div>
            </div>
          </aside>
        )}
      </div>
    </div>
  );
}

function Section({ sec, modId, value, onChange, accent }) {
  if (sec.type === "textarea") return (
    <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
      <textarea style={S.ta} rows={4} placeholder={sec.placeholder} value={value} onChange={e => onChange(e.target.value)} /></div>
  );
  if (sec.type === "input") return (
    <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
      <input style={S.inp} placeholder={sec.placeholder} value={value} onChange={e => onChange(e.target.value)} /></div>
  );
  if (sec.type === "select") return (
    <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
      <select style={S.sel} value={value} onChange={e => onChange(e.target.value)}>
        {sec.options.map(o => <option key={o}>{o}</option>)}
      </select></div>
  );
  if (sec.type === "repeater") {
    const items = Array.isArray(value) ? value : [""];
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        {items.map((it, i) => (
          <div key={i} style={S.repRow}>
            <input style={{ ...S.inp, flex: 1 }} placeholder={sec.placeholder} value={it}
              onChange={e => { const n = [...items]; n[i] = e.target.value; onChange(n); }} />
            {items.length > 1 && <button style={S.remBtn} onClick={() => onChange(items.filter((_, j) => j !== i))}>✕</button>}
          </div>
        ))}
        <button style={{ ...S.addBtn, color: accent, borderColor: accent }} onClick={() => onChange([...items, ""])}>{sec.addLabel}</button>
      </div>
    );
  }
  if (sec.type === "checklist") {
    const ch = (typeof value === "object" && !Array.isArray(value)) ? value : {};
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        {sec.items.map(it => (
          <div key={it} style={S.chkRow} onClick={() => onChange({ ...ch, [it]: !ch[it] })}>
            <div style={{ ...S.chkBox, background: ch[it] ? accent : "transparent", borderColor: ch[it] ? accent : "#333" }}>
              {ch[it] && <span style={S.chkBoxMk}>✓</span>}
            </div>
            <span style={{ ...S.chkRowLbl, color: ch[it] ? "#bbb" : "#555", textDecoration: ch[it] ? "line-through" : "none" }}>{it}</span>
          </div>
        ))}
      </div>
    );
  }
  if (sec.type === "scale") {
    const v = typeof value === "number" ? value : 3;
    const labels = ["", "Background noise", "Present but tolerable", "Significant pain", "High urgency", "Bleeding neck"];
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        <div style={S.scaleHint}>{sec.hint}</div>
        <div style={S.scaleRow}>
          {[1,2,3,4,5].map(n => (
            <button key={n} style={{ ...S.scalePip, background: n <= v ? accent : "#1e1e1e", color: n <= v ? "#111" : "#444" }}
              onClick={() => onChange(n)}>{n}</button>
          ))}
          <span style={{ ...S.scaleLbl, color: accent }}>{labels[v]}</span>
        </div>
      </div>
    );
  }
  if (sec.type === "glabel-field") {
    const v = typeof value === "object" ? value : { text: "", g: "" };
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        <textarea style={S.ta} rows={3} placeholder={sec.placeholder} value={v.text || ""}
          onChange={e => onChange({ ...v, text: e.target.value })} />
        <div style={S.glRow}>
          <span style={S.glLbl}>G-Label:</span>
          {["G1","G2","G3","G4"].map(g => (
            <button key={g} style={{ ...S.glBtn, background: v.g === g ? accent : "#1a1a1a", color: v.g === g ? "#111" : "#444", borderColor: v.g === g ? accent : "#2e2e2e" }}
              onClick={() => onChange({ ...v, g })}>{g}</button>
          ))}
        </div>
      </div>
    );
  }
  if (sec.type === "competitor-table") {
    const rows = Array.isArray(value) && value.length ? value : [{ name: "", price: "", weakness: "" }];
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        {rows.map((r, i) => (
          <div key={i} style={{ ...S.repRow, gap: 4, marginBottom: 4 }}>
            <input style={{ ...S.inp, flex: 2 }} placeholder="Competitor…" value={r.name} onChange={e => { const n=[...rows]; n[i]={...r,name:e.target.value}; onChange(n); }} />
            <input style={{ ...S.inp, flex: 1 }} placeholder="Price…" value={r.price} onChange={e => { const n=[...rows]; n[i]={...r,price:e.target.value}; onChange(n); }} />
            <input style={{ ...S.inp, flex: 2 }} placeholder="Weakness…" value={r.weakness} onChange={e => { const n=[...rows]; n[i]={...r,weakness:e.target.value}; onChange(n); }} />
          </div>
        ))}
        <button style={{ ...S.addBtn, color: accent, borderColor: accent }} onClick={() => onChange([...rows, { name:"", price:"", weakness:"" }])}>+ Add competitor</button>
      </div>
    );
  }
  if (sec.type === "value-stack") {
    const rows = Array.isArray(value) && value.length ? value : [{ item: "", value: "" }];
    const total = rows.reduce((a, r) => a + (parseFloat(r.value)||0), 0);
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        {rows.map((r, i) => (
          <div key={i} style={{ ...S.repRow, gap: 4, marginBottom: 4 }}>
            <input style={{ ...S.inp, flex: 3 }} placeholder="Item…" value={r.item} onChange={e => { const n=[...rows]; n[i]={...r,item:e.target.value}; onChange(n); }} />
            <input style={{ ...S.inp, flex: 1 }} placeholder="£…" value={r.value} onChange={e => { const n=[...rows]; n[i]={...r,value:e.target.value}; onChange(n); }} />
          </div>
        ))}
        <button style={{ ...S.addBtn, color: accent, borderColor: accent }} onClick={() => onChange([...rows, { item:"", value:"" }])}>+ Add item</button>
        <div style={S.stackTot}>Stack total: <strong style={{ color: accent }}>£{total.toLocaleString()}</strong></div>
      </div>
    );
  }
  if (sec.type === "range-input") {
    const v = (typeof value === "object" && !Array.isArray(value)) ? value : { min: "", max: "" };
    return (
      <div style={S.fld}><div style={S.fLbl}>{sec.label}</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input style={{ ...S.inp, flex: 1 }} placeholder="Low (£)…" value={v.min} onChange={e => onChange({ ...v, min: e.target.value })} />
          <span style={{ color: "#444" }}>–</span>
          <input style={{ ...S.inp, flex: 1 }} placeholder="High (£)…" value={v.max} onChange={e => onChange({ ...v, max: e.target.value })} />
        </div>
      </div>
    );
  }
  return null;
}
