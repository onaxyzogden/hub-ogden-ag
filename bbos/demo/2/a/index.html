<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Barakah Business Operating System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f11;--bg2:#13161a;--bg3:#1c2026;--bg4:#232830;
  --border:#ffffff12;--border2:#ffffff1f;
  --text:#e8e3dc;--text2:#9e9690;--text3:#5c5852;
  --accent:#c9a05a;--accent2:#a07a38;--accent-bg:#c9a05a15;
  --qal:#d4974a;--qal-bg:#d4974a15;--qal-b:#d4974a40;
  --str:#5b9bd5;--str-bg:#5b9bd515;--str-b:#5b9bd540;
  --ofr:#9b7dd4;--ofr-bg:#9b7dd415;--ofr-b:#9b7dd440;
  --out:#5ab87a;--out-bg:#5ab87a15;--out-b:#5ab87a40;
  --sal:#d47560;--sal-bg:#d4756015;--sal-b:#d4756040;
  --ful:#4ab8a8;--ful-bg:#4ab8a815;--ful-b:#4ab8a840;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;overflow:hidden}
.app{display:grid;grid-template-columns:272px 1fr;grid-template-rows:52px 1fr;height:100vh}
/* topbar */
.tb{grid-column:1/-1;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg2);gap:10px;z-index:10;flex-wrap:nowrap;overflow:hidden}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--bg);line-height:1}
.tb-mark svg{width:12px;height:12px;fill:var(--bg)}
.tb-name{font-family:'DM Serif Display',serif;font-size:14px;color:var(--text)}
.tb-sep{color:var(--text3);font-size:12px;margin:0 1px}
.tb-sub{font-size:10px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.tb-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0;margin:0 2px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
/* role selector */
.role-sel-wrap{display:flex;align-items:center;gap:5px}
.role-sel-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
.role-sel{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px;gap:1px}
.rs-btn{padding:3px 10px;border-radius:4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.2px}
.rs-btn.on{color:var(--text)}
.rs-btn:not(.on){color:var(--text3)}
.rs-btn:hover:not(.on){color:var(--text2)}
/* view seg */
.seg{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px;gap:1px}
.sg-btn{padding:3px 10px;border-radius:4px;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;letter-spacing:.2px}
.sg-btn.on{background:var(--bg4);color:var(--text)}
.sg-btn:hover:not(.on){color:var(--text2)}
.tb-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
/* sidebar */
.sb{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:var(--bg4)}
.role-banner{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.role-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.role-banner-info{flex:1;min-width:0}
.role-banner-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.2}
.role-banner-sub{font-size:10px;color:var(--text3)}
.sb-top{padding:8px 14px;border-bottom:1px solid var(--border)}
.sb-overview{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;width:100%;transition:all .12s}
.sb-overview:hover,.sb-overview.on{background:var(--accent-bg);color:var(--accent)}
.sb-overview svg{width:12px;height:12px;flex-shrink:0}
.sb-sec{border-bottom:1px solid var(--border)}
.sb-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 6px;cursor:pointer;user-select:none}
.sb-sec-hdr:hover{background:var(--bg3)}
.sb-sec-code{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sb-sec-attr{font-size:9px;color:var(--text3);font-style:italic;margin-top:1px}
.sb-sec-right{display:flex;align-items:center;gap:5px}
.sb-cnt{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:500}
.sb-chev{font-size:8px;color:var(--text3);transition:transform .15s}
.sb-chev.open{transform:rotate(0)}.sb-chev.closed{transform:rotate(-90deg)}
.sb-item{display:flex;align-items:center;padding:5px 14px 5px 12px;cursor:pointer;gap:8px;border-left:2px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--bg3)}
.sb-item.on{background:var(--accent-bg);border-left-color:var(--accent)}
.sb-item-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item-body{flex:1;min-width:0}
.sb-item-label{font-size:11px;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.on .sb-item-label{color:var(--text)}
.sb-item-sub{font-size:9px;color:var(--text3)}
.perm-pill{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0}
/* main */
.main{overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--bg4)}
/* role dashboard */
.dash{padding:24px 28px}
.dash-hdr{margin-bottom:22px}
.dash-role-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dash-avatar{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;flex-shrink:0}
.dash-role-name{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);line-height:1.2}
.dash-role-scope{font-size:13px;color:var(--text2);line-height:1.6;max-width:520px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.stat-num{font-size:22px;font-weight:500;margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--text3)}
.dash-section{margin-bottom:22px}
.dash-sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.dash-sec-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.dash-sec-line{flex:1;height:1px;background:var(--border)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;cursor:pointer;transition:all .14s}
.dash-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px)}
.dash-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:6px}
.dash-card-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.dash-card-asset{font-size:10px;color:var(--text3);line-height:1.3}
.dash-card-stage{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0;letter-spacing:.3px}
.ref-card{opacity:.7}
.ref-card:hover{opacity:1}
/* overview */
.ov{padding:24px 28px}
.ov-ey{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);font-weight:500;margin-bottom:6px}
.ov-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text);line-height:1.2;margin-bottom:8px}
.ov-sub{font-size:13px;color:var(--text2);line-height:1.7;max-width:520px;margin-bottom:24px}
.pip{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:26px}
.pip-item{flex:1;min-width:84px;padding:11px 12px;border-radius:5px;border:1px solid}
.pip-code{font-size:9px;font-weight:600;letter-spacing:.8px;margin-bottom:3px;opacity:.7}
.pip-name{font-size:11px;font-weight:500;margin-bottom:2px}
.pip-cnt{font-size:10px;opacity:.5;margin-bottom:2px}
.pip-attr{font-size:9px;opacity:.4;line-height:1.3}
.sec-div{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.sec-div-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:500;white-space:nowrap}
.sec-div-line{flex:1;height:1px;background:var(--border)}
.sec-div-cnt{font-size:10px;color:var(--text3);white-space:nowrap}
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:8px;margin-bottom:22px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;cursor:pointer;transition:all .14s}
.tc:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:6px}
.tc-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.tc-asset{font-size:10px;color:var(--text3)}
/* detail */
.det{padding:24px 28px;max-width:740px}
.bc{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:11px;color:var(--text3)}
.bc-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text3);padding:0}
.bc-btn:hover{color:var(--text2)}
.perm-banner{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:6px;margin-bottom:16px;border:1px solid}
.perm-banner-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px}
.perm-banner-desc{font-size:12px;line-height:1.5}
.det-ey{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:6px}
.det-title{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);line-height:1.25;margin-bottom:12px}
.det-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.bgo{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);color:var(--text2);background:transparent}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.det-blk{border-radius:9px;padding:13px 15px}
.det-blk-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:4px;opacity:.7}
.det-blk-val{font-size:12px;line-height:1.5}
.det-rat{border-top:1px solid var(--border);padding-top:16px;margin-bottom:22px}
.det-rat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:8px}
.det-rat-txt{font-size:13px;color:var(--text2);line-height:1.8}
.ws-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:16px 18px}
.ws-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:12px}
/* workspace */
.tabs{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:13px}
.tab{padding:6px 13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;transition:all .12s;margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text2)}
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;transition:border .15s;resize:vertical}
.fi:focus{border-color:var(--accent2)}
.fi::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.wbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:5px;background:var(--accent);color:var(--bg);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .14s;margin-top:2px}
.wbtn:hover{background:#d4a84e}
.wbtn-o{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.wbtn-o:hover{background:var(--bg3);color:var(--text)}
.wdiv{height:1px;background:var(--border);margin:11px 0}
.notice{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:5px;margin-bottom:12px;font-size:11px;line-height:1.6}
.ni{background:var(--str-bg);border:1px solid var(--str-b);color:var(--str)}
.nw{background:var(--qal-bg);border:1px solid var(--qal-b);color:var(--qal)}
.gbl{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0}
.g1b{background:var(--out-bg);color:var(--out);border:1px solid var(--out-b)}
.g2b{background:var(--str-bg);color:var(--str);border:1px solid var(--str-b)}
.g3b{background:var(--sal-bg);color:var(--sal);border:1px solid var(--sal-b)}
.g4b{background:var(--ofr-bg);color:var(--ofr);border:1px solid var(--ofr-b)}
.gb-block{background:var(--bg3);border-radius:9px;padding:10px 13px;margin-bottom:12px;border-left:3px solid}
.gb-title{font-size:11px;font-weight:500;margin-bottom:2px}
.gb-sub{font-size:10px;color:var(--text2);line-height:1.5}
.chk-list{display:flex;flex-direction:column;gap:6px}
.chk{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.chk-box{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.chk-box.ck{background:var(--out);border-color:var(--out)}
.chk-box.ck::after{content:'✓';font-size:8px;color:#fff}
.chk-txt{font-size:12px;color:var(--text2);line-height:1.3}
.chk-desc{font-size:10px;color:var(--text3);margin-top:1px}
.chk-txt.ck{color:var(--text3);text-decoration:line-through}
.cf-wrap{margin-bottom:12px}
.cf-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:4px}
.cf-val{font-size:12px;color:var(--text2);line-height:1.7;background:var(--bg3);border-radius:4px;padding:8px 12px;border-left:2px solid;white-space:pre-wrap}
.cf-gl{display:inline-flex;margin-top:4px;border-radius:3px;padding:2px 7px;font-size:9px;font-weight:600}
.done-badge{display:flex;align-items:center;gap:6px;padding:6px 11px;background:var(--out-bg);border:1px solid var(--out-b);border-radius:4px;margin-bottom:13px}
/* asset view */
.av{padding:24px 28px}
.av-stage{margin-bottom:26px}
.av-stage-hdr{display:flex;align-items:center;gap:9px;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.av-stage-name{font-size:13px;font-weight:500;color:var(--text)}
.av-stage-attr{font-size:10px;color:var(--text3);font-style:italic;margin-left:auto}
.av-list{display:flex;flex-direction:column;gap:1px}
.av-row{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .12s}
.av-row:first-child{border-radius:9px 9px 0 0}
.av-row:last-child{border-radius:0 0 9px 9px}
.av-row:only-child{border-radius:9px}
.av-row:not(:last-child){border-bottom-color:transparent}
.av-row:hover{background:var(--bg3);border-color:var(--border2);z-index:1}
.av-row.on{background:var(--accent-bg);border-color:var(--accent2)50}
.av-bar{width:3px;border-radius:2px 0 0 2px;flex-shrink:0}
.av-body{flex:1;padding:10px 13px;min-width:0}
.av-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px}
.av-row.on .av-name{color:var(--accent)}
.av-ref{font-size:10px;color:var(--text3)}
.av-right{display:flex;align-items:center;gap:6px;margin-right:13px;flex-shrink:0}
.av-sec{font-size:9px;color:var(--text3);background:var(--bg4);border-radius:3px;padding:1px 5px;white-space:nowrap}
/* asset detail */
.avd{padding:24px 28px;max-width:740px}
.avd-back{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0}
.avd-back:hover{color:var(--text2)}
.avd-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px}
/* tooltips — positioned via JS portal, no CSS hover */
.tip{display:inline;cursor:help;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;text-decoration-thickness:1px;text-decoration-color:var(--text3)}
.avd-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.avd-stage-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;opacity:.8}
.avd-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--text);margin-bottom:9px}
.avd-meta{display:flex;gap:6px;flex-wrap:wrap}
.avd-body{padding:16px 20px}
.avd-desc{font-size:13px;color:var(--text2);line-height:1.8}
.avd-div{height:1px;background:var(--border);margin:14px 0}
.avd-row{display:flex;gap:6px;margin-bottom:7px}
.avd-key{font-size:10px;color:var(--text3);min-width:95px;flex-shrink:0;padding-top:1px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.avd-val{font-size:12px;color:var(--text2);line-height:1.5}
.avd-rat{font-size:12px;color:var(--text3);line-height:1.7;font-style:italic}
/* view-only overlay */
.view-only{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:14px 18px;margin-top:4px}
.view-only-msg{font-size:12px;color:var(--text3);line-height:1.7}
/* dua blocks */
.dua-block{margin:0;border-top:1px solid var(--border);background:transparent}
.dua-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.dua-toggle:hover{background:var(--bg3)}
.dua-glyph{font-size:10px;flex-shrink:0;opacity:.55}
.dua-label{flex:1;min-width:0}
.dua-kind{font-size:8px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;display:block;line-height:1.2}
.dua-title-txt{font-size:10px;color:var(--text3);line-height:1.3}
.dua-chev{font-size:7px;color:var(--text3);flex-shrink:0;transition:transform .15s}
.dua-chev.open{transform:rotate(0)}.dua-chev.closed{transform:rotate(-90deg)}
.dua-body{padding:2px 14px 12px}
.dua-arabic{font-size:15px;line-height:1.9;color:var(--text);text-align:right;direction:rtl;letter-spacing:.02em;margin-bottom:8px;font-family:'DM Serif Display',serif}
.dua-trans{font-size:10px;color:var(--text3);font-style:italic;line-height:1.5;margin-bottom:4px}
.dua-meaning{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:4px}
.dua-source{font-size:9px;color:var(--text3);opacity:.6}
/* Annotation block inside dua body */
.dua-annotations{margin-top:12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);padding-top:10px}
.dua-ann-card{background:var(--bg3);border-radius:5px;padding:8px 10px}
.dua-ann-attr{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.dua-ann-text{font-size:10px;color:var(--text2);line-height:1.65}
/* Governing Attributes block */
.sb-attr-block{border-top:1px solid var(--border);background:transparent}
.sb-attr-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.sb-attr-toggle:hover{background:var(--bg3)}
.sb-attr-icon{font-size:10px;flex-shrink:0;opacity:.4;color:var(--text2)}
.sb-attr-label{flex:1;min-width:0}
.sb-attr-kind{font-size:8px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--text3);display:block;line-height:1.2}
.sb-attr-names{font-size:10px;color:var(--text3);line-height:1.3}
.sb-attr-body{padding:0 10px 10px}
.sb-attr-card{background:var(--bg3);border-radius:5px;padding:9px 11px;margin-bottom:6px}
.sb-attr-card:last-child{margin-bottom:0}
.sb-attr-card-name{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.sb-attr-card-text{font-size:10px;color:var(--text2);line-height:1.65}
/* Readiness & Reflection blocks */
.sb-readiness-block,.sb-reflect-block{border-top:1px solid var(--border);background:transparent}
.sb-readiness-toggle,.sb-reflect-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.sb-readiness-toggle:hover,.sb-reflect-toggle:hover{background:var(--bg3)}
.sb-rr-icon{font-size:11px;flex-shrink:0;opacity:.4;color:var(--text2)}
.sb-rr-label{flex:1;min-width:0}
.sb-rr-kind{font-size:8px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--text3);display:block;line-height:1.2}
.sb-rr-sub{font-size:10px;color:var(--text3);line-height:1.3}
.sb-rr-body{padding:0 10px 12px}
.sb-rr-frame{font-size:10px;color:var(--text3);font-style:italic;line-height:1.6;padding:0 4px 10px;border-bottom:1px solid var(--border);margin-bottom:10px}
.sb-rr-table{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sb-rr-col{background:var(--bg3);border-radius:5px;padding:8px 9px}

.sb-rr-col-hdr.yes{color:#4ade80}.sb-rr-col-hdr.not{color:var(--text3)}
.sb-rr-item{font-size:9px;color:var(--text2);line-height:1.55;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-rr-item:last-child{border-bottom:none;padding-bottom:0}

<script type="text/babel">

const PHASES = {
  QAL:'Foundation',
  STR:'Foundation',
  OFR:'Build',
  OUT:'Launch',
  SAL:'Launch',
  FUL:'Deliver',
};

const PHASE_ORDER = ['Foundation','Build','Launch','Deliver'];

const STATUS_META = {
  'Not Started': {color:'var(--text3)',bg:'var(--bg3)',border:'var(--border2)',dot:'○'},
  'Active':      {color:'#f59e0b',   bg:'rgba(245,158,11,.1)',border:'rgba(245,158,11,.25)',dot:'◉'},

// Sample-mode gate status per stage (blank = all Not Started)
const SAMPLE_STAGE_STATUS = {
  QAL:'Complete', STR:'Complete', OFR:'Complete',
  OUT:'Complete', SAL:'Active',   FUL:'Active',
};

/* ── GOVERNING ATTRIBUTE TOOLTIPS (Layer 1) ── */
const ATTRS = {

  QAL:{
    title:'Truth & Discernment · The Amanah Gate',
    arabic:'\u0631\u064e\u0628\u0650\u0651 \u0627\u0634\u0652\u0631\u064e\u062d\u0652 \u0644\u0650\u064a \u0635\u064e\u062f\u0652\u0631\u0650\u064a \u0648\u064e\u064a\u064e\u0633\u0650\u0651\u0631\u0652 \u0644\u0650\u064a \u0623\u064e\u0645\u0652\u0631\u0650\u064a \u0648\u064e\u0627\u062d\u0652\u0644\u064f\u0644\u0652 \u0639\u064f\u0642\u0652\u062f\u064e\u0629\u064b \u0645\u0650\u0651\u0646 \u0644\u0650\u0651\u0633\u064e\u0627\u0646\u0650\u064a \u064a\u064e\u0641\u0652\u0642\u064e\u0647\u064f\u0648\u0627 \u0642\u064e\u0648\u0652\u0644\u0650\u064a',
    trans:"Rabbi shraḥ lī ṣadrī wa yassir lī amrī wa-ḥlul 'uqdatan min lisānī yafqahū qawlī",

      {attr:'Al-Haqq · The Truth',text:'Allah is Al-Haqq — the Truth, the Real. His standard does not adjust based on how the gate decision is made. The purpose of this stage is not to find a way through the gate — it is to honestly assess whether you should enter. A gate passed from aspiration rather than fact does not become honest by clearing the stage. It produces a foundation that carries the dishonesty forward into every stage above it.'},
      {attr:'Al-Khabir · The All-Aware',text:'Allah is Al-Khabir — the All-Aware, who holds complete knowledge of what is present and what is absent. The capacity you declare at this stage is known to Al-Khabir in full — including what you have and what you don\'t, what the evidence supports and what it doesn\'t. The honest declaration made here is not for the system. It is made in the presence of the One who already knows.'},
    ],
    readiness:{
      frame:'Al-Haqq does not change based on how the gate decision is made. Al-Khabir is already holding the full picture. This check is an invitation to begin from the same truth.',

    closing:{

  OFR:{

    arabic:'\u0627\u0644\u0644\u0651\u064e\u0647\u064f\u0645\u0651\u064e \u0625\u0650\u0646\u0650\u0651\u064a \u0623\u064e\u0633\u0652\u0623\u064e\u0644\u064f\u0643\u064e \u0642\u0650\u0633\u0652\u0637\u064b\u0627 \u0641\u0650\u064a \u0627\u0644\u0631\u0650\u0651\u0636\u064e\u0627 \u0648\u064e\u0627\u0644\u0652\u063a\u064e\u0636\u064e\u0628\u0650\u060c \u0648\u064e\u0623\u064e\u0646\u0652 \u0644\u064e\u0627 \u0623\u064e\u062a\u064e\u062c\u064e\u0627\u0648\u064e\u0632\u064e \u062d\u064e\u0642\u0651\u064e \u0623\u064e\u062d\u064e\u062f\u064d',

    source:'Adapted from prophetic supplications on justice',
    annotations:[

const SECS = ['Research','Offer Builder','Launch','Fulfillment'];
const ROLE_IDX = {strat:0,copy:1,media:2,setter:3,closer:4,fulfil:5};
const PERM_LABELS = {O:'Owns',E:'Edit',V:'View','-':'No access'};
const PERM_DESCS = {
  O:'You own this asset — you approve outputs and control the stage gate.',
  E:'You can work on and submit this asset. The Strategist approves.',
  V:'You have read-only access. Use this for context only.',
  '-':'This asset is outside your role scope.',
};

function rolePerm(tool, roleId){
  if(roleId==='all') return 'O';
  const ri = ROLE_IDX[roleId];
  return ri !== undefined ? tool.perms[ri] : '-';
}

function permColor(p){
  if(p==='O') return 'var(--accent)';
  if(p==='E') return 'var(--str)';
  if(p==='V') return 'var(--text3)';
  return 'var(--text3)';
}
function permBg(p){
  if(p==='O') return 'var(--accent-bg)';
  if(p==='E') return 'var(--str-bg)';
  return 'var(--bg3)';
}
function permBorder(p){
  if(p==='O') return 'var(--accent2)40';
  if(p==='E') return 'var(--str-b)';
  return 'var(--border)';
}

function PermPill({p, size}){
  const sm = size==='sm';
  return <span className="perm-pill" style={{
    background:permBg(p),color:permColor(p),
    border:`1px solid ${permBorder(p)}`,
    fontSize: sm?'8px':'10px',
    padding: sm?'1px 5px':'3px 9px',
  }}>{p==='O'?'OWNS':p==='E'?'EDIT':p==='V'?'VIEW':'—'}</span>;
}

function Pill({k,size}){
  const s=STAGES[k];
  const sm=size==='sm';
  return <Tip term={k}><span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:sm?'2px 6px':'4px 11px',fontSize:sm?'9px':'11px',fontWeight:600,display:'inline-flex',alignItems:'center',whiteSpace:'nowrap'}}>{s.code} {k}</span></Tip>;
}

market:`## S1 — Market Definition
### The Clarity Practice · Stage 03 STR Research Factory Output

---

### Buyer Context

Muslim women in English-speaking markets (United States, United Kingdom, Canada, Australia) operating solo service businesses — coaching, consulting, brand design, copywriting, photography, and adjacent fields.

Annual revenue: $60,000–$200,000. Years operating: 3–8. Business model: primarily 1:1 client work, often priced by hour or project rather than by outcome. No structured offer and no defensible positioning statement.

They are technically excellent. Their clients get results. They are chronically underpriced relative to the outcomes they produce, and they know it — but they cannot hold the number when they say it aloud.

### Immediate Goal

Establish a positioned offer with a specific audience, a price point they can state without apologising, and a 90-day client acquisition plan they can execute immediately — without rebuilding their business from scratch or burning existing client relationships.

### Journey Stage

Post-first-success, pre-scale. The model works. The results are real. The ceiling is not a competence problem — it is a positioning and pricing problem that has compounded over years of undercharging.

### What Has Already Been Tried

Generic business coaching programs that did not account for the cultural dynamics shaping their pricing behaviour. Online pricing courses that produced a number but not the confidence to hold it. Group masterminds where they were the only Muslim woman in the room and the advice did not land in their context.

### Market Maturity Assessment

**Level 3 — Solution aware, product unaware.**

The prospect knows that positioning and pricing work exist. She may have taken a course, read a book, or heard another coach talk about it. She does not know that a solution exists that is specifically designed for the structural forces operating in her context.

Implication: messaging does not need to educate her on the concept of positioning. It needs to explain why what she has tried did not work — and why this is different.

### Secondary Audience

Muslim female creatives (brand designers, copywriters, photographers) in the $30,000–$80,000 range approaching their first pricing ceiling. Not yet the primary buyer — they are 12–18 months behind the primary segment. The pipeline cohort for Cycle 2 and beyond.

### Market Size Estimate

Approximately 180,000 Muslim female business owners active in English-speaking markets. Sub-segment with $60,000+ revenue and 3+ years operating: estimated 22,000–35,000 qualified prospects.

**G-label: G3** — estimate derived from broader Muslim female entrepreneur population statistics and service business revenue distribution data. Not directly verifiable from a single primary source. Treat as directional, not definitive.`,

pains:`## S3 — Emotional Triggers & Enemy Narrative
### The Clarity Practice · Stage 03 STR Research Factory Output

---

### Top 3 Verbatim Fears

These are exact phrases from source material — forums, direct message conversations, intake form submissions, and direct interviews. They are not paraphrased.

**F1:** "I'm terrified that if I raise my prices, every client I have will leave and I'll have to start over"

**F2:** "I don't know how to explain what I do without adding five disclaimers about why it's worth it"

**F3:** "I look at what I charge and I feel embarrassed — not because it's wrong, but because I can't defend it out loud"

---

### Top 3 Verbatim Desires

**D1:** "I want to be able to say my price without my voice going quiet at the end"

**D2:** "I just want someone to hand me a number and tell me it's right so I can stop second-guessing myself"

**D3:** "I want my clients to feel like they got a deal at the price I charged — not like I gave them a discount because I was scared"

---

### The Enemy Narrative

> The Enemy is never the client's character, choices, or mindset. The Enemy is the convergent set of forces that has produced their situation despite their efforts.

**The Enemy: The Credibility Gap System**

The Credibility Gap System is the convergent set of forces — chronic underrepresentation in mainstream business frameworks, first-generation immigrant scarcity conditioning, community social pressure to discount for "sisters," and the complete absence of visible Muslim female operators charging premium rates publicly — that has systematically trained capable, results-producing women to distrust their own market value despite documented client outcomes.

The Enemy is not a mindset problem. It is a structural absence that was never corrected, now presenting as an internal confidence failure.

**What the Enemy looks like in practice:**

· She researches what to charge and finds no one who looks like her at the price point she deserves.
· She quotes a price and immediately offers a discount before the client responds.
· She explains her services with qualifications and disclaimers that undermine the quote before it lands.
· Her community of peers operates in the same price range she does — normalising underpricing as standard.
· When she considers raising prices, she imagines the client's reaction, not the value she delivers.

**What the Enemy is not:**

· Laziness, lack of ambition, or unwillingness to do the work.
· Imposter syndrome (the generic framing that locates the problem in her psychology).
· An individual failure that a mindset shift will resolve.

The Enemy is a system. It can be named, dismantled, and replaced with a structure that holds.`,

avatar:`## S2 — VoC Buying Language Bank
### The Clarity Practice · Stage 03 STR Research Factory Output

---

> Every phrase below is verbatim from source material. No paraphrasing. The exact words someone used when the performance dropped are a window into a reality they did not consciously choose to share. Paraphrasing closes that window.

**Sources:** 3 forum threads (Muslim female entrepreneur communities), 4 direct interviews, 8 DM conversations, 7 anonymous intake form submissions.

**Total phrases collected:** 22 · **Selected for Language Bank:** 15

---

### Pricing Language

· "I don't know what I'm worth in the market — I just look at what everyone else charges and go slightly below"
· "Every time I raise my prices I spend three days dreading the conversation"
· "I charged less because I thought she might not be able to afford it — she never asked me to"
· "I said the number and then immediately said 'but we can discuss it' — I don't know why I did that"
· "I want to charge what I actually need to charge. I just don't know how to say it without apologising"

### Positioning Language

· "I can't explain what I do in one sentence without it sounding either too small or too grandiose"
· "I keep trying to niche down and then getting scared and broadening it again"
· "Every time I write my bio I feel like I'm either underselling or overpromising"
· "I don't know who my ideal client is — I work with anyone who pays me"

### Confidence and Visibility Language

· "I'm scared that if I'm specific about who I work with, I'll turn people away"
· "I see other coaches charging five figures and I genuinely don't understand what they know that I don't"
· "I feel embarrassed calling myself an expert when I still doubt my own prices"

### Community and Cultural Context

· "The sisters in my network all charge similar rates — it would feel weird to charge significantly more"
· "I feel guilty charging full price when the client is also Muslim and I know money is tight"
· "There's no one who looks like me charging what I actually want to charge. I don't know if it's possible for me"

### What They Want to Feel

salesscript:`## Sales Script — The Clarity Practice
### Stage 06 SAL Asset Factory Output · 48-Minute Call Structure

---

> This script is the covenant read aloud. Nothing new is introduced here that is not already in the Offer Covenant. An objection response that redirects without resolving is not a response — it is evasion. Every door that closes, closes with the prospect's dignity intact.

---

### Pre-Call Preparation (operator, before dialing)

Review the prospect's intake form. Know their service type, current pricing, what they've tried, and what they said success looks like. The Discovery section is not for gathering information you could have read — it is for going deeper than the form went.

---

### Opening (5 minutes)

"Before we start — there's nothing to buy today. This conversation is for you to figure out whether the Clarity Practice is the right next step for where you are. My job is to ask the right questions. Your job is to be honest. Sound fair?"

[Wait for confirmation.]

"Good. Tell me a little about where you are right now."

---

### Discovery (18 minutes — 6 questions)

Ask these in order. Do not skip. The sequence matters — each question opens the next.

**Question 1 — Current state**
"Tell me about your business. What do you do, who do you work with, and what does revenue look like right now?"

[Listen for: service type, client type, revenue range, pricing model. Do not move on until you have these.]

**Question 2 — Pricing history**
"When did you last raise your prices, and what happened?"

[Listen for: whether they raised at all, how the conversation went, whether clients pushed back or accepted. A prospect who has never raised prices is different from one who raised and lost clients.]

**Question 3 — Articulation test**
"If I asked you to describe what you do in one sentence right now — what would you say?"

[Listen for: disclaimers, qualifications, hesitation, the word "basically," any sentence that requires a follow-up to understand. Note the exact words. These will matter later.]

**Question 4 — Previous attempts**
"What have you tried so far to fix this? What happened?"

[Listen for: specific programmes, coaches, courses. What they tried tells you what hasn't worked. The answer also tells you how solution-aware they are.]

**Question 5 — Success definition**
"What would need to be true in 6 weeks for you to look back and say this was the right decision?"

[Listen for: specificity. A vague answer ("I'd feel more confident") is worth probing. A specific answer ("I'd have a price I could state and a plan to get clients at that price") confirms alignment with the Promise.]

**Question 6 — Timing**
"What's making you consider this now? Why not 6 months ago, or 6 months from now?"

[Listen for: urgency, a recent trigger (lost client, awkward pricing conversation, seeing a competitor charge more). The timing question reveals what's actually motivating the call.]

---

### Transition

"Thank you for sharing that. Let me tell you exactly what we do — and then you can tell me whether it fits."

---

### Presentation (12 minutes)

**The Promise**
"Within 6 weeks, you will have three things in writing: a positioning statement that names your specific audience and the exact transformation you produce, a price you can state without apologising, and a 90-day client acquisition plan you can begin the day after our final session."

**The Mechanism**
"We work through this in 6 weekly 90-minute sessions. The first two sessions are about naming the forces that have been working against your pricing confidence — not as a mindset problem, but as a structural reality. Sessions 3 and 4 build your positioning statement and offer one-pager together. Session 5 anchors the price using a valuation framework, not a market comparison. Session 6 builds the 90-day plan."

**The Scope Map**
"Here's what's included: the 6 sessions, a written positioning statement, an offer one-pager, a pricing calculator, the 90-day plan, and async Voxer access Monday through Thursday between sessions for questions and micro-reviews.

Here's what's not included: website copy, marketing asset production, ongoing coaching beyond the 6 weeks, and anything not on that list. I want to be clear about that so there are no surprises."

**The Guarantee**
"If you complete all 6 sessions, submit your pre-work within 48 hours before each session, and at the end of Session 6 still cannot produce a specific audience statement, a defensible price point, and a written 90-day plan — I give you 3 additional sessions at no charge, focused specifically on what's unresolved. The only condition is that you've done the pre-work."

**The Price**
"The investment is $3,500 paid in full, or $1,850 split across two payments — one at the start and one at the beginning of Week 4."

---

### Pause

"Does that match what you were looking for? And is there anything in what I described that doesn't fit your situation?"

[Listen fully before responding. Do not fill silence.]

---

### Objection Responses (8 minutes — 4 prepared)

> Each response resolves the concern. It does not redirect, reframe away from the objection, or use urgency to override it.

**Objection 1 — "I need to think about it."**
"That's completely fair. What specifically do you need to think about — is it the price, the timing, or whether this is the right fit for where you are?" [Wait.] Address exactly what they name. Do not assume.

**Objection 2 — "I can't afford it right now."**
"I hear that. Can I ask — what does your pricing look like now, and what would it look like if the positioning problem was solved in 6 weeks? I'm not asking you to justify the investment. I'm asking you to see whether the gap between where you are and where you'd be is large enough that this conversation is worth having."

If the gap is not large enough — let them go. A client who cannot afford it and will not benefit enough to recover the cost is not a fit.

**Objection 3 — "I'm not sure this will work for my situation."**
"That's a fair concern. What specifically about your situation feels different?" [Listen.] "Here's what I know from the clients I've worked with: the Credibility Gap System was affecting their pricing regardless of niche or service type. What I don't know is whether that's what's happening for you — but based on what you've shared today, [reference something specific from Discovery], I think it is. You know your situation better than I do."

**Objection 4 — "I need to check with my partner / husband / accountant."**
"Of course. What would help them feel informed? I can send a one-page summary of exactly what's included, what it costs, and what the guarantee says. Would that help?"

[Send the summary. Set a specific follow-up time — not "whenever you're ready." A specific day and time.]

---

### Close (5 minutes)

"Based on what you've shared — [reference the specific thing from Discovery that confirms the fit] — I think this is the right fit. The next step is a payment link and a Session 1 booking. We'd start [specific date]. Does that feel right?"

[If yes:] "Perfect. I'll send the contract and invoice within the hour. Once it's signed and paid, you'll get the onboarding pack — everything you need before Session 1."

[If not yet:] "What's the specific question standing between you and a yes? Let's see if I can answer it now." If it cannot be answered, set a concrete follow-up time. Do not leave it open-ended.

---

### No-Fit Close

"Based on what you've told me today, I don't think this is the right fit — and I want to be straight with you about that. [Specific reason — not vague.] That doesn't mean the problem isn't real. It means this particular offer isn't the right tool for where you are right now. [If a more appropriate resource exists, name it.] I appreciate you taking the time today."

[End the call. Do not follow up with a second pitch.]`,

settingscript:`## Setting Script — The Clarity Practice
### Stage 06 SAL Asset Factory Output · 12-Minute Qualification Call

---

> This call protects both the prospect and the operator. Disqualifying someone before the sales call is As-Sittir in practice — protecting them from entering an offer that was not designed for their situation. A setter who overlooks a disqualifier to fill the pipeline is not being helpful.

---

### Pre-Call Check

Before dialing: review the intake form. If any hard disqualifier is already visible, do not proceed to the call — send the No-Fit message instead. The call is for cases where the intake form is ambiguous or a qualifier needs to be confirmed verbally.

**Hard disqualifiers (do not proceed to call):**
· Product business, e-commerce, or any business that is not a service business
· Business with employees or contractors (this is a solo operator programme)
· Operator seeking done-for-you services
· Less than 3 years in business or revenue below $30,000

**Soft qualifiers (confirm on the call):**
· Revenue in the $60,000–$200,000 range (intake may say "around $80k" — confirm)
· No existing positioned offer (intake may be unclear — confirm)
· Muslim female (intake confirms, verbal call confirms tone and context fit)

---

### Opening (2 minutes)

"Hi [name], thanks for taking the time. This is [operator name] from the Clarity Practice. This call is short — about 10 minutes. I want to ask you a few questions to make sure our 1:1 programme is actually the right fit for where you are. Some people who apply aren't in the right place for it yet, and I'd rather tell you that now than have you on a longer call that isn't useful. Sound okay?"

[Wait for yes.]

---

### Qualification Questions (8 minutes — 5 questions)

**Q1 — Business type**
"Tell me briefly what you do and who you work with."

[Listening for: service business, solo operation, identifiable audience. If product business, e-commerce, or team-based — No-Fit.]

**Q2 — Revenue and stage**
"Roughly, where does your annual revenue sit? Ballpark is fine."

[Listening for: $60,000–$200,000 range. Below $30,000 is a No-Fit for this programme specifically — not enough market proof yet. Above $200,000 may be a different programme fit — note it, do not disqualify automatically.]

**Q3 — Current positioning**
"If I asked you to describe what you do and who you help in one sentence, what would you say?"

[Listening for: vagueness, disclaimers, hedging, the inability to produce a clean sentence. That pattern confirms the problem the offer solves. A prospect who can produce a clean, confident sentence is potentially already past the point where this programme is needed.]

**Q4 — What's been tried**
"Have you done anything before to try to sort out your positioning or pricing — a course, a coach, anything like that?"

[Listening for: solution-awareness. This is not a disqualifier — it helps the setter understand where the prospect is in the buying journey.]

**Q5 — Capacity and readiness**
"The programme is 6 weekly sessions with pre-work before each one. Do you have that kind of time and bandwidth in the next 6 weeks?"

[Listening for: capacity. A prospect who cannot commit to 6 sessions is not a fit right now — timing, not disqualification.]

---

### Booking or No-Fit (2 minutes)

**If qualified:**
"Based on what you've shared, I think this is worth a proper conversation with [operator name]. I'm going to send you a booking link for a 45-minute call — that's where you'll get the full picture of how the programme works and what it costs. The link will give you a few times in the next week. Does that work?"

[Send link immediately after the call ends.]

**If not a fit:**
"Based on what you've shared, I don't think this programme is the right fit for where you are right now — and I want to be honest with you about that. [Specific reason.] That's not a reflection on your business or what you're building. This particular programme was designed for [specific ICP description], and the fit isn't right here. [If appropriate, name a more suitable resource.] Thank you for taking the time."

[End the call. Do not soften the no-fit into an ambiguous maybe. The prospect must know clearly what the decision is.]`,

nurture:`## Nurture Sequences — The Clarity Practice

salesletter:`## Sales Letter — The Clarity Practice

executionsop:`## Execution SOP — The Clarity Practice
### Stage 07 FUL Appendix C

---

> Every delivery step traces directly to the OFR Scope Map. No step in this SOP exists outside the Scope Map. Steps designated as Ihsan additions are marked with ⧁.

---

### Pre-Delivery Baseline

Before Session 1, confirm:
· OFR Scope Map reviewed
· Promise confirmed: positioning statement, defensible price, 90-day plan — all three in writing by Session 6
· Guarantee conditions reviewed: 6 sessions, pre-work submitted within 48 hours, all three deliverables produced
· Client Intake Form complete
· IC-OFR and IC-FUL gates passed

---

### Session 1 — Enemy Identification, Part 1

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 1

**Pre-work operator reviews:** Client's one-sentence business description (Q13), what they've tried (Q12), client definition of success (Q14)

**Session structure:**
· Opening (5 min): confirm the Promise in the client's own words — what does success look like by Session 6?
· Core work (70 min): work through the 5 Credibility Gap System forces in the client's specific context. For each force: does it apply? How is it showing up? What specific behaviour does it produce?
· Close (15 min): summarise what was named. Client states in their own words: "The forces working against my pricing confidence are [...]"

**Deliverable:** Named force map — the specific Credibility Gap System components operating in this client's situation

**⧁ Ihsan addition:** Send a voice note after the session — not a summary, just an acknowledgment of what was named. "You named something today that a lot of people spend years avoiding. That matters." This is not in the Scope Map. It is Al-Wali in practice.

---

### Session 2 — Enemy Identification, Part 2 + ICP Crystallisation

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 2

**Pre-work:** Client brings 5 examples of how the forces named in Session 1 showed up in actual client conversations or pricing decisions

**Session structure:**
· Review (20 min): walk through the 5 examples. Confirm the pattern. Build the named narrative.
· ICP work (55 min): narrow the audience from current description to specific, qualifiable profile. Who specifically — not "coaches and consultants" but one type of person in one type of situation
· Close (15 min): client states ICP in one sentence. Operator confirms: could we qualify or disqualify someone against this?

**Deliverable:** Crystallised ICP — specific enough to qualify or disqualify in 2 minutes

**Milestone 1 triggered:** "I can name the forces working against my pricing confidence."
Send Milestone 1 message within 2 hours of session end.

---

### Session 3 — Positioning Statement

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 3

**Pre-work:** Client drafts their current positioning statement (one attempt, honest, not polished)

**Session structure:**
· Review draft (15 min): what is specific, what is vague, what is aspirational vs deliverable-grounded
· Build (60 min): work through the 3 positioning decisions — who specifically, what changes for them specifically, what you will and will not do — producing the statement together in the session
· Finalise (15 min): statement is reviewed until both operator and client can read it aloud without qualifying it

**Deliverable:** Written positioning statement — finalised, reviewed, in the client's hands

**QC check (IC-OFR-1 applied to client's positioning):** Can the client read this statement to a prospect and have the prospect self-select in or out? If not, the session is not complete.

**Milestone 2 triggered:** "I have a written statement that describes exactly who I serve."
Send Milestone 2 message with positioning statement PDF within 24 hours.

---

### Session 4 — Offer One-Pager

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 4

**Pre-work:** Client writes a first draft of their offer one-pager using the positioning statement as the foundation

**Session structure:**
· Review draft (20 min): apply Scope Map structure — Promise, Included, Excluded, Guarantee, Price
· Refine (55 min): fill gaps, tighten language, ensure every Included item is specific
· Finalise (15 min): offer one-pager complete and reviewed

**Deliverable:** Offer one-pager — specific enough that a client could accept or decline based on it alone

---

### Session 5 — Price Anchoring

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 5

**Pre-work:** Client completes pricing calculator template (provided by operator after Session 4) — lists each deliverable, assigns a monetary value to each, totals the stack

**Session structure:**
· Review stack (20 min): is every deliverable present? Is the PMV honest?
· Anchor (45 min): work through the valuation framework — what is this outcome worth to the person receiving it? Not market comparison — outcome value
· Moment (25 min): client states the price out loud, in the session. Operator does not fill the silence. The price must be spoken. If the client cannot say it, this work is not complete.

**Deliverable:** Pricing calculator with honest valuation framework + price stated aloud

**Milestone 3 triggered:** "I have a price I can state and justify."
Send Milestone 3 message within 2 hours.

**Guarantee check:** Can the client state the price and explain why it is right? If not, this is flagged before Session 6.

---

### Session 6 — 90-Day Plan + Delivery Close

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 6

**Pre-work:** Client drafts the first 4 weeks of their 90-day plan — specific actions, not intentions

**Session structure:**
· Review draft (20 min): are the actions specific? Do they lead toward qualified client conversations?
· Complete (50 min): build Weeks 5–12 of the plan together. Each week has a named action category and at least one specific task.
· Guarantee check (10 min): can the client produce all three deliverables — positioning statement, defensible price, 90-day plan? All three in writing, in their hands, before the session ends.
· Close (10 min): delivery summary, genuine gratitude, what happens next

**Deliverable:** Written 90-day client acquisition plan — specific, weekly, executable

**Milestone 4 triggered:** "I have a 90-day plan I can begin tomorrow."
Send Milestone 4 message with all 4 deliverables attached within 24 hours.

---

### Week 8 — Check-In (Async)

**Owner:** Operator · **Format:** Voxer voice note

**Operator sends:** "Week 8. How is the plan moving? Even a small action counts — I want to hear it. And if something stalled, that's worth talking about too. Voice note when you can."

**Milestone 5 triggered upon client response.**
Initiate primary proof capture conversation at this point.`,

const TIP_W = 284;
const TIP_PAD = 10;
const SIDEBAR_W = 276;

function Tip({term, def, children}){
  const entry = def || GLOSSARY[term] || (ATTRS[term] ? ['⧁ '+term, ATTRS[term]] : null);
  if(!entry) return <span>{children}</span>;
  const [label, desc] = Array.isArray(entry) ? entry : [term, entry];
  const [tip, setTip] = useState(null);
  const ref = useRef(null);

  const show = () => {
    if(!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Horizontal: center on term, clamped away from sidebar and right edge
    let left = r.left + r.width / 2;
    left = Math.max(SIDEBAR_W + TIP_W / 2 + TIP_PAD, left);  // never behind sidebar
    left = Math.min(vw - TIP_W / 2 - TIP_PAD, left);          // never off right edge

    // Vertical: prefer above; flip below if insufficient space
    const spaceAbove = r.top;
    const spaceBelow = vh - r.bottom;
    const above = spaceAbove >= 110 || spaceAbove >= spaceBelow;
    const top = above ? r.top - 6 : r.bottom + 6;

    setTip({left, top, above});
  };

  const hide = () => setTip(null);

  const portal = tip ? ReactDOM.createPortal(
    <div style={{
      position:'fixed',
      left: tip.left,
      top: tip.top,
      transform: tip.above ? 'translate(-50%, -100%)' : 'translateX(-50%)',
      width: TIP_W,
      background:'var(--bg4)',
      border:'1px solid var(--border2)',
      borderRadius: 8,
      padding: '10px 14px',
      zIndex: 99999,
      pointerEvents: 'none',
      boxShadow: '0 6px 24px #00000055',
      fontSize: 11,
      color: 'var(--text2)',
      lineHeight: 1.6,
      fontFamily: 'var(--font-sans, sans-serif)',
      fontStyle: 'normal',
      fontWeight: 400,
    }}>
      <span style={{display:'block',fontSize:10,fontWeight:600,color:'var(--text)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>{label}</span>
      {desc}
    </div>,
    document.body
  ) : null;

  return <>
    <span ref={ref} className="tip" onMouseEnter={show} onMouseLeave={hide}>{children}</span>
    {portal}
  </>;
}

function tipify(text, prefix=''){
  if(!text) return text;
  const keys = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
  const escaped = keys.map(k=>k.replace(/[-.*+?^${}()|[\]\\]/g,'\\$&'));
  const re = new RegExp(`(${escaped.join('|')})`, 'g');
  const parts = text.split(re);
  if(parts.length===1) return text;
  return parts.map((seg,i)=>
    GLOSSARY[seg]
      ? <Tip key={`${prefix}${i}`} term={seg}>{seg}</Tip>
      : seg
  );
}

function AttrLabel({attr, color}){
  const parts = attr.split(' · ');
  return <span>
    {parts.map((p,i)=><span key={p}>
      {i>0&&<span style={{color:'var(--text3)',margin:'0 3px'}}>·</span>}
      <Tip term={p}><span style={{color}}>{p}</span></Tip>
    </span>)}
  </span>;
}

function SLabel({v, style, className}){
  if(!v) return null;
  const m = v.match(/^(S[1-6])(?:\s*[—–-]\s*(.+))?$/);
  if(!m) return <span style={style} className={className}>{v}</span>;
  const [,code,rest] = m;
  const def = S_DEFS[code];
  if(!def) return <span style={style} className={className}>{v}</span>;
  return <Tip def={def}>
    <span style={{...style, cursor:'help', borderBottom:'1px dashed currentColor'}} className={className}>{v}</span>
  </Tip>;
}
function DocRenderer({content,stageColor}){
  if(!content) return null;
  const ac = stageColor||'var(--accent)';
  const blocks=[];
  let buf=[];
  const flush=()=>{if(buf.length){blocks.push({type:'p',text:buf.join(' ')});buf=[];}};
  content.split('\n').forEach(raw=>{
    const line=raw;
    if(line.startsWith('## ')){flush();blocks.push({type:'h2',text:line.slice(3)});}
    else if(line.startsWith('### ')){flush();blocks.push({type:'h3',text:line.slice(4)});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'callout',text:line.slice(2)});}
    else if(line.startsWith('· ')){flush();blocks.push({type:'li',text:line.slice(2)});}
    else if(line.startsWith('**') && line.endsWith('**') && line.length>4){flush();blocks.push({type:'bold',text:line.slice(2,-2)});}
    else if(line==='---'){flush();blocks.push({type:'hr'});}
    else if(line.trim()===''){flush();}
    else{buf.push(line);}
  });
  flush();
  const elems=[];
  let liGroup=[];
  const flushLi=()=>{
    if(liGroup.length){elems.push(<ul key={elems.length} style={{paddingLeft:18,marginBottom:12}}>{liGroup.map((t,i)=><li key={i} style={{fontSize:13,color:'var(--text2)',lineHeight:1.75,marginBottom:3}}>{tipify(t,`li${i}`)}</li>)}</ul>);liGroup=[];}
  };
  blocks.forEach((b,i)=>{
    if(b.type==='li'){liGroup.push(b.text);return;}
    flushLi();
    if(b.type==='h2') elems.push(<div key={i} style={{fontSize:16,fontWeight:500,color:'var(--text)',marginTop:20,marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${ac}40`}}>{b.text}</div>);
    else if(b.type==='h3') elems.push(<div key={i} style={{fontSize:13,fontWeight:500,color:ac,marginTop:16,marginBottom:6,textTransform:'uppercase',letterSpacing:'.6px'}}>{tipify(b.text,`h3${i}`)}</div>);
    else if(b.type==='callout') elems.push(<div key={i} style={{background:'var(--bg3)',borderLeft:`2px solid ${ac}`,borderRadius:'0 5px 5px 0',padding:'9px 13px',marginBottom:12,fontSize:12,color:'var(--text3)',lineHeight:1.7,fontStyle:'italic'}}>{tipify(b.text,`co${i}`)}</div>);
    else if(b.type==='bold') elems.push(<div key={i} style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:4,marginTop:8}}>{tipify(b.text,`bo${i}`)}</div>);
    else if(b.type==='hr') elems.push(<div key={i} style={{height:1,background:'var(--border)',margin:'16px 0'}}/>);
    else if(b.type==='p') elems.push(<p key={i} style={{fontSize:13,color:'var(--text2)',lineHeight:1.8,marginBottom:12}}>{tipify(b.text,`p${i}`)}</p>);
  });
  flushLi();
  return <div style={{paddingTop:4}}>{elems}</div>;
}

function WsQC({sample}){
  const icofr=[
    {k:'o1',label:'Does the Promise state a specific, deliverable-grounded outcome at G1 or G2 — written so a client could use it as a binary acceptance test?'},
    {k:'o2',label:'Is every EXCLUDED item in the Scope Map explicit enough that no client could reasonably claim they expected it?'},
    {k:'o3',label:'Does the Guarantee contain all four required elements: Trigger Condition, Scope, Remedy, and Operator-Side Boundaries?'},
    {k:'o4',label:'Is the Mechanism specific enough that a client understands what they are buying — not so generic it could describe any operator in the same field?'},
    {k:'o5',label:'Has the offer document been reviewed by someone other than the writer, using only the document itself with no verbal explanation?'},
  ];
  const icful=[
    {k:'f1',label:'Does the onboarding communication define client success in the same language used in the offer?'},
    {k:'f2',label:'Does the Client Intake Form capture constraints and access requirements — and do those constraints feed directly into the Execution SOP?'},
    {k:'f3',label:'Is the communication free of aspirational language (G4) in any context where the client could interpret it as a commitment?'},
    {k:'f4',label:'Are all next-step instructions actionable without a follow-up question — naming what to do, when, and to whom?'},
    {k:'f5',label:'Is the Proof Capture consent language present before the first milestone at which proof is collected?'},
  ];
  const allKeys = [...icofr.map(i=>i.k),...icful.map(i=>i.k)];
  const initPassed = sample ? Object.fromEntries(allKeys.map(k=>[k,true])) : {};
  const [passed,setPassed]=useState(initPassed);
  const toggle=k=>{if(!sample)setPassed(p=>({...p,[k]:!p[k]}));};
  const oScore=icofr.filter(i=>passed[i.k]).length;
  const fScore=icful.filter(i=>passed[i.k]).length;
  const allPass=oScore===5&&fScore===5;
  function Gate({label,items,score,color}){
    return <div style={{marginBottom:18}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'.8px',color:color}}>{label}</div>
        <span style={{fontSize:11,fontWeight:600,color:score===5?'var(--out)':'var(--sal)',background:score===5?'var(--out-bg)':'var(--sal-bg)',border:`1px solid ${score===5?'var(--out-b)':'var(--sal-b)'}`,borderRadius:4,padding:'1px 8px'}}>{score}/5 {score===5?'passed':'pending'}</span>
      </div>
      <div className="chk-list">
        {items.map(item=><div key={item.k} className="chk" onClick={()=>toggle(item.k)}>
          <div className={`chk-box${passed[item.k]?' ck':''}`}/>
          <div className="chk-txt" style={{fontSize:11,color:passed[item.k]?'var(--text3)':'var(--text2)',textDecoration:passed[item.k]?'line-through':'none'}}>{item.label}</div>
        </div>)}
      </div>
    </div>;
  }
  return <>
    {sample&&<DoneBadge/>}
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <div style={{flex:1,background:'var(--bg3)',border:`1px solid ${allPass?'var(--out-b)':'var(--border)'}`,borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
        <div style={{fontSize:20,fontWeight:500,color:allPass?'var(--out)':'var(--text3)',marginBottom:2}}>{oScore+fScore}/10</div>
        <div style={{fontSize:10,color:'var(--text3)'}}>Total checks passed</div>
      </div>
      <div style={{flex:1,background:allPass?'var(--out-bg)':'var(--bg3)',border:`1px solid ${allPass?'var(--out-b)':'var(--border)'}`,borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
        <div style={{fontSize:13,fontWeight:500,color:allPass?'var(--out)':'var(--text2)',marginBottom:2}}>{allPass?'Gates cleared':'Gates pending'}</div>
        <div style={{fontSize:10,color:'var(--text3)'}}>Delivery may not begin until cleared</div>
      </div>
    </div>
    <Gate label="IC-OFR — Offer document" items={icofr} score={oScore} color="var(--ofr)"/>
    <Gate label="IC-FUL — Onboarding communication" items={icful} score={fScore} color="var(--ful)"/>
    {sample&&<CF label="Stage gate decision" value="Proceed. IC-OFR gate: all 5 checks passed. IC-FUL gate: all 5 checks passed. No asset required revision before use." accent="var(--out)"/>}
    {!sample&&<button className="wbtn">Record Gate Result</button>}
  </>;
}

        <div className="det-blk-lbl" style={{color:s.c}}>Governing attribute</div>
        <div className="det-blk-val" style={{color:s.c}}>{s.attr}</div>
      </div>
      <div className="det-blk" style={{background:'var(--bg2)',border:'1px solid var(--border)'}}>

/* ── ASSET VIEW ── */
function AssetDetail({tool,onBack,role,sample}){
  const s=STAGES[tool.stage];
  const p=role.id==='all'?'O':rolePerm(tool,role.id);
  const doc = sample
    ? (DOC[tool.id] || (S.notes[tool.id] ? `## ${tool.label}\n\n${S.notes[tool.id]}` : null))
    : null;
  const [tab,setTab]=useState(doc?'asset':'meta');

  if(p==='-') return <ScopeGate tool={tool} role={role}/>;
  return <div className="avd">
    <button className="avd-back" onClick={onBack}>&#8592; All assets</button>
    {role.id!=='all'&&<div className="perm-banner" style={{background:permBg(p),borderColor:permBorder(p),marginBottom:14}}>
      <PermPill p={p} size="md"/>
      <span className="perm-banner-desc" style={{color:permColor(p)}}>{PERM_DESCS[p]}</span>
    </div>}
    <div className="avd-card">
      <div className="avd-hdr" style={{borderTop:`3px solid ${s.c}`}}>
        <div className="avd-stage-lbl" style={{color:s.c}}>Stage {s.code} {s.key} · {s.name}</div>
        <div className="avd-title">{tool.label}</div>
        <div className="avd-meta" style={{marginBottom:doc?12:0}}>
          <SLabel v={tool.asset} style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:'2px 8px',fontSize:9,fontWeight:600}}/>
          <span style={{fontSize:9,color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px'}}>{tool.sec}</span>
        </div>
        {doc&&<div style={{display:'flex',gap:2,borderTop:'1px solid var(--border)',marginTop:4,paddingTop:2}}>
          <button onClick={()=>setTab('meta')} style={{padding:'6px 14px',border:'none',borderBottom:`2px solid ${tab==='meta'?s.c:'transparent'}`,background:'transparent',color:tab==='meta'?s.c:'var(--text3)',fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>Reference</button>
          <button onClick={()=>setTab('asset')} style={{padding:'6px 14px',border:'none',borderBottom:`2px solid ${tab==='asset'?s.c:'transparent'}`,background:'transparent',color:tab==='asset'?s.c:'var(--text3)',fontSize:11,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>Full asset</button>
        </div>}
      </div>
      <div className="avd-body">
        {(!doc||tab==='meta')&&<>
          <p className="avd-desc">{tool.desc}</p>
          <div className="avd-div"/>
          <div className="avd-row"><span className="avd-key">BBOS section</span><span className="avd-val">{tool.bsec}</span></div>
          <div className="avd-row"><span className="avd-key">Asset</span><span className="avd-val"><SLabel v={tool.asset}/></span></div>
          <div className="avd-row"><span className="avd-key">Governs</span><span className="avd-val" style={{color:s.c}}>{s.attr}</span></div>
          <div className="avd-div"/>
          <p className="avd-rat">{tool.rat}</p>
        </>}
        {doc&&tab==='asset'&&<DocRenderer content={doc} stageColor={s.c}/>}
      </div>
    </div>
  </div>;
}

function AssetView({selId,setSelId,role,sample}){
  const tool=TOOLS.find(t=>t.id===selId);
  if(tool) return <AssetDetail tool={tool} onBack={()=>setSelId(null)} role={role} sample={sample}/>;
  const byStage={};
  Object.keys(STAGES).forEach(k=>{byStage[k]=[];});
  TOOLS.forEach(t=>{
    if(!byStage[t.stage]) return;
    if(role.id==='all'||rolePerm(t,role.id)!=='-') byStage[t.stage].push(t);
  });
  return <div className="av">
    {Object.values(STAGES).map(s=>{
      const items=byStage[s.key]||[];
      if(!items.length) return null;
      return <div key={s.key} className="av-stage">
        <div className="av-stage-hdr">
          <span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:3,padding:'2px 8px',fontSize:9,fontWeight:600}}>{s.code} {s.key}</span>
          <span className="av-stage-name">{s.name}</span>
          <span className="av-stage-attr">{s.attr}</span>
        </div>
        <div className="av-list">
          {items.map(t=>{
            const p=role.id==='all'?'O':rolePerm(t,role.id);
            return <div key={t.id} className={`av-row${selId===t.id?' on':''}`} onClick={()=>setSelId(t.id)}>
              <div className="av-bar" style={{background:s.c+'55'}}/>
              <div className="av-body">
                <div className="av-name">{t.label}</div>
                <div className="av-ref"><SLabel v={t.asset}/></div>
              </div>
              <div className="av-right">
                {role.id!=='all'&&<PermPill p={p} size="sm"/>}
                <span className="av-sec">{t.sec}</span>
              </div>
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

/* ── OVERVIEW ── */
function Overview({onSelect, role, sample}){
  const byStage={};
  Object.keys(STAGES).forEach(k=>{byStage[k]=[];});
  TOOLS.forEach(t=>{
    if(!byStage[t.stage]) return;
    if(role.id==='all'||rolePerm(t,role.id)!=='-') byStage[t.stage].push(t);
  });

  function stageStatus(key){
    if(!sample) return 'Not Started';
    return SAMPLE_STAGE_STATUS[key]||'Not Started';
  }
  function toolFilled(t){
    return sample && !!(DOC[t.id]||S.notes[t.id]);
  }

  const stages = Object.values(STAGES);

  return <div className="ov">
    <div className="ov-ey">Barakah Business Operating System</div>
    <div className="ov-title">{/* ⚑ NEEDS NAME */}<br/>Pipeline Map</div>
    <div className="ov-sub">Every tool in this system maps to a BBOS pipeline stage with a governing attribute. No outreach without research. No research without qualification. No offer without honest valuation.</div>

    {/* PIP STRIP — now with status badges */}
    <div className="pip">
      {stages.map(s=>{
        const cnt=(byStage[s.key]||[]).length;
        const st=stageStatus(s.key);
        const sm=STATUS_META[st];
        return <div key={s.key} className="pip-item" style={{background:s.bg,borderColor:s.b,color:s.c}}>
          <div className="pip-code">{s.code}</div>
          <div className="pip-name">{s.name}</div>
          <div className="pip-cnt">{cnt} tools</div>
          <div className="pip-attr">{s.attr}</div>
          <div style={{marginTop:6,display:'inline-flex',alignItems:'center',gap:4,padding:'2px 7px',borderRadius:20,background:sm.bg,border:`1px solid ${sm.border}`}}>
            <span style={{fontSize:8,color:sm.color}}>{sm.dot}</span>
            <span style={{fontSize:8,fontWeight:600,color:sm.color,letterSpacing:'.4px'}}>{st}</span>
          </div>
        </div>;
      })}
    </div>

    {/* STAGE BLOCKS — grouped with phase dividers */}
    {(()=>{
      let lastPhase=null;
      return stages.map(s=>{
        const items=byStage[s.key]||[];
        if(!items.length) return null;
        const phase=PHASES[s.key];
        const st=stageStatus(s.key);
        const sm=STATUS_META[st];
        const showDivider = phase!==lastPhase;
        lastPhase=phase;
        return <div key={s.key}>
          {showDivider&&<div style={{display:'flex',alignItems:'center',gap:10,margin:'28px 0 16px'}}>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:'1.2px',textTransform:'uppercase',color:'var(--text3)',whiteSpace:'nowrap'}}>{phase}</span>
            <span style={{flex:1,height:1,background:'var(--border)'}}/>
          </div>}
          {/* Stage header */}
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12,gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:'3px 9px',fontSize:9,fontWeight:700,letterSpacing:'.5px',flexShrink:0}}>
                {s.code} · {s.name.toUpperCase()}
              </span>
              <span style={{fontSize:11,color:'var(--text3)',fontStyle:'italic'}}>{s.attr}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <span style={{fontSize:9,color:'var(--text3)'}}>{phase}</span>
              <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:20,background:sm.bg,border:`1px solid ${sm.border}`}}>
                <span style={{fontSize:9,color:sm.color}}>{sm.dot}</span>
                <span style={{fontSize:9,fontWeight:600,color:sm.color,letterSpacing:'.4px'}}>{st}</span>
              </span>
            </div>
          </div>
          {/* Tool cards */}
          <div className="tc-grid" style={{marginBottom:8}}>
            {items.map(t=>{
              const filled=toolFilled(t);
              return <div key={t.id} className="tc" onClick={()=>onSelect(t.id)}>
                <div className="tc-top">
                  <div className="tc-name">{t.label}</div>
                  {sample&&<span style={{
                    fontSize:8,padding:'2px 7px',borderRadius:20,flexShrink:0,fontWeight:600,letterSpacing:'.3px',
                    background:filled?'rgba(74,222,128,.12)':'var(--bg3)',
                    color:filled?'#4ade80':'var(--text3)',
                    border:filled?'1px solid rgba(74,222,128,.25)':'1px solid var(--border)',
                  }}>{filled?'● Filled':'○ Empty'}</span>}
                </div>
                <div className="tc-asset"><SLabel v={t.asset}/></div>
              </div>;
            })}
          </div>
        </div>;
      });
    })()}
  </div>;
}

function DuaBlock({dua, kind, stageColor, stageKey}){
  const [open,setOpen]=useState(false);
  const isClosing = kind==='closing';
  const annotations = (!isClosing && stageKey && DUAS[stageKey]) ? DUAS[stageKey].annotations : null;
  return <div className="dua-block">
    <button className="dua-toggle" onClick={()=>setOpen(o=>!o)}>
      <span className="dua-glyph" style={{color:stageColor}}>⧁</span>
      <span className="dua-label">
        <span className="dua-kind" style={{color:stageColor}}>{isClosing?'Closing Dua':'Opening Dua'}</span>
        <span className="dua-title-txt">{dua.title}</span>
      </span>
      <span className={`dua-chev ${open?'open':'closed'}`}>▾</span>
    </button>
    {open&&<div className="dua-body">
      <div className="dua-arabic">{dua.arabic}</div>
      <div className="dua-trans">{dua.trans}</div>
      <div className="dua-meaning">{dua.meaning}</div>
      <div className="dua-source">{dua.source}</div>
      {annotations&&annotations.length>0&&<>
        <div style={{height:1,background:'var(--border)',margin:'10px 0'}}/>
        {annotations.map((a,i)=><div key={i} style={i>0?{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}:{}}>
          <div style={{fontSize:9,fontWeight:600,color:stageColor,textTransform:'uppercase',letterSpacing:'.8px',marginBottom:4}}>⧁ {a.attr}</div>
          <div style={{fontSize:11,color:'var(--text3)',lineHeight:1.65,fontStyle:'italic'}}>{a.text}</div>
        </div>)}
      </>}
    </div>}
  </div>;
}

function AttributeBlock({stageKey, stageColor}){
  const d = DUAS[stageKey];
  if(!d||!d.annotations||!d.annotations.length) return null;
  const [open,setOpen]=useState(false);
  const names = d.annotations.map(a=>a.attr.split(' · ')[0]).join(' · ');
  return <div className="dua-block">
    <button className="dua-toggle" onClick={()=>setOpen(o=>!o)}>
      <span className="dua-glyph" style={{color:stageColor}}>⧁</span>
      <span className="dua-label">
        <span className="dua-kind" style={{color:stageColor}}>Governing Attributes</span>
        <span className="dua-title-txt">{names}</span>
      </span>
      <span className={`dua-chev ${open?'open':'closed'}`}>▾</span>
    </button>
    {open&&<div className="dua-body">
      {d.annotations.map((a,i)=><div key={i} style={i>0?{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}:{}}>
        <div style={{fontSize:10,fontWeight:600,color:stageColor,textTransform:'uppercase',letterSpacing:'.8px',marginBottom:5}}>⧁ {a.attr}</div>
        <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.7,fontStyle:'italic'}}>{a.text}</div>
      </div>)}
    </div>}
  </div>;
}

function ReadinessBlock({stageKey, stageColor}){
  const d = DUAS[stageKey];
  if(!d||!d.readiness) return null;
  const r = d.readiness;
  const [open,setOpen]=useState(false);
  return <div className="dua-block">

        <span className="dua-kind" style={{color:stageColor}}>Opening Readiness Check</span>
        <span className="dua-title-txt">Before you begin</span>

      <span className={`dua-chev ${open?'open':'closed'}`}>▾</span>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

function ReflectionBlock({stageKey, stageColor}){

  if(!d||!d.reflection) return null;
  const r = d.reflection;

        <span className="dua-kind" style={{color:stageColor}}>Closing Reflection</span>
        <span className="dua-title-txt">Before you close this stage</span>
      </span>
      <span className={`dua-chev ${open?'open':'closed'}`}>▾</span>

    {open&&<div className="dua-body">

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div>
          <div style={{fontSize:9,fontWeight:600,color:stageColor,textTransform:'uppercase',letterSpacing:'.8px',marginBottom:7}}>Were governing when</div>
          {r.governing.map((s,i)=><div key={i} style={{fontSize:11,color:'var(--text2)',lineHeight:1.65,marginBottom:7,paddingLeft:8,borderLeft:`2px solid ${stageColor}55`}}>{s}</div>)}
