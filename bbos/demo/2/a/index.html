function App(){
  const [selId,setSelId]=useState(null);
  const [collapsed,setCol]=useState({});
  const [view,setView]=useState('pipeline');
  const [sample,setSample]=useState(false);
  const [roleId,setRoleId]=useState('all');
  const role=ROLES.find(r=>r.id===roleId)||ROLES[0];
  const selTool=TOOLS.find(t=>t.id===selId);
  const toggleCol=k=>setCol(c=>({...c,[k]:!c[k]}));
  const switchView=v=>setView(v);
  const switchRole=id=>{ setRoleId(id); };
  const switchSample=v=>{ setSample(v); };

  const sidebarTools = roleId==='all'
    ? TOOLS
    : TOOLS.filter(t=>rolePerm(t,roleId)!=='-');

  const toolsByStage={};
  Object.keys(STAGES).forEach(k=>{toolsByStage[k]=[];});
  sidebarTools.forEach(t=>{toolsByStage[t.stage]&&toolsByStage[t.stage].push(t);});

  function mainContent(){
    if(view==='asset') return <AssetView selId={selId} setSelId={setSelId} role={role} sample={sample}/>;
    if(selTool) return <ToolDetail tool={selTool} onBack={()=>setSelId(null)} sample={sample} role={role}/>;
    return <Overview onSelect={setSelId} role={role} sample={sample}/>;
  }

  return <div className="app">
    {/* TOPBAR */}
    <div className="tb">
      <div className="tb-logo">
        <div className="tb-mark" style={{fontSize:15,fontWeight:700,letterSpacing:0}}>⧁</div>
        <span className="tb-name">Barakah Business Operating System</span>
      </div>
      <div className="tb-divider"/>
      <div className="role-sel-wrap">
        <span className="role-sel-lbl">Role</span>
        <div className="role-sel">
          {ROLES.map(r=><button key={r.id} className={`rs-btn${roleId===r.id?' on':''}`}
            style={roleId===r.id?{background:r.bg,color:r.color}:{}}
            onClick={()=>switchRole(r.id)}>{r.id==='all'?'All':r.label}</button>)}
        </div>
      </div>
      <div className="tb-right">
        <div className="seg">
          <button className={`sg-btn${view==='pipeline'?' on':''}`} onClick={()=>switchView('pipeline')}>Pipeline</button>
          <button className={`sg-btn${view==='asset'?' on':''}`} onClick={()=>switchView('asset')}>Assets</button>
        </div>
        <div className="seg">
          <button className={`sg-btn${!sample?' on':''}`} onClick={()=>switchSample(false)}>Blank</button>
          <button className={`sg-btn${sample?' on':''}`} onClick={()=>switchSample(true)}>Sample ✦</button>
        </div>
        {sample&&<span className="tb-badge" style={{background:'var(--out-bg)',color:'var(--out)',border:'1px solid var(--out-b)'}}>The Clarity Practice</span>}
      </div>
    </div>

    {/* SIDEBAR */}
    <div className="sb">
      {roleId!=='all'&&<div className="role-banner">
        <div className="role-avatar" style={{background:role.bg,color:role.color}}>{role.initials}</div>
        <div className="role-banner-info">
          <div className="role-banner-name">{role.label}</div>
          <div className="role-banner-sub">{sidebarTools.length} tools in scope</div>
        </div>
      </div>}
      <div className="sb-top">
        <button className={`sb-overview${!selId?' on':''}`} onClick={()=>setSelId(null)}>
          <svg viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
          {roleId!=='all'?role.label+' Dashboard':view==='asset'?'All Assets':'Pipeline Overview'}
        </button>
      </div>
      {Object.values(STAGES).map(s=>{
        const items=toolsByStage[s.key]||[];
        if(!items.length) return null;
        const open=!collapsed[s.key];
        return <div key={s.key} className="sb-sec">
          <div className="sb-sec-hdr" onClick={()=>toggleCol(s.key)} style={{borderLeft:`2px solid ${s.c}40`}}>
            <div>
              <div className="sb-sec-code" style={{color:s.c}}><Tip term={s.key}>{s.code} — {s.name}</Tip></div>
              <div className="sb-sec-attr">{s.attr}</div>
            </div>
            <div className="sb-sec-right">
              <span className="sb-cnt" style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`}}>{items.length}</span>
              <span className={`sb-chev ${open?'open':'closed'}`}>▾</span>
            </div>
          </div>
          {open&&<>
            {DUAS[s.key]&&<DuaBlock dua={DUAS[s.key]} kind="opening" stageColor={s.c} stageKey={s.key}/>}
            <AttributeBlock stageKey={s.key} stageColor={s.c}/>
            <ReadinessBlock stageKey={s.key} stageColor={s.c}/>
            {items.map(t=>{
              const p=roleId==='all'?'O':rolePerm(t,roleId);
              return <div key={t.id} className={`sb-item${selId===t.id?' on':''}`} onClick={()=>setSelId(t.id)}>
                <div className="sb-item-dot" style={{background:s.c+'90'}}/>
                <div className="sb-item-body">
                  <div className="sb-item-label">{t.label}</div>
                  <div className="sb-item-sub">{t.sec}</div>
                </div>
                {roleId!=='all'&&<PermPill p={p} size="sm"/>}
              </div>;
            })}
            <ReflectionBlock stageKey={s.key} stageColor={s.c}/>
            <DuaBlock dua={DUAS[s.key]?.closing||{...CLOSING_DUA,title:'Closing'}} kind="closing" stageColor={s.c}/>
          </>}
        </div>;
      })}
    </div>

    {/* MAIN */}
    <div className="main">{mainContent()}</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
