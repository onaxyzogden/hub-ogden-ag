<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TruthMarket × BBOS — hub.ogden.ag</title>
<meta name="description" content="TruthMarket platform mapped to the Barakah Business Operating System pipeline."/>
<meta property="og:title" content="TruthMarket × BBOS"/>
<meta property="og:description" content="31 tools. 6 stages. One pipeline built on integrity."/>
<meta property="og:url" content="https://hub.ogden.ag"/>
<meta name="canonical" content="https://hub.ogden.ag"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f11;
  --bg2:#13161a;
  --bg3:#1c2026;
  --bg4:#232830;
  --border:#ffffff12;
  --border2:#ffffff1f;
  --text:#e8e3dc;
  --text2:#9e9690;
  --text3:#5c5852;
  --accent:#c9a05a;
  --accent2:#a07a38;
  --accent-bg:#c9a05a15;
  --radius:10px;
  --radius-sm:6px;

  --qal:#d4974a;--qal-bg:#d4974a18;--qal-border:#d4974a40;
  --str:#5b9bd5;--str-bg:#5b9bd518;--str-border:#5b9bd540;
  --ofr:#9b7dd4;--ofr-bg:#9b7dd418;--ofr-border:#9b7dd440;
  --out:#5ab87a;--out-bg:#5ab87a18;--out-border:#5ab87a40;
  --sal:#d47560;--sal-bg:#d4756018;--sal-border:#d4756040;
  --ful:#4ab8a8;--ful-bg:#4ab8a818;--ful-border:#4ab8a840;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border);background:var(--bg2);gap:16px;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:26px;height:26px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;fill:var(--bg)}
.logo-text{font-family:'DM Serif Display',serif;font-size:15px;letter-spacing:.3px;color:var(--text)}
.logo-sep{color:var(--text3);font-size:13px;margin:0 4px}
.logo-sub{font-size:12px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent2)40;font-weight:500}
.progress-bar{display:flex;align-items:center;gap:4px}
.pb-dot{width:7px;height:7px;border-radius:50%}
.pb-dot.done{background:var(--out)}
.pb-dot.active{background:var(--accent)}
.pb-dot.pending{background:var(--bg4)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg4)}
.nav-section{border-bottom:1px solid var(--border)}
.nav-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px;cursor:pointer;user-select:none}
.nav-section-hdr:hover{background:var(--bg3)}
.nav-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.nav-section-count{font-size:10px;color:var(--text3);background:var(--bg4);padding:1px 6px;border-radius:10px}
.nav-chevron{font-size:8px;color:var(--text3);transition:transform .2s}
.nav-chevron.open{transform:rotate(0)}
.nav-chevron.closed{transform:rotate(-90deg)}
.nav-item{display:flex;align-items:center;padding:7px 18px 7px 16px;cursor:pointer;gap:10px;border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--bg3)}
.nav-item.active{background:var(--accent-bg);border-left-color:var(--accent)}
.nav-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-item-label{font-size:13px;color:var(--text2);flex:1;line-height:1.3}
.nav-item.active .nav-item-label{color:var(--text)}
.nav-item-stage{font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.3px}

/* PIPELINE NAV */
.pipeline-nav{padding:14px 18px;border-bottom:1px solid var(--border)}
.pipeline-nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit;transition:all .12s}
.pipeline-nav-btn:hover{background:var(--bg3)}
.pipeline-nav-btn.active{background:var(--accent-bg);color:var(--accent)}
.pipeline-nav-btn svg{width:14px;height:14px;flex-shrink:0}

/* MAIN */
.main{overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--bg4)}

/* OVERVIEW */
.overview{padding:28px 32px}
.overview-hero{margin-bottom:28px}
.overview-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);font-weight:500;margin-bottom:8px}
.overview-title{font-family:'DM Serif Display',serif;font-size:30px;color:var(--text);line-height:1.25;margin-bottom:10px}
.overview-sub{font-size:14px;color:var(--text2);line-height:1.7;max-width:560px}
.stage-pipeline{display:flex;gap:2px;margin-bottom:32px;flex-wrap:wrap}
.stage-pip-item{flex:1;min-width:90px;padding:14px 14px 12px;border-radius:var(--radius-sm);border:1px solid;cursor:pointer;transition:all .15s}
.stage-pip-item:hover{transform:translateY(-1px)}
.stage-pip-code{font-size:10px;font-weight:500;letter-spacing:.8px;opacity:.7;margin-bottom:5px}
.stage-pip-name{font-size:12px;font-weight:500;margin-bottom:3px}
.stage-pip-count{font-size:10px;opacity:.6}
.stage-pip-attr{font-size:9px;opacity:.5;margin-top:4px;line-height:1.4}
.section-divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-divider-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:500;white-space:nowrap}
.section-divider-line{flex:1;height:1px;background:var(--border)}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:28px}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s}
.tool-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.tool-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.tool-card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.tool-card-stage{font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0;letter-spacing:.3px;margin-top:2px}
.tool-card-asset{font-size:11px;color:var(--text3);line-height:1.4}

/* DETAIL */
.detail{padding:28px 32px;max-width:780px}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12px;color:var(--text3)}
.breadcrumb-sep{color:var(--text3)}
.breadcrumb-link{color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;padding:0}
.breadcrumb-link:hover{color:var(--text2)}
.detail-header{margin-bottom:24px}
.detail-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:8px}
.detail-title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.25;color:var(--text);margin-bottom:14px}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.badge{font-size:11px;font-weight:500;padding:4px 12px;border-radius:5px;letter-spacing:.3px}
.badge-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.detail-block{border-radius:var(--radius);padding:16px 18px}
.detail-block-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px;opacity:.7}
.detail-block-value{font-size:13px;line-height:1.5}
.detail-rationale{border-top:1px solid var(--border);padding-top:20px;margin-bottom:28px}
.detail-rationale-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:10px}
.detail-rationale-text{font-size:14px;color:var(--text2);line-height:1.8}
.detail-workspace{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
.workspace-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:14px}
.field-group{margin-bottom:16px}
.field-label{font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:500}
.field-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border .15s;resize:vertical}
.field-input:focus{border-color:var(--accent2)}
.field-input::placeholder{color:var(--text3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ws-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:var(--radius-sm);background:var(--accent);color:var(--bg);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;margin-top:4px}
.ws-btn:hover{background:#d4a84e}
.ws-btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.ws-btn-outline:hover{background:var(--bg3);color:var(--text)}
.ws-divider{height:1px;background:var(--border);margin:16px 0}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:4px;background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.gate-block{background:var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;border-left:3px solid}
.gate-block-title{font-size:12px;font-weight:500;margin-bottom:4px}
.gate-block-text{font-size:12px;color:var(--text2);line-height:1.6}
.checklist{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.check-box{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.check-box.checked{background:var(--out);border-color:var(--out)}
.check-box.checked::after{content:'✓';font-size:9px;color:#fff;line-height:1}
.check-text{font-size:13px;color:var(--text2);line-height:1.4}
.check-text.checked{color:var(--text3);text-decoration:line-through}
.notice{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius-sm);margin-bottom:16px}
.notice-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.notice-text{font-size:12px;line-height:1.6}
.notice.info{background:var(--str-bg);border:1px solid var(--str-border);color:var(--str)}
.notice.warning{background:var(--qal-bg);border:1px solid var(--qal-border);color:var(--qal)}
.glabel{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:10px;font-weight:600;flex-shrink:0}
.g1{background:#5ab87a22;color:var(--out);border:1px solid var(--out-border)}
.g2{background:#5b9bd522;color:var(--str);border:1px solid var(--str-border)}
.g3{background:#d4756022;color:var(--sal);border:1px solid var(--sal-border)}
.g4{background:#9b7dd422;color:var(--ofr);border:1px solid var(--ofr-border)}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all .12s;margin-bottom:-1px;letter-spacing:.3px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text2)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback } = React;

const STAGES = {
  QAL:{code:'01',key:'QAL',name:'Qualification',attr:'Al-Haqq · Al-Khabir',color:'var(--qal)',bg:'var(--qal-bg)',border:'var(--qal-border)'},
  STR:{code:'02',key:'STR',name:'Strategy',attr:'Al-Basir',color:'var(--str)',bg:'var(--str-bg)',border:'var(--str-border)'},
  OFR:{code:'03',key:'OFR',name:'Offer',attr:'Al-Adl · Al-Muqsit',color:'var(--ofr)',bg:'var(--ofr-bg)',border:'var(--ofr-border)'},
  OUT:{code:'04',key:'OUT',name:'Outreach',attr:'Ar-Razzaq · As-Sittir',color:'var(--out)',bg:'var(--out-bg)',border:'var(--out-border)'},
  SAL:{code:'05',key:'SAL',name:'Sales',attr:'Ar-Razzaq · Al-Latif',color:'var(--sal)',bg:'var(--sal-bg)',border:'var(--sal-border)'},
  FUL:{code:'06',key:'FUL',name:'Fulfillment',attr:'Al-Muhsin · Al-Wali',color:'var(--ful)',bg:'var(--ful-bg)',border:'var(--ful-border)'},
};

const TOOLS = [
  // RESEARCH
  {id:'market',label:"Find Your Market",section:'Research',stage:'STR',asset:'S1 — Market Definition',bbosSection:'Research Factory',
   desc:'Define the target buyer\'s current situation and operating context before any strategy is built.',
   rationale:'This is the first output of the STR Research Factory. No Enemy Narrative, VoC Bank, or Amanah Content Engine can begin without a grounded Market Definition. A definition built from assumption rather than data will distort every downstream asset.',
   workspace:'market'},
  {id:'pains',label:'Find Bleeding-Neck Pains',section:'Research',stage:'STR',asset:'S3 — Emotional Triggers & Enemy Narrative',bbosSection:'Research Factory',
   desc:'Extract verbatim fears and desires from VoC data. Name the Enemy as a convergent system of forces.',
   rationale:'The Enemy is named as a convergent set of cultural, economic, or systemic forces — not the prospect\'s character or choices. This is what separates messaging that heals from messaging that wounds.',
   workspace:'pains'},
  {id:'solution',label:'Build Your Solution',section:'Research',stage:'OFR',asset:'Asset 3 — Mechanism',bbosSection:'Asset Factory',
   desc:'Define the specific ethical process that reliably produces the promised result.',
   rationale:'The Mechanism must be verifiable at G1 or G2 before the offer is designed. A Mechanism labelled G3 cannot anchor a G1 Promise. The Mechanism is what makes the offer honest rather than aspirational.',
   workspace:'solution'},
  {id:'icp',label:'ICP Segmentation',section:'Research',stage:'OFR',asset:'Asset 2 — Ideal Customer Profile',bbosSection:'Asset Factory',
   desc:'Build the ICP specific enough to qualify or disqualify a prospect at the Sales stage.',
   rationale:'An ICP built from assumption rather than VoC data produces SAL stage failures. The ICP is not a description of who the operator wants to serve — it is a portrait constructed from what the data revealed.',
   workspace:'icp'},
  {id:'competitor',label:'Competitor Search',section:'Research',stage:'STR',asset:'S4 — Competitive Enemy & Advantage Register',bbosSection:'Research Factory',
   desc:'Identify the specific gap no existing offer is filling. Build the Advantage Register.',
   rationale:'Competitors are not defeated by imitation — they are defeated by naming what they cannot honestly name. The Advantage Register is built here and carries forward into the Positioning Statement.',
   workspace:'competitor'},
  {id:'offer',label:'Offer Creation',section:'Research',stage:'OFR',asset:'Assets 1–7 — Full Offer Covenant',bbosSection:'Asset Factory',
   desc:'Design the offer as a covenant: Promise, Mechanism, Scope Map, Value Stack, Guarantee, and Pricing.',
   rationale:'The offer is a public covenant — not a product. Al-Muqsit is most often absent at the edges of an agreement. A covenant missing any one of its elements leaves the client carrying risk that belongs to the operator.',
   workspace:'offer'},
  {id:'gtm',label:'Proven GTM',section:'Research',stage:'OUT',asset:'Stage 04 — Outreach Strategy',bbosSection:'Stage Entry',
   desc:'Build the Go-To-Market strategy downstream of the STR Positioning Statement and Truth-Gate Advisory.',
   rationale:'Distribution is constructed on what was earned from data — not on what the operator wants to say. A GTM built before the Truth-Gate is cleared produces outreach that cannot be substantiated.',
   workspace:'gtm'},
  {id:'pricing',label:'Pricing',section:'Research',stage:'OFR',asset:'Asset 7 — Pricing Structure',bbosSection:'Asset Factory',
   desc:'Reflect honest valuation against the Value Stack — not what the market might bear.',
   rationale:'Al-Muqsit is present at pricing when the number reflects what is genuinely being exchanged. The question is not "what will they pay" but "what is this honestly worth against what I am delivering."',
   workspace:'pricing'},
  {id:'validation',label:'Expert Validation Score',section:'Research',stage:'QAL',asset:'Amanah Gate — S1–S6 Screening',bbosSection:'Research Factory',
   desc:'Screen the operator\'s core competency, market viability, and capacity to build with integrity.',
   rationale:'The Amanah Gate must be passed before STR research begins. A failed Amanah Gate routes to Stage 01.1 Rejection. Proceeding without clearing this gate is not a shortcut — it is a structural integrity failure.',
   workspace:'validation'},
  // OFFER BUILDER
  {id:'attention',label:'Attention',section:'Offer Builder',stage:'OUT',asset:'Outreach — Attention Hook Library',bbosSection:'Asset Factory',
   desc:'Build attention hooks from the 3 Truth-Gate Advisory phrases cleared for headline use.',
   rationale:'These must be earned from verbatim VoC data — not invented from operator intuition. Phrases not in the Truth-Gate Advisory require a Proof Anchor before use in any client-facing asset.',
   workspace:'attention'},
  {id:'creative',label:'Creative & Ads',section:'Offer Builder',stage:'OUT',asset:'Outreach — Ad Creative',bbosSection:'Asset Factory',
   desc:'Produce ad creative within G-label boundaries from the Hook Library.',
   rationale:'No G3 or G4 claim may be presented at G1 or G2 level in any creative asset. Every claim in an ad must appear in the Proof Plan (OFR Asset 8). A PROOF PENDING item cannot run at G1 or G2.',
   workspace:'creative'},
  {id:'avatar',label:'Avatar Intake',section:'Offer Builder',stage:'STR',asset:'S2 — VoC Buying Language Bank',bbosSection:'Research Factory',
   desc:'Build the avatar from 15+ verbatim phrases extracted from source material.',
   rationale:'Paraphrasing closes the window. The exact phrase someone used when the performance dropped is a window into a reality they did not consciously choose to share. The avatar built from exact language carries what the summarised version cannot.',
   workspace:'avatar'},
  {id:'adspy',label:'Ad Spy',section:'Offer Builder',stage:'STR',asset:'S4 — Competitive Landscape',bbosSection:'Research Factory',
   desc:'Gather competitive ad intelligence to feed the Advantage Register.',
   rationale:'What gaps competitors leave in their messaging is where positioning is built — not by copying their language, but by naming what they cannot honestly name. Ad intelligence is a research output, not a creative input.',
   workspace:'adspy'},
  {id:'contentspy',label:'Content Spy',section:'Offer Builder',stage:'STR',asset:'S4 — Amanah Content Engine',bbosSection:'Research Factory',
   desc:'Map competitive content to identify the 6 Amanah Content Engine angles.',
   rationale:'Each of the 6 content angles must address a specific Fear or Desire from S3 — not a general topic the operator finds interesting. Content Spy surfaces where competitors are leaving Fears unaddressed and Desires unnamed.',
   workspace:'contentspy'},
  {id:'generateads',label:'Generate Ads',section:'Offer Builder',stage:'OUT',asset:'Outreach — Ad Production',bbosSection:'Asset Factory',
   desc:'Produce live ad copy with G-label confirmation on every claim.',
   rationale:'Ad claims are downstream of the Truth-Gate Advisory. Every claim used in production must have its G-label confirmed. A PROOF PENDING item cannot appear in a live ad at G1 or G2 level.',
   workspace:'generateads'},
  {id:'logo',label:'Generate Logo',section:'Offer Builder',stage:'OUT',asset:'Outreach — Brand Identity',bbosSection:'Asset Factory',
   desc:'Produce brand identity assets grounded in the offer covenant.',
   rationale:'Brand assets represent the offer as a covenant. Aspiration that has not been substantiated is not brand identity — it is misrepresentation. The brand must be able to carry the weight of what was promised.',
   workspace:'logo'},
  {id:'landing',label:'Landing Page',section:'Offer Builder',stage:'OUT',asset:'Outreach — Landing Page',bbosSection:'Asset Factory',
   desc:'Build the landing page with every claim mapped to the Proof Plan.',
   rationale:'Every claim on the landing page must appear in the Proof Plan (OFR Asset 8). PROOF PENDING items carry a restriction that prevents them appearing at G1 or G2 level until proof is captured and documented.',
   workspace:'landing'},
  {id:'salespreso',label:'Sales Presentation',section:'Offer Builder',stage:'SAL',asset:'Sales — Presentation Deck',bbosSection:'Asset Factory',
   desc:'Carry the Offer Promise, Mechanism, and Scope Map forward verbatim into the presentation.',
   rationale:'No new unsubstantiated claims are introduced at the presentation stage. The presentation is delivery of the covenant — not an extension of it. Expanding the Promise at SAL is a structural integrity failure.',
   workspace:'salespreso'},
  {id:'nurture',label:'Nurture Sequences',section:'Offer Builder',stage:'SAL',asset:'Sales — Nurture Engine',bbosSection:'Asset Factory',
   desc:'Build sequences from the 6 Amanah Content Engine angles, each staying within its G-label boundary.',
   rationale:'Nurture is not a second funnel — it is an extension of the same covenant conversation. Each email addresses a specific Fear or Desire from S3 and stays within the G-label ceiling established at STR.',
   workspace:'nurture'},
  {id:'salesletter',label:'Sales Letter',section:'Offer Builder',stage:'OUT',asset:'Outreach — Sales Letter',bbosSection:'Asset Factory',
   desc:'Build long-form persuasion anchored in verbatim VoC language and the Enemy Narrative.',
   rationale:'The Enemy Narrative provides the structural arc: Before state, Enemy named, Mechanism introduced, Promise made. VoC language must be preserved verbatim — paraphrasing loses the signal that makes the letter resonate.',
   workspace:'salesletter'},
  {id:'vsl',label:'Pre-Call VSL',section:'Offer Builder',stage:'SAL',asset:'Sales — Pre-Call VSL',bbosSection:'Asset Factory',
   desc:'Frame the problem in VoC language and introduce the Mechanism before the call.',
   rationale:'The VSL does not make claims beyond what the Truth-Gate Advisory and Proof Plan support. Its purpose is to pre-qualify belief — ensuring the prospect arrives at the call already understanding the Enemy and the approach.',
   workspace:'vsl'},
  {id:'social',label:'Social Assets',section:'Offer Builder',stage:'OUT',asset:'Outreach — Social Content',bbosSection:'Asset Factory',
   desc:'Produce social content from the 6 Amanah Content Engine angles addressing specific Fears and Desires.',

function stagePill(stageKey, size='sm') {
  const s = STAGES[stageKey];
  if (!s) return null;
  const pad = size === 'lg' ? '5px 14px' : '2px 7px';
  const fs = size === 'lg' ? '12px' : '9px';
  return (
    <span style={{
      background: s.bg,
      color: s.color,
      border: `1px solid ${s.border}`,
      borderRadius: '4px',
      padding: pad,
      fontSize: fs,
      fontWeight: 600,
      letterSpacing: '.4px',
      display: 'inline-flex',
      alignItems: 'center',
      gap: '4px',
      whiteSpace: 'nowrap',
    }}>
      {s.code} {stageKey}
    </span>
  );
}

          </button>
        </div>

        {SECTIONS.map(sec=>{
          const items = TOOLS.filter(t=>t.section===sec);
          const open = !collapsed[sec];
          return (
            <div key={sec} className="nav-section">
              <div className="nav-section-hdr" onClick={()=>toggle(sec)}>
                <span className="nav-section-label">{sec}</span>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <span className="nav-section-count">{items.length}</span>
                  <span className={`nav-chevron ${open?'open':'closed'}`}>▾</span>
                </div>
              </div>
              {open && items.map(t=>{
                const s = STAGES[t.stage];
                return (
                  <div key={t.id} className={`nav-item${selId===t.id?' active':''}`} onClick={()=>setSelId(t.id)}>
                    <div className="nav-item-dot" style={{background:s.color+'80',border:`1px solid ${s.color}40`}}/>
                    <span className="nav-item-label">{t.label}</span>
                    <span className="nav-item-stage" style={{background:s.bg,color:s.color,border:`1px solid ${s.border}`}}>
                      {t.stage}
                    </span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* MAIN */}
      <div className="main">
        {selTool
          ? <ToolDetail tool={selTool} onBack={()=>setSelId(null)}/>
          : <Overview onSelect={setSelId}/>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
