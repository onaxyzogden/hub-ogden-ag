<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BBOS Project</title>
  <style>
    :root {
      --bg:#0f131a;
      --panel:#161d28;
      --panel-2:#1d2633;
      --text:#ede8da;
      --muted:#9ca3af;
      --gold:#c9a96e;
      --green:#52b584;
      --amber:#e8a93e;
      --red:#e05c5c;
      --blue:#6aadee;
      --line:#2a3445;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, Arial, sans-serif; }
    .wrap { max-width:1180px; margin:0 auto; padding:28px; }
    .top { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap; margin-bottom:20px; }
    h1 { margin:0; font-size:32px; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; }
    .panel {
      background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px;
    }
    .kvs { display:grid; grid-template-columns:180px 1fr; gap:10px 14px; }
    .k { color:var(--muted); font-weight:700; text-transform:uppercase; font-size:12px; }
    .links a { color:var(--gold); text-decoration:none; display:block; margin:8px 0; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    button {
      background:var(--gold); color:#111; border:none; border-radius:10px; padding:11px 14px; font-weight:800; cursor:pointer;
    }
    button.secondary { background:var(--panel-2); color:var(--text); border:1px solid var(--line); }
    textarea, select, input {
      width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line); border-radius:10px; padding:12px;
    }
    .stagebar { display:grid; grid-template-columns:repeat(9,1fr); gap:6px; margin-top:14px; }
    .seg { height:10px; border-radius:999px; background:#253041; }
    .seg.done { background:var(--green); }
    .seg.current { background:var(--gold); }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; border-bottom:1px solid var(--line); padding:10px 8px; font-size:14px; }
    th { color:var(--muted); font-size:12px; text-transform:uppercase; }
    @media (max-width: 900px) {
      .grid { grid-template-columns:1fr; }
      .kvs { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 id="projectTitle">Loading…</h1>
        <div class="muted" id="projectSub">Project dashboard</div>
        <div class="stagebar" id="stagebar"></div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="loadProject()">Refresh</button>
        <button onclick="saveProject()">Save Status</button>
        <button class="secondary" onclick="generateStageDocs()">Generate Stage Docs</button>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h3 style="margin-top:0">Project State</h3>
        <div class="kvs">
          <div class="k">Project ID</div><div id="v-project-id">—</div>
          <div class="k">Operator</div><div><input id="operatorInput"></div>
          <div class="k">Stage</div><div><select id="stageInput"></select></div>
          <div class="k">Status</div><div><select id="statusInput"></select></div>
          <div class="k">Last Session</div><div id="v-last-session">—</div>
          <div class="k">Note</div><div><textarea id="noteInput" placeholder="Operator note"></textarea></div>
        </div>
      </div>

      <div class="panel links">
        <h3 style="margin-top:0">Links</h3>
        <a id="linkSheet" target="_blank">Project Sheet</a>
        <a id="linkFolder" target="_blank">Project Folder</a>
        <a id="linkIntake" target="_blank">Intake Brief</a>
        <a id="linkApproval" target="_blank">Stage Approval Brief</a>
        <a id="linkAsset" target="_blank">Asset Pack</a>
        <a id="linkNotes" target="_blank">Operator Notes</a>
        <a id="linkOffer" target="_blank">Offer Workbook</a>
        <a id="linkSales" target="_blank">Sales Script</a>
      </div>
    </div>

    <div class="panel" style="margin-top:18px">
      <h3 style="margin-top:0">Quick Activity Note</h3>
      <div style="display:grid; grid-template-columns:1fr 180px; gap:10px">
        <input id="activityDetail" placeholder="Logged intake source pack request.">
        <button onclick="appendActivity()">Add Activity</button>
      </div>
    </div>

    <div class="panel" style="margin-top:18px">
      <h3 style="margin-top:0">Project Resources</h3>
      <table>
        <thead>
          <tr><th>Resource</th><th>Status</th></tr>
        </thead>
        <tbody id="resourceTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwyKeVEQ8raXvqmm2la9CiLlUUTU-PpgitIJOyl9a4A8kHOfxD33guIxhEXgwHQYkcigw/exec";
    const PARAMS = new URLSearchParams(window.location.search);
    const PROJECT_ID = PARAMS.get('id');
    const STAGES = ['01_INT','02_QAL','03_STR','04_OFR','05_OUT','06_SAL','07_FUL','08_RET','09_OPT'];
    const STATUSES = ['advance','remain','patch','no_ship'];
    let project = null;

    function fillSelect(id, values) {
      const el = document.getElementById(id);
      el.innerHTML = values.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    fillSelect('stageInput', STAGES);
    fillSelect('statusInput', STATUSES);

    async function loadProject() {
      if (!PROJECT_ID) {
        alert('Missing project id in URL');
        return;
      }

      const res = await fetch(`${API_URL}?action=getProject&id=${encodeURIComponent(PROJECT_ID)}`);
      const data = await res.json();

      if (!data.ok) {
        alert(data.error || 'Could not load project');
        return;
      }

      project = data;
      document.getElementById('projectTitle').textContent = data.client_name || 'Project';
      document.getElementById('projectSub').textContent = `${data.stage} · ${data.status}`;
      document.getElementById('v-project-id').textContent = data.project_id || '—';
      document.getElementById('v-last-session').textContent = data.last_session || '—';
      document.getElementById('operatorInput').value = data.operator || '';
      document.getElementById('stageInput').value = data.stage || '01_INT';
      document.getElementById('statusInput').value = data.status || 'remain';
      document.getElementById('noteInput').value = data.note || '';

      setLink('linkSheet', 'Project Sheet', data.sheet_url);
      setLink('linkFolder', 'Project Folder', data.folder_url);
      setLink('linkIntake', 'Intake Brief', data.intake_doc_url);
      setLink('linkApproval', 'Stage Approval Brief', data.approval_doc_url);
      setLink('linkAsset', 'Asset Pack', data.asset_doc_url);
      setLink('linkNotes', 'Operator Notes', data.notes_doc_url);
      setLink('linkOffer', 'Offer Workbook', data.offer_doc_url);
      setLink('linkSales', 'Sales Script', data.sales_doc_url);

      renderStagebar(data.stage);
      renderResources(data);
    }

    function setLink(id, label, url) {
      const el = document.getElementById(id);
      el.textContent = label;
      if (url) {
        el.href = url;
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
      } else {
        el.removeAttribute('href');
        el.style.opacity = '.45';
        el.style.pointerEvents = 'none';
      }
    }

    function renderStagebar(stage) {
      const idx = STAGES.indexOf(stage);
      document.getElementById('stagebar').innerHTML = STAGES.map((s, i) => {
        let cls = 'seg';
        if (i < idx) cls += ' done';
        if (i === idx) cls += ' current';
        return `<div class="${cls}"></div>`;
      }).join('');
    }

    function renderResources(data) {
      const rows = [
        ['Project Sheet', !!data.sheet_url],
        ['Project Folder', !!data.folder_url],
        ['Intake Brief', !!data.intake_doc_url],
        ['Stage Approval Brief', !!data.approval_doc_url],
        ['Asset Pack', !!data.asset_doc_url],
        ['Operator Notes', !!data.notes_doc_url],
        ['Offer Workbook', !!data.offer_doc_url],
        ['Sales Script', !!data.sales_doc_url]
      ];

      document.getElementById('resourceTable').innerHTML = rows.map(([name, ok]) => `
        <tr>
          <td>${name}</td>
          <td>${ok ? 'Ready' : 'Missing'}</td>
        </tr>
      `).join('');
    }

    async function saveProject() {
      const payload = new URLSearchParams({
        action: 'updateProject',
        project_id: PROJECT_ID,
        operator: document.getElementById('operatorInput').value.trim(),
        stage: document.getElementById('stageInput').value,
        status: document.getElementById('statusInput').value,
        note: document.getElementById('noteInput').value.trim(),
        last_session: new Date().toISOString().slice(0, 10)
      });
    
      const res = await fetch('https://script.google.com/macros/s/AKfycbwyKeVEQ8raXvqmm2la9CiLlUUTU-PpgitIJOyl9a4A8kHOfxD33guIxhEXgwHQYkcigw/exec', {
        method: 'POST',
        body: payload
      });
    
      const data = await res.json();
      if (!data.ok) {
        alert(data.error || 'Save failed');
        return;
      }
    
      await loadProject();
      alert('Project updated');
    }
    
    async function appendActivity() {
      const detail = document.getElementById('activityDetail').value.trim();
      if (!detail) {
        alert('Add a note first');
        return;
      }
    
      const payload = new URLSearchParams({
        action: 'appendActivity',
        project_id: PROJECT_ID,
        actor: document.getElementById('operatorInput').value.trim() || 'operator',
        event_action: 'note',
        detail
      });
    
      const res = await fetch('https://script.google.com/macros/s/AKfycbwyKeVEQ8raXvqmm2la9CiLlUUTU-PpgitIJOyl9a4A8kHOfxD33guIxhEXgwHQYkcigw/exec', {
        method: 'POST',
        body: payload
      });
    
      const data = await res.json();
      if (!data.ok) {
        alert(data.error || 'Could not add activity');
        return;
      }
    
      document.getElementById('activityDetail').value = '';
      alert('Activity added');
    }
    
    async function generateStageDocs() {
      const payload = new URLSearchParams({
        action: 'generateStageDocs',
        project_id: PROJECT_ID,
        stage: document.getElementById('stageInput').value
      });
    
      const res = await fetch('https://script.google.com/macros/s/AKfycbwyKeVEQ8raXvqmm2la9CiLlUUTU-PpgitIJOyl9a4A8kHOfxD33guIxhEXgwHQYkcigw/exec', {
        method: 'POST',
        body: payload
      });
    
      const data = await res.json();
      if (!data.ok) {
        alert(data.error || 'Could not generate docs');
        return;
      }
    
      alert(`Created ${(data.created || []).length} docs`);
      await loadProject();
    }

    loadProject();
  </script>
</body>
</html>
