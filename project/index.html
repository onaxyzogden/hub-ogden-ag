<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BBOS Project Dashboard</title>
  <style>
    :root {
      --bg:#0f131a;
      --panel:#161d28;
      --panel-2:#1d2633;
      --text:#ede8da;
      --muted:#9ca3af;
      --gold:#c9a96e;
      --green:#52b584;
      --amber:#e8a93e;
      --red:#e05c5c;
      --blue:#6aadee;
      --line:#2a3445;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; background:var(--bg); color:var(--text);
      font-family: Inter, Arial, sans-serif;
    }
    .wrap { max-width:1200px; margin:0 auto; padding:28px; }
    .topbar {
      display:flex; justify-content:space-between; align-items:center;
      gap:16px; margin-bottom:24px; flex-wrap:wrap;
    }
    h1 { margin:0; font-size:34px; }
    .muted { color:var(--muted); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button {
      background:var(--gold); color:#111; border:none; border-radius:10px;
      padding:12px 16px; font-weight:700; cursor:pointer;
    }
    button.secondary { background:var(--panel-2); color:var(--text); border:1px solid var(--line); }
    .stats {
      display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-bottom:22px;
    }
    .stat {
      background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px;
    }
    .stat .num { font-size:28px; font-weight:800; }
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
    .filter.active { outline:2px solid var(--gold); }
    .grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px;
    }
    .card {
      display:block; text-decoration:none; color:inherit; background:var(--panel);
      border:1px solid var(--line); border-radius:16px; padding:16px;
    }
    .card:hover { border-color:var(--gold); transform:translateY(-1px); }
    .row { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .chip {
      font-size:12px; padding:6px 9px; border-radius:999px; font-weight:700; display:inline-block;
    }
    .chip.advance { background:rgba(82,181,132,.16); color:var(--green); }
    .chip.remain { background:rgba(232,169,62,.16); color:var(--amber); }
    .chip.patch { background:rgba(224,92,92,.16); color:var(--red); }
    .chip.no_ship { background:rgba(106,173,238,.16); color:var(--blue); }
    .stagebar {
      display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin:14px 0;
    }
    .seg { height:8px; border-radius:999px; background:#253041; }
    .seg.done { background:var(--green); }
    .seg.current { background:var(--gold); }
    .meta { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:12px; margin-top:12px; }
    .footer { margin-top:26px; color:var(--muted); font-size:12px; }
    dialog {
      width:min(760px, calc(100% - 24px)); border:none; border-radius:18px;
      background:var(--panel); color:var(--text); padding:0;
    }
    .modal-head, .modal-body, .modal-foot { padding:18px 20px; }
    .modal-head { border-bottom:1px solid var(--line); }
    .modal-foot { border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px; }
    .form-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    label { font-size:12px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    input, select, textarea {
      width:100%; background:var(--panel-2); color:var(--text); border:1px solid var(--line);
      border-radius:10px; padding:12px;
    }
    textarea { min-height:84px; resize:vertical; }
    .span-2 { grid-column:1 / -1; }
    @media (max-width: 800px) {
      .stats, .form-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>BBOS Project Dashboard</h1>
        <div class="muted">Google-powered operator console</div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="loadProjects()">Refresh</button>
        <button onclick="openNewProject()">New Project</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <button class="filter active secondary" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter secondary" data-filter="advance" onclick="setFilter('advance', this)">Ready</button>
      <button class="filter secondary" data-filter="remain" onclick="setFilter('remain', this)">In Progress</button>
      <button class="filter secondary" data-filter="patch" onclick="setFilter('patch', this)">Patch</button>
      <button class="filter secondary" data-filter="no_ship" onclick="setFilter('no_ship', this)">No Ship</button>
    </div>

    <div class="grid" id="grid"></div>
    <div class="footer">Connected to Apps Script web app and Google registry.</div>
  </div>

  <dialog id="newProjectDialog">
    <div class="modal-head">
      <h2 style="margin:0">Create Project</h2>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field">
          <label>Client / Project Name</label>
          <input id="f-name" placeholder="Acme Corp">
        </div>
        <div class="field">
          <label>Operator</label>
          <input id="f-operator" placeholder="Yousef">
        </div>
        <div class="field">
          <label>Client Contact</label>
          <input id="f-client-contact" placeholder="Jane Doe">
        </div>
        <div class="field">
          <label>Client Email</label>
          <input id="f-client-email" placeholder="jane@client.com">
        </div>
        <div class="field">
          <label>Stage</label>
          <select id="f-stage">
            <option value="01_INT">01_INT</option>
            <option value="02_QAL">02_QAL</option>
            <option value="03_STR">03_STR</option>
            <option value="04_OFR">04_OFR</option>
            <option value="05_OUT">05_OUT</option>
            <option value="06_SAL">06_SAL</option>
            <option value="07_FUL">07_FUL</option>
            <option value="08_RET">08_RET</option>
            <option value="09_OPT">09_OPT</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="remain">remain</option>
            <option value="advance">advance</option>
            <option value="patch">patch</option>
            <option value="no_ship">no_ship</option>
          </select>
        </div>
        <div class="field">
          <label>Dashboard Password</label>
          <input id="f-password" placeholder="optional">
        </div>
        <div class="field">
          <label>Parent Folder ID</label>
          <input id="f-parent-folder" value="1Zv2agDP_8gSoB2VDk-iYC3w6dk9THx9l">
        </div>
        <div class="field span-2">
          <label>Note</label>
          <textarea id="f-note" placeholder="Project created and ready for intake."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="secondary" onclick="closeNewProject()">Cancel</button>
      <button onclick="createProjectFromModal()">Create Project</button>
    </div>
  </dialog>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwyKeVEQ8raXvqmm2la9CiLlUUTU-PpgitIJOyl9a4A8kHOfxD33guIxhEXgwHQYkcigw/exec";
    let PROJECT = [];
    let activeFilter = 'all';
    const STAGES = ['01_INT','02_QAL','03_STR','04_OFR','05_OUT','06_SAL','07_FUL','08_RET','09_OPT'];

    function openNewProject() {
      document.getElementById('newProjectDialog').showModal();
    }

    function closeNewProject() {
      document.getElementById('newProjectDialog').close();
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    }

    async function loadProjects() {
      const res = await fetch(`${API_URL}?action=listProjects`);
      const data = await res.json();
      if (!data.ok) {
        alert(data.error || 'Failed to load projects');
        return;
      }
      PROJECT = data.projects || [];
      renderStats();
      renderGrid();
    }

    function renderStats() {
      const total = PROJECT.length;
      const advance = PROJECT.filter(p => p.status === 'advance').length;
      const remain = PROJECT.filter(p => p.status === 'remain').length;
      const needsPatch = PROJECT.filter(p => p.status === 'patch').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="muted">Total Projects</div><div class="num">${total}</div></div>
        <div class="stat"><div class="muted">Ready</div><div class="num">${advance}</div></div>
        <div class="stat"><div class="muted">In Progress</div><div class="num">${remain}</div></div>
        <div class="stat"><div class="muted">Needs Patch</div><div class="num">${needsPatch}</div></div>
      `;
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      let rows = PROJECT.slice();
      if (activeFilter !== 'all') {
        rows = rows.filter(p => p.status === activeFilter);
      }

      grid.innerHTML = rows.map(p => {
        const idx = STAGES.indexOf(p.stage);
        const stagebar = STAGES.map((s, i) => {
          let cls = 'seg';
          if (i < idx) cls += ' done';
          if (i === idx) cls += ' current';
          return `<div class="${cls}"></div>`;
        }).join('');

        return `
          <a class="card" href="${p.file}" target="_blank">
            <div class="row">
              <div>
                <div style="font-size:20px;font-weight:800">${escapeHtml(p.name || '')}</div>
                <div class="muted" style="margin-top:4px">${escapeHtml(p.stage || '')}</div>
              </div>
              <span class="chip ${p.status}">${escapeHtml(p.status || '')}</span>
            </div>
            <div style="margin-top:10px">${escapeHtml(p.note || '')}</div>
            <div class="stagebar">${stagebar}</div>
            <div class="meta">
              <span>${escapeHtml(p.operator || '')}</span>
              <span>${escapeHtml(p.lastSession || '')}</span>
            </div>
          </a>
        `;
      }).join('');
    }

    async function createProjectFromModal() {
      const payload = {
        action: 'createProject',
        client_name: document.getElementById('f-name').value.trim(),
        operator: document.getElementById('f-operator').value.trim(),
        client_contact: document.getElementById('f-client-contact').value.trim(),
        client_email: document.getElementById('f-client-email').value.trim(),
        stage: document.getElementById('f-stage').value,
        status: document.getElementById('f-status').value,
        note: document.getElementById('f-note').value.trim(),
        dashboard_password: document.getElementById('f-password').value.trim(),
        parent_folder_id: document.getElementById('f-parent-folder').value.trim()
      };

      if (!payload.client_name) {
        alert('Client / Project Name is required');
        return;
      }

      const btns = document.querySelectorAll('button');
      btns.forEach(b => b.disabled = true);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!data.ok) {
          alert(data.error || 'Project creation failed');
          return;
        }
        closeNewProject();
        await loadProjects();
        window.open(data.dashboard_url, '_blank');
      } catch (err) {
        alert(err.message || 'Project creation failed');
      } finally {
        btns.forEach(b => b.disabled = false);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    loadProjects();
  </script>
</body>
</html>
