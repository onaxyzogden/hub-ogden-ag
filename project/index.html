<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBOS — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ============================================================
     BBOS PROJECT INDEX
     ============================================================
     SETUP:
     1. Set INDEX_PASSWORD below
     2. Add your projects to the PROJECTS array
     3. Deploy alongside your dashboard HTML files

     Each project entry:
     {
       name:       "Client Name",
       file:       "client-name.html",    // relative path to dashboard
       stage:      "02_QAL",              // current active stage
       status:     "remain",              // advance|remain|patch|no_ship
       operator:   "Yousef",
       lastSession:"2025-03-10",
       note:       "Optional short note", // shown on card
     }
     ============================================================ -->

<script>
const INDEX_PASSWORD = "bbos-admin";

const PROJECTS = [
  {
    name:        "Acme Corp",
    file:        "project/acme.html",
    stage:       "02_QAL",
    status:      "advance",
    operator:    "Yousef",
    lastSession: "2025-03-12",
    note:        "QAL complete — ready for STR",
  },
  {
    name:        "Bright Path",
    file:        "project/brightpath.html",
    stage:       "03_STR",
    status:      "remain",
    operator:    "Yousef",
    lastSession: "2025-03-10",
    note:        "VoC bank in progress",
  },
  {
    name:        "Nova Studio",
    file:        "project/nova.html",
    stage:       "01_INT",
    status:      "remain",
    operator:    "Yousef",
    lastSession: "2025-03-08",
    note:        "Intake sections 1–4 complete",
  },
];
</script>

<style>
  :root {
    --bg:       #0b0f16;
    --surface:  #161d28;
    --surface-2:#1e2636;
    --surface-3:#252f42;
    --border:   rgba(255,255,255,0.06);
    --border-md:rgba(255,255,255,0.11);
    --text-1:   #ede8da;
    --text-2:   #8c95aa;
    --text-3:   #4f5a6e;
    --gold:     #c9a96e;
    --gold-dim: rgba(201,169,110,0.10);
    --gold-bd:  rgba(201,169,110,0.28);
    --green:    #52b584;
    --green-dim:rgba(82,181,132,0.10);
    --green-bd: rgba(82,181,132,0.28);
    --amber:    #e8a93e;
    --amber-dim:rgba(232,169,62,0.10);
    --amber-bd: rgba(232,169,62,0.28);
    --red:      #e05c5c;
    --red-dim:  rgba(224,92,92,0.08);
    --red-bd:   rgba(224,92,92,0.28);
    --blue:     #6aadee;
    --blue-dim: rgba(106,173,238,0.10);
    --radius:   10px;
    --radius-lg:16px;
    --font-disp:'Cormorant Garamond', Georgia, serif;
    --font-body:'Instrument Sans', sans-serif;
    --font-mono:'DM Mono', monospace;
    --ease:     cubic-bezier(.22,.68,0,1.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── GATE ── */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }

  .gate-inner {
    width: 100%; max-width: 360px; padding: 0 24px;
    animation: fadeUp 0.5s var(--ease) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .gate-logo {
    font-family: var(--font-disp);
    font-size: 40px; font-weight: 500;
    color: var(--text-1); letter-spacing: -0.02em;
    margin-bottom: 2px;
  }

  .gate-sub {
    font-size: 11px; color: var(--text-3);
    letter-spacing: 0.12em; text-transform: uppercase;
    margin-bottom: 44px;
  }

  .gate-label {
    font-size: 11px; color: var(--text-3);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px;
  }

  .gate-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-md);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: var(--font-mono); font-size: 14px;
    color: var(--text-1); outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px; letter-spacing: 0.08em;
  }

  .gate-input:focus { border-color: var(--gold-bd); }

  .gate-input.error {
    border-color: var(--red);
    animation: shake 0.3s;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .gate-btn {
    width: 100%; padding: 12px;
    background: var(--gold-dim);
    border: 1px solid var(--gold-bd);
    border-radius: var(--radius);
    color: var(--gold);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.2s;
  }

  .gate-btn:hover { background: rgba(201,169,110,0.18); }

  .gate-error {
    font-size: 12px; color: var(--red);
    margin-top: 8px; min-height: 18px;
  }

  /* ── APP ── */
  #app { display: none; position: relative; z-index: 1; min-height: 100vh; }
  #app.visible { display: block; animation: fadeIn 0.4s ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: flex-end;
    justify-content: space-between;
    padding: 40px 48px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute; bottom: -1px; left: 48px;
    width: 48px; height: 1px;
    background: var(--gold); opacity: 0.6;
  }

  .header-logo {
    font-family: var(--font-disp);
    font-size: 34px; font-weight: 500;
    color: var(--text-1); letter-spacing: -0.02em;
  }

  .header-label {
    font-size: 11px; color: var(--text-3);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 4px;
  }

  .header-right {
    display: flex; align-items: center; gap: 16px;
  }

  .header-meta {
    text-align: right;
    font-size: 12px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  .signout-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    color: var(--text-3); font-size: 11px;
    font-family: var(--font-body); cursor: pointer;
    transition: all 0.15s;
  }

  .signout-btn:hover { border-color: var(--border-md); color: var(--text-2); }

  /* ── CONTENT ── */
  .content { padding: 40px 48px; max-width: 1100px; }

  /* ── SUMMARY ROW ── */
  .summary {
    display: flex; gap: 12px; margin-bottom: 36px;
  }

  .sum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    min-width: 120px;
  }

  .sum-label {
    font-size: 10px; color: var(--text-3);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sum-value {
    font-family: var(--font-disp);
    font-size: 26px; font-weight: 500;
    color: var(--text-1); line-height: 1;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 11px; font-weight: 500;
    color: var(--text-3);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .section-count {
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  /* ── PROJECT GRID ── */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  /* ── PROJECT CARD ── */
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    text-decoration: none;
    display: block;
    animation: fadeUp 0.4s var(--ease) both;
    position: relative;
  }

  .project-card:hover {
    border-color: var(--border-md);
    transform: translateY(-2px);
  }

  .project-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .project-card:hover::before { opacity: 1; }
  .project-card.status-advance::before { background: var(--green); }
  .project-card.status-remain::before  { background: var(--amber); }
  .project-card.status-patch::before   { background: var(--red); }
  .project-card.status-noship::before  { background: var(--red); }

  .card-top {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .card-name-row {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 12px;
    margin-bottom: 10px;
  }

  .card-name {
    font-family: var(--font-disp);
    font-size: 20px; font-weight: 500;
    color: var(--text-1); letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .status-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500;
    padding: 3px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
    font-family: var(--font-body);
    margin-top: 2px;
  }

  .chip-advance { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-bd); }
  .chip-remain  { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-bd); }
  .chip-patch   { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-bd); }
  .chip-noship  { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-bd); }

  .card-stage {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  .stage-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); opacity: 0.6;
  }

  .card-note {
    font-size: 12px; color: var(--text-3);
    line-height: 1.5; margin-top: 8px;
    font-style: italic;
  }

  .card-bottom {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
  }

  .card-meta {
    display: flex; align-items: center; gap: 14px;
  }

  .card-meta-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  .card-meta-icon {
    width: 12px; height: 12px; opacity: 0.5;
  }

  .card-link {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-3);
    font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .project-card:hover .card-link { color: var(--gold); }

  .card-arrow {
    transition: transform 0.2s;
  }

  .project-card:hover .card-arrow { transform: translateX(3px); }

  /* ── PIPELINE MINI ── */
  .pipeline-mini {
    display: flex; align-items: center;
    padding: 10px 20px; gap: 0;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .pip-seg {
    flex: 1;
    height: 3px;
    background: var(--surface-3);
    border-radius: 2px;
    margin: 0 1px;
    transition: background 0.3s;
    position: relative;
  }

  .pip-seg.done    { background: var(--green-bd); }
  .pip-seg.active  { background: var(--gold); }

  .pip-seg-label {
    position: absolute;
    bottom: 6px;
    left: 50%; transform: translateX(-50%);
    font-size: 8px;
    color: var(--text-3);
    font-family: var(--font-mono);
    white-space: nowrap;
    opacity: 0;
  }

  /* ── ADD PROJECT CARD ── */
  .add-card {
    background: transparent;
    border: 1px dashed var(--border-md);
    border-radius: var(--radius-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; padding: 40px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    min-height: 180px;
  }

  .add-card:hover {
    border-color: var(--gold-bd);
    background: var(--gold-dim);
  }

  .add-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border-md);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    font-size: 18px; line-height: 1;
    transition: all 0.2s;
  }

  .add-card:hover .add-icon {
    border-color: var(--gold-bd);
    color: var(--gold);
  }

  .add-label {
    font-size: 12px; color: var(--text-3);
    font-weight: 500; letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .add-card:hover .add-label { color: var(--gold); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 80px 32px;
    color: var(--text-3);
  }

  .empty-title {
    font-family: var(--font-disp);
    font-size: 22px; color: var(--text-2);
    margin-bottom: 8px;
  }

  /* ── FOOTER ── */
  .footer {
    padding: 24px 48px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; gap: 6px; margin-bottom: 24px;
  }

  .filter-btn {
    font-size: 11px; font-weight: 500;
    font-family: var(--font-body);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-md);
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .filter-btn:hover { color: var(--text-2); border-color: var(--border-md); }

  .filter-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold-bd);
    color: var(--gold);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-logo">BBOS</div>
    <div class="gate-sub">Project Index</div>
    <div class="gate-label">Access code</div>
    <input type="password" id="pw-input" class="gate-input"
      placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="gate-btn" onclick="checkPassword()">Enter</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <header class="header">
    <div>
      <div class="header-label">BBOS — Operator Index</div>
      <div class="header-logo">Projects</div>
    </div>
    <div class="header-right">
      <div class="header-meta" id="header-meta"></div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="content">

    <!-- Summary strip -->
    <div class="summary" id="summary"></div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('advance', this)">Ready to advance</button>
      <button class="filter-btn" onclick="setFilter('remain', this)">In progress</button>
      <button class="filter-btn" onclick="setFilter('patch', this)">Needs patch</button>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <span class="section-title">Active projects</span>
      <span class="section-count" id="project-count"></span>
    </div>

    <!-- Project grid -->
    <div class="project-grid" id="project-grid"></div>

  </div>

  <footer class="footer">
    <span>BBOS v2.1</span>
    <span id="footer-date"></span>
  </footer>

</div>

<script>
// ── PIPELINE ──────────────────────────────────────────────────────────────

const PIPELINE = [
  { code:'01_INT', short:'INT' },
  { code:'02_QAL', short:'QAL' },
  { code:'03_STR', short:'STR' },
  { code:'04_OFR', short:'OFR' },
  { code:'05_OUT', short:'OUT' },
  { code:'06_SAL', short:'SAL' },
  { code:'07_FUL', short:'FUL' },
  { code:'08_RET', short:'RET' },
  { code:'09_OPT', short:'OPT' },
];

const STATUS_LABELS = {
  advance: 'Ready to advance',
  remain:  'In progress',
  patch:   'Patch needed',
  no_ship: 'No-ship',
};

const STAGE_NAMES = {
  '01_INT': 'Intake',
  '02_QAL': 'Qualification',
  '03_STR': 'Strategy',
  '04_OFR': 'Offer',
  '05_OUT': 'Outreach',
  '06_SAL': 'Sales',
  '07_FUL': 'Fulfilment',
  '08_RET': 'Retention',
  '09_OPT': 'Optimise',
};

// ── AUTH ──────────────────────────────────────────────────────────────────

function checkPassword() {
  const val = document.getElementById('pw-input').value.trim();
  const err = document.getElementById('gate-error');
  const inp = document.getElementById('pw-input');

  if (val === INDEX_PASSWORD) {
    sessionStorage.setItem('bbos_index_auth', 'true');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    init();
  } else {
    err.textContent = 'Incorrect access code.';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 1800);
  }
}

function signOut() {
  sessionStorage.removeItem('bbos_index_auth');
  location.reload();
}

// ── INIT ──────────────────────────────────────────────────────────────────

let activeFilter = 'all';

function init() {
  const now = new Date();
  document.getElementById('header-meta').textContent =
    now.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  document.getElementById('footer-date').textContent =
    `Last loaded: ${now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}`;

  renderSummary();
  renderGrid('all');
}

// ── SUMMARY ───────────────────────────────────────────────────────────────

function renderSummary() {
  const total    = PROJECTS.length;
  const advance  = PROJECTS.filter(p => p.status === 'advance').length;
  const remain   = PROJECTS.filter(p => p.status === 'remain').length;
  const patch    = PROJECTS.filter(p => p.status === 'patch' || p.status === 'no_ship').length;

  const el = document.getElementById('summary');
  el.innerHTML = [
    { label: 'Total projects', value: total,   delay: '0.05s' },
    { label: 'Ready to advance', value: advance, delay: '0.10s' },
    { label: 'In progress',    value: remain,  delay: '0.15s' },
    { label: 'Need attention', value: patch,   delay: '0.20s' },
  ].map(s => `
    <div class="sum-card" style="animation:fadeUp 0.4s var(--ease) ${s.delay} both">
      <div class="sum-label">${s.label}</div>
      <div class="sum-value">${s.value}</div>
    </div>
  `).join('');
}

// ── FILTER ────────────────────────────────────────────────────────────────

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(filter);
}

// ── GRID ──────────────────────────────────────────────────────────────────

function renderGrid(filter) {
  const grid = document.getElementById('project-grid');
  const filtered = filter === 'all'
    ? PROJECTS
    : PROJECTS.filter(p => {
        if (filter === 'patch') return p.status === 'patch' || p.status === 'no_ship';
        return p.status === filter;
      });

  document.getElementById('project-count').textContent =
    `${filtered.length} of ${PROJECTS.length}`;

  if (!PROJECTS.length) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-title">No projects yet</div>
        <div style="font-size:13px;margin-top:6px">Add entries to the PROJECTS array in this file</div>
      </div>`;
    return;
  }

  grid.innerHTML = '';

  filtered.forEach((project, i) => {
    const card = buildCard(project, i);
    grid.appendChild(card);
  });

  // Add project placeholder
  const addCard = document.createElement('div');
  addCard.className = 'add-card';
  addCard.title = 'Add a new project by editing the PROJECTS array in bbos_index.html';
  addCard.innerHTML = `
    <div class="add-icon">+</div>
    <div class="add-label">Add project</div>
  `;
  grid.appendChild(addCard);
}

function buildCard(project, i) {
  const statusKey  = (project.status || 'remain').replace('_', '');
  const chipClass  = `chip-${statusKey}`;
  const chipLabel  = STATUS_LABELS[project.status] || project.status;
  const stageName  = STAGE_NAMES[project.stage] || project.stage;
  const activeIdx  = PIPELINE.findIndex(p => p.code === project.stage);

  const card = document.createElement('a');
  card.href = project.file;
  card.className = `project-card status-${statusKey}`;
  card.style.animationDelay = `${0.05 + i * 0.06}s`;

  // Mini pipeline
  const pipeSegs = PIPELINE.map((p, pi) => {
    const cls = pi < activeIdx ? 'done' : pi === activeIdx ? 'active' : '';
    return `<div class="pip-seg ${cls}" title="${p.short}"></div>`;
  }).join('');

  card.innerHTML = `
    <div class="pipeline-mini">${pipeSegs}</div>
    <div class="card-top">
      <div class="card-name-row">
        <div class="card-name">${project.name}</div>
        <span class="status-chip ${chipClass}">${chipLabel}</span>
      </div>
      <div class="card-stage">
        <div class="stage-dot"></div>
        ${project.stage} — ${stageName}
      </div>
      ${project.note ? `<div class="card-note">${project.note}</div>` : ''}
    </div>
    <div class="card-bottom">
      <div class="card-meta">
        <div class="card-meta-item">
          <svg class="card-meta-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6" cy="6" r="4.5"/>
            <path d="M6 3.5V6l1.5 1.5"/>
          </svg>
          ${project.lastSession || '—'}
        </div>
        <div class="card-meta-item">
          <svg class="card-meta-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6" cy="4" r="2.5"/>
            <path d="M1.5 10.5c0-2.21 2.01-4 4.5-4s4.5 1.79 4.5 4"/>
          </svg>
          ${project.operator || '—'}
        </div>
      </div>
      <div class="card-link">
        Open
        <svg class="card-arrow" width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2.5 6h7M6.5 3l3 3-3 3"/>
        </svg>
      </div>
    </div>
  `;

  return card;
}

// ── STARTUP ───────────────────────────────────────────────────────────────

if (sessionStorage.getItem('bbos_index_auth') === 'true') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  init();
}
</script>
